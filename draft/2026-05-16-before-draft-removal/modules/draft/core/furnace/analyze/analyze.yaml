overlay:
# Furnace screen: when the "Max Power" CTA is visible, tap it inline via the
# shared scenario. Gated to the furnace screen so it doesn't fire on other
# building panels that happen to show similar buttons.
- name: building.furnace.max_power.visible
  region: building.furnace.max_power
  action: findIcon
  threshold: 0.9
  screens:
  - furnace
  ttl: 5s
  pushScenario:
  - name: tap_furnace_max_power
