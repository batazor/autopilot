overlay:
  - name: mail_gift.visible
    region: mail_gift
    action: findIcon
    threshold: 0.9
    min_match_saturation: 48
    screens:
      - mail
    pushScenario:
      - name: read_mail_gifts

  - name: mail.tab.wars.has_red_dot
    region: mail.tab.wars
    isRedDot: true
    screens:
      - mail
    pushScenario:
      - name: read_mail_gifts
        ttl: 5m

  - name: mail.tab.alliance.has_red_dot
    region: mail.tab.alliance
    isRedDot: true
    screens:
      - mail
    pushScenario:
      - name: read_mail_gifts
        ttl: 5m

  - name: mail.tab.system.has_red_dot
