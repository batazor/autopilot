# Fishing Tournament — mechanics, schedules, missions, items (wiki reference).
# Source: https://www.whiteoutsurvival.wiki/events/fishing-tournament/
# No runtime loader yet.

'fishing-tournament':
  wiki_url: https://www.whiteoutsurvival.wiki/events/fishing-tournament/
  display_name: Fishing Tournament

  summary:
    - >-
      Recurring event (~once per month); each run can use a different seasonal
      theme (wiki examples include Winter / Spring / Summer / Autumn). Fish species,
      divers, and crate loot can vary by season.
    - In the main Ice Fishing stage you drag to depth; hook returns after max depth
      or repeated obstacle hits. Catches contribute points for kit upgrades (max Lv10).

  schedule:
    recurrence_note: wiki states roughly once per month; one line says ~3 days of play per occurrence.
    season_themes_examples:
      - winter
      - spring
      - summer
      - autumn
    tips_section_alternate_order: [sprint, autumn, summer, winter]

  core_fishing:
    new_attempt_every_hours: 3
    bait:
      regeneration_note: wiki tips — 1 new bait every 3 hours, capacity 10.
    equipment_max_level: 10
    kit_upgrade_priorities_tip: upgrade Line and Hook first; Sinker when needed.
    max_kit_stats_at_level_10_example:
      line_max_depth_m: 550
      hook_max_haul: 20
      sinker_starting_depth_m: 165

  optional_gem_items:
    price_gems_each: 300
    carry_unused_to_next_event: true
    items:
      - item_id: reel_stabilizer
        short: Reel stabilizer
        effect: line_withstand_up_to_4_shocks
      - item_id: lantern
        short: Lantern
        effect: visibility_below_300m_depth_treated_as_deep_ocean
      - item_id: ocean_scanner
        short: Ocean scanner
        effect: direction_and_distance_to_rare_fish

  icefisher_voucher:
    item_id: icefisher_voucher
    effect: 1.5x Fishing Token and Fishing Points for the round (per wiki/db wording).

  frost_prospect:
    description: >-
      Separate map/mode (Frost Prospect / Frosty Prospector) with higher chances for
      fish, items, rare divers. Wiki — one free map redemption per day. In this mode
      fishing gear is treated as maximum level (10) even if normal mode kit is lower.
    free_map_redemptions_per_day: 1
    gear_effective_level: 10
    optional_access_notes:
      - wiki tips mention packs / Ice Fishing Club packs as ways to obtain Frost Prospect access.

  daily_missions:
    metric: fishing_points_earned
    reset: daily_server_reset
    note: earning Fishing Points during the day clears these tiers (wording from wiki Missions section).
    tiers:
      - fishing_points: 250
        rewards:
          enhancement_xp_component_100: 1
          hero_xp_5k: 1
          general_speedup_5m: 2
      - fishing_points: 500
        rewards:
          enhancement_xp_component_100: 1
          hero_xp_5k: 2
          general_speedup_5m: 2
      - fishing_points: 1000
        rewards:
          enhancement_xp_component_100: 1
          hero_xp_5k: 3
          general_speedup_5m: 4
      - fishing_points: 1500
        rewards:
          enhancement_xp_component_100: 1
          hero_xp_10k: 2
          general_speedup_5m: 4
      - fishing_points: 2000
        rewards:
          lucky_hero_gear_chest: 1
          enhancement_xp_component_100: 1
          hero_xp_10k: 3
          general_speedup_5m: 6

  sunken_treasure_hunt:
    prerequisite_all_fishing_gear_level: 10
    cost_fishing_points_per_attempt: 1500
    summary: spend fishing points for a roll at excellent rewards (wiki phrasing).

  leaderboard:
    master_fisher_note: all fishing points count toward event ranking; wiki tips mention a 30-day skin reward for top placement.

  collection:
    categories:
      - fish
      - treasures
      - items
      - divers
    completion_rewards_by_category_note: >-
      finishing a category can grant cosmetics (wiki lists furnace skin, avatar
      frame, nameplate, and other skins per line).
    horn_of_poseidon:
      item_id: horn_of_poseidon
      effect: pick which fish species can appear while fishing for a guaranteed catch path (per wiki).

  guidebooks_collectibles:
    fish_guide:
      count: 150
      unlocks_reward_line: Treasure Stronghold (Permanent furnace skin) — troops attack +2.0%
    diver_guide:
      count: 10
      unlocks_reward_line: Ice Journey (Permanent march skin) — solo hunting march speed +5.0%
    chest_guide:
      count: 10
      unlocks_reward_line: Romance of Sailors (Permanent nameplate)
    memorabilia_guide:
      count: 60
      unlocks_reward_line: Romance of Sailors (Permanent avatar frame) — troops defense +2.0%
    persistence_note: guide progress persists after the event ends so you can finish across future seasons.

  packs_and_pass:
    event_pass: wiki — grants extra rewards and items that help fishing; bonus points while fishing.
    fishing_item_packs: sold separately.
    ice_fishing_club_note: wiki tips — earn fishing tokens for special items; packs may grant +20% XP Points and Tokens.

  cast_multipliers:
    available_when: all fishing equipment reaches maximum level
    multipliers: [2, 3, 4, 5]
    gadget_scaling_note: >-
      when using a multiplied cast, lantern / ocean scanner / reel stabilizer may
      need to be consumed in proportion to the multiplier selected.

  stages:
    ice_fishing: default drag minigame / main event screen.
    frosty_prospector: alternate mode with max-level kit, special fish and sunken chests (see frost_prospect).

  post_event:
    guidebooks_do_not_reset: true
    seasonal_fish_note: unique seasonal drops encourage finishing collection over multiple monthly runs.
