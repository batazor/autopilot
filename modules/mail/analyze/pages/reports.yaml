overlay:
  - name: mail.reports.gift.visible
    region: mail.gift
    action: findIcon
    threshold: 0.9
    min_match_saturation: 48
    screens:
      - mail.reports
    pushScenario:
      - name: mail.claim.reports

  - name: mail.tab.reports.has_red_dot
    region: mail.tab.reports
    isRedDot: true
    screens:
      - mail
      - mail.wars
      - mail.alliance
      - mail.system
      - mail.starred
    pushScenario:
      - name: mail.claim.reports
        ttl: 5m
