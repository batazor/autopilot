overlay:
  - name: backpack.main_city.entry.visible
    region: main_city.to.backpack
    action: findIcon
    template: modules/backpack/references/crop/main_city_vip_main_city.to.backpack.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    steps:
      - push_scenario:
          name: backpack
          ttl: 5m
  - name: page.backpack.resources.has_red_dot
    region: page.backpack.resources
    isRedDot: true
    screens:
      - backpack*
    steps:
      - push_scenario:
          name: backpack.tab.resources
          priority: 80_000
          ttl: 5m
