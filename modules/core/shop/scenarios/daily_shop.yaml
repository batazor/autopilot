enabled: true
name: "Shop: Collect free daily deals"

priority: 80_000

node: shop

steps:
  # Grab the free daily-deal box when available
  - ocr: box.free
    store: box_free_text
  - cond: "box_free_text == 'Free'"
    steps:
      - click: box.free
      - wait: 1s

  # Some UI transitions push a purchase warning overlay — wait it out
  - while_match: shop.tab.next_page
    max: 1
    retry:
      attempts: 3
      interval: 1s
    steps:
      - wait: 1s
      - ocr: box.free
        store: box_free_text
      - cond: "box_free_text == 'Free'"
        steps:
          - click: box.free
          - wait: 1s
