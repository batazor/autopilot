# Shop sub-pages: declare ``rules`` only (parent + sub-page title). Detection uses the
# same list as navigation verify. Sub-page entries need lower ``priority`` than ``shop``.
screens:
  shop.dawn_market:
    priority: 50
    rules:
    - match: page.shop.title
      threshold: 0.9
    - match: page.shop.dawn_market.title
      threshold: 0.9
  shop.mix_match:
    priority: 55
    rules:
    - match: page.shop.title
      threshold: 0.9
    - match: page.shop.mix_match.title
      threshold: 0.9
  shop.chief_stamina:
    priority: 55
    rules:
    - match: page.shop.title
      threshold: 0.9
      tab_active: shop.tab.chief_stamina
  shop.ice_conqueror:
    priority: 55
    rules:
    - match: page.shop.title
      threshold: 0.9
