# Shop sub-pages: use ``parent: shop`` so the parent's ``page.shop.title`` is the
# shared gate, plus ONE specific landmark per sub-page (sub-page title or tab).
# Rules across multiple list entries are OR-ed (any matches → screen wins), so
# the parent title MUST NOT be repeated as a separate sub-page rule — otherwise
# every sub-page fires whenever ``page.shop.title`` is on screen.
screens:
  shop.dawn_market:
    parent: shop
    priority: 50
    rules:
    - match: page.shop.dawn_market.title
      threshold: 0.9
  shop.mix_match:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.mix_match.title
      threshold: 0.9
  shop.chief_stamina:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.title
      threshold: 0.9
      tab_active: shop.tab.chief_stamina
  shop.ice_conqueror:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.title
      threshold: 0.9
      tab_active: shop.tab.ice_conqueror
  shop.construction_queue:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.construction_queue.title
      threshold: 0.9
  shop.daily_deals:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.daily_deals.title
      threshold: 0.9
  shop.weekly_monthly_cards:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.weekly_monthly_cards.title
      threshold: 0.9
  shop.regular_pack:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.regular_pack.title
      threshold: 0.9
  shop.dawn_fund:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.dawn_fund.title
      threshold: 0.9
  shop.get_gems:
    parent: shop
    priority: 55
    rules:
    - match: page.shop.get_gems.title
      threshold: 0.9
  shop:
    priority: 60
    rules:
    - match: page.shop.title
      threshold: 0.9
