screens:
  shop:
    priority: 50
    landmarks:
      - match: page.shop.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9

  # ── Shop tabs ────────────────────────────────────────────────────────────────
  # Each tab is a sub-node of shop. Detection uses the active tab title region.
  # Regions are added progressively as reference screenshots are captured.

  shop.mix_match:
    priority: 55
    landmarks:
      - match: mix_match.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
