screens:
  # ── Shop tabs ────────────────────────────────────────────────────────────────
  # Each tab is a sub-node of shop. Sub-pages MUST come before the generic
  # ``shop`` entry in detection order: ``page.shop.title`` is visible on every
  # sub-page, so a parent-first check returns ``shop`` even when the device is
  # on ``shop.dawn_market``. Lower ``priority`` value = checked earlier in
  # ``screen_verify_screen_names()``.
  shop.dawn_market:
    priority: 50
    landmarks:
      - match: page.shop.dawn_market.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.dawn_market.title
        threshold: 0.9

  shop.mix_match:
    priority: 55
    landmarks:
      - match: page.shop.mix_match.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.mix_match.title
        threshold: 0.9

  shop.chief_stamina:
    priority: 55
    landmarks:
      - match: page.shop.title
        threshold: 0.9
        tab_active: shop.tab.chief_stamina
    rules:
      - match: page.shop.title
        threshold: 0.9
        tab_active: shop.tab.chief_stamina

  shop.ice_conqueror:
    priority: 55
    landmarks:
      - match: page.shop.title
        threshold: 0.9
        tab_active: shop.tab.ice_conqueror
    rules:
      - match: page.shop.title
        threshold: 0.9
        tab_active: shop.tab.ice_conqueror

  shop.construction_queue:
    priority: 55
    landmarks:
      - match: page.shop.construction_queue.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.construction_queue.title
        threshold: 0.9

  shop.daily_deals:
    priority: 55
    landmarks:
      - match: page.shop.daily_deals.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.daily_deals.title
        threshold: 0.9

  shop.weekly_monthly_cards:
    priority: 55
    landmarks:
      - match: page.shop.weekly_monthly_cards.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.weekly_monthly_cards.title
        threshold: 0.9

  shop.regular_pack:
    priority: 55
    landmarks:
      - match: page.shop.regular_pack.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.regular_pack.title
        threshold: 0.9

  shop.dawn_fund:
    priority: 55
    landmarks:
      - match: page.shop.dawn_fund.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.dawn_fund.title
        threshold: 0.9

  shop.get_gems:
    priority: 55
    landmarks:
      - match: page.shop.get_gems.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
      - match: page.shop.get_gems.title
        threshold: 0.9

  # Generic shop hub — must be checked LAST (highest priority value) so the
  # sub-page landmarks above get first chance to win on a sub-page screen.
  shop:
    priority: 60
    landmarks:
      - match: page.shop.title
        threshold: 0.9
    rules:
      - match: page.shop.title
        threshold: 0.9
