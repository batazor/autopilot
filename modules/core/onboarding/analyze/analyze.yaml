overlay:
  - name: skip_button.visible
    region: skip_button
    action: findIcon
    device_level: true
    priority: 100_000
    threshold: 0.9
    ttl: 2s
    pushScenario:
      - name: onboarding.click.skip_button

  - name: onboarding.hand_pointer.visible
    region: hand_pointer
    action: findIcon
    device_level: true
    priority: 100_000
    threshold: 0.9
    ttl: 2s
    pushScenario:
      - name: onboarding.click.hand_pointer

  - name: onboarding.hand_pointer_small.visible
