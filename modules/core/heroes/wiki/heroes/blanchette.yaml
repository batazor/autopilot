skills:
- name: Triple Blunderbuss
  description: Blanchette's modified musket instantaneously hits 3 targets, dealing
    Attack* 200%/220%/240%/260%/280% damage, also blocking their healing for 5s.
- name: Scattershot
  description: Blanchette fires a blunderbuss shot of crystal shards, dealing Attack*
    100%/110%/120%/130%/140% Area of Effect Damage to targets in the area.
- name: Red Pursuit
  description: Blanchette the hunter always secures her kill, increasing her Damage
    Dealt by 10%/20%/30%/40%/50% at most as the target’s health decreases.
- name: Armed to the Teeth
  description: Blanchette works to ensure her forces are at least as well armed as
    she is, increasing all Troops' Lethality by 5%/10%/15%/20%/25% .
- name: Blood Hunter
  description: Blanchette's Marksmen fire a crystal blade every 3 rounds, dealing
    15%/30%/45%/60%/75% extra damage to the targets.
- name: Crimson Sniper
  description: Thanks to Blanchette's expertise in the art of sniping and her leadership,
    her Marksmen deal 8%/16%/24%/32%/40% extra damage to enemy Lancers and 4%/8%/12%/16%/20%
    extra damage to enemy Marksmen every 2 strikes.
- name: Hunter's Rage (Lv. 5)
  description: Blanchette is nothing if not a passionate hunter, increasing her Attack
    Speed by 30% and extending the healing block of Triple Blunderbuss by 5s.
- name: Lightning Strike (Lv. 5)
  description: Enemy formations have no chance against Blanchette's lightning fast
    Rally, increasing Rally Troops’ Lethality by 15%.
