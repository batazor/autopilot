skills:
- name: Cthugha's Protection
  description: Ahmose wields his robust shield, entering an invulnerable state (unable
    to move or cast skills, immune to control effects) and reducing damage taken by
    30%/40%/50%/60%/70% for nearby friendly troops for 2s.
- name: Daybreak Knife
  description: Ahmose pierces the enemies at the front with a sharp spear, dealing
    Attack* 70%/77%/84%/91%/98% damage, tearing apart the enemy’s defense, and making
    enemies take 20% more damage for the next 2s.
- name: Ancestral Blessing
  description: The energy of Fire Crystal, which is akin to the blessing of ancestors,
    heals Ahmose’s wounds. After casting "Cthugha’s Protection", Ahmose will recover
    Attack* 30%/33%/36%/39%/42% Health for 5s.
- name: Viper Formation
  description: Ahmose revives the lost art of ancient guardians. His Infantry pauses
    the attack once every four times, reducing damage taken by Lancers and Marksmen
    by 10%/15%/20%/25%/30% and Infantry by 10%/25%/40%/55%/70% for 2 turn.
- name: Prayer of Flame
  description: Ahmose amplifies the combat spirit of friendly Infantry with the power
    of the Fire Crystal, increasing their damage dealt by 20%/40%/60%/80%/100% .
- name: Blade of Light
  description: Ahmose infuses friendly Infantry's weapons with the essence of Fire
    Crystals, increasing his infantries' damage per attack by 12%/24%/36%/48%/60%
    and the target's damage taken by 5%/10%/15%/20%/25% for 1 turn.
- name: Unyielding Determination (Lv. 5)
  description: Ahmose imbues allies with steadfast conviction, increasing Attack by
    42% for friendly troops under Cthugha’s Protection for 2.5s.
- name: Oath of Guardian (Lv. 5)
  description: Ahmose fortifies the city with the resolve of a guardian, increasing
    Defender Troops' Health by 15%.
