story: 'Ahmose hailed from an ancient clan of guardians whose sacred duty was to safeguard
  the Cthugha''s Heart - an active Fire Crystal - and regulate its use. With the assistance
  of these guardians, the Solaris Dynasty came to possess control over the energy
  of the Fire Crystal.


  However, when the kingdom attained great power, the king betrayed his protectors
  and banished them. The Fire Crystal subsequently entered a dormant state, and the
  fate of the guardians remained shrouded in mystery.


  Recently, Ahmose''s weapon alerted him to the reawakening of the Fire Crystal. As
  one of the last surviving descendants of the guardians, he left his clan behind
  and embarked on a mission of vengeance. After arriving at his destination, Ahmose
  was confronted with the reality that the former empire had collapsed. This left
  him in a dilemma as to whether he should support or oppose the new ruler of Sunfire
  Castle.


  Ahmose’s spear and shield were once the sources of pride for his ancestors. The
  two weapons were infused with the energy of Fire Crystal and thus became alive.
  Once lost, the weapons were found when Ahmose heard their call. He restored them
  through forgery like he was rebuilding the former glory of his ancestors.


  After spending some time in the Sunfire Castle, Ahmose was certain that the new
  president was not a tyrant like the ruler of the old empire. By talking to the Cthugha’s
  Heart using his gift of resonating with it, he was sure that the president was the
  ruler acknowledged by many.


  Cthugha’s Heart released Ahmose from his destiny as a guardian and gave him and
  his clansmen their freedom. Without the mission as a guardian, Ahmose suddenly lost
  his direction in life. Fortunately, his courage and outstanding combat skills won
  him the admiration of the chiefs. Now, he protects newly built cities and helps
  the survivors struggling in the extremely cold with his shield.'
