story: 'Flint is the flame that is always ready to burn down Phaethon in his vengeance.
  It’s almost certain that his personal crusade against Phaethon will only end in
  either his or Phaethon''s demise.


  Flint and his ragtag followers (most of whom have suffered at the hands of Phaethon)
  often partnered with the Dawn Alliance in their fight against Phaethon''s forces.
  Bahiti and the others knew that Flint would never take an innocent life. As for
  criminals and wrongdoers? They won’t receive any mercy from Flint''s hands.


  Flint was a high-ranking military officer. In a scouting mission, he got separated
  from his own platoon and ended up in a remote City known as “Arcadia”. That City
  was the closest thing to utopia - a place filled with theaters, auditoriums, and
  even libraries! The City did not have weapons; its citizens were peace-loving scholars,
  so they do not see a need for firearms.


  Flint fell in love with the City and the machinist Jessie. His time in Arcadia made
  him believe a bright future can be built even in this icy world. His hope and belief
  were soon destroyed in a horrible raid on Arcadia.


  An emissary from Phaethon showed up at Arcadia’s door and demanded the immediate
  transfer of all knowledge pertaining to "fire crystal". The Chief refused, knowing
  full well their research can be turned into destructive weapons of war. When Phaethon
  razed the City to the ground, Flint was the only fighter that put up a resistance.
  He was terribly injured during the fight but somehow survived the ordeal.His hopes
  for a better future are now replaced by a burning desire for vengeance.


  Flint and Jessie crossed paths again many years later.Embers of the couple''s old
  affection still remained, but Jessie could not approve of Flint''s all-consuming
  quest for vengeance. Flint will always hold a special place in Jessie''s heart,
  but she can never bring herself to love a man dedicated to destruction. The former
  lovers have now drifted apart.'
