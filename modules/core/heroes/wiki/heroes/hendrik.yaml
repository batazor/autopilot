skills:
- name: Song of R'lyeh
  description: Hendrik summons ancient spirits from the dark abyss to attack the enemies,
    dealing Attack* 220%/240%/260%/280%/300% damage to targets within range and stunning
    them for 1.5s.
- name: Sinking Anchor
  description: Captain Hendrik hurls a heavy anchor with unbelievable strength, dealing
    Attack* 100%/110%/120%/130%/140% damage to enemies within range.
- name: Lamprey's Kiss
  description: Captain Hendrik possesses an uncanny ability to harness power from
    others, dealing 0.5%/1%/1.5%/2%/2.5% more damage with each defeated enemy (max
    15 stacks)
- name: Worm's Ravage
  description: Captain Hendrik commands a gigantic naval shipworm gnaw at the enemies’
    armor reducing all enemy troops’ Defense by 5%/10%/15%/20%/25% .
- name: Armor of Barnacles
  description: Hendrik covers all friendly Troops with a layer of hard-shelled barnacles
    every 4 turns, increasing their Defense by 6%/12%/18%/24%/30% for 2 turns.
- name: Dragon's Heir
  description: Every 3 turns, the ancient abyssal spirit’s descendants will work together
    with Hendrik’s Marksmen to launch an attack, dealing 8%/16%/24%/32%/40% damage
    to all enemies.
- name: Hydra’s Dance (Lv. 5)
  description: When the spirit summoned by Song of R’lyeh is gone leaving behind moving
    tentacles that attract nearby enemies to attack. The tentacles have 30% of Hendrik’s
    initial Health and exist for 5s.
- name: Abyssal Blessing (Lv. 5)
  description: The ancient abyssal spirit’s blessing increases the Rally Troops' Attack
    by 15%.
