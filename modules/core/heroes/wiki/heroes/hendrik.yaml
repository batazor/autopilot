story: 'Captain Hendrik is a firm believer in the "Sunken Nation" legend. He has dedicated
  most of his life to navigating the depth of the ocean in darkness aboard his beloved
  giant submarine, The Neptune, only to search for the mythical, lost ruins. Occasionally,
  he surfaces to interact with the outside world, trading treasures found in the ocean
  for supplies. While he is well-mannered on one hand, he sometimes speaks and behaves
  eccentrically on the other. Many speculate that he has gone mad. After all, more
  than ten thousand hours spent exploring the deep sea must have taken a toll on him
  psychologically. Still, his profound knowledge of navigation and his remarkable
  talent in naval warfare are not to be doubted.


  Hendrik was good-looking, wealthy, and full of charisma in his youth. However, the
  long-term lack of exposure to sunlight has utterly changed him. Now, he looks old
  and haggard, giving out a depressed vibe and an unpleasant smell that repels others.
  Hendrik is oblivious to the changes, as impractical items like mirrors are not found
  on The Neptune. One day while in town, he happened to catch sight of his own reflection
  and thought that some evil sorcerer had cast a spell on him or that mirror.


  Many have attempted to look for the "Sunken Nation," mostly because of the treasure.
  However, Hendrik is different. He believes that the legendary lost nation is the
  destination for his soul. Hendrik was once an ambitious navigator who encountered
  a shipwreck during a voyage. As he sunk into the icy ocean along with the vessel,
  he caught a glimpse of an ancient underwater city before losing consciousness. By
  the time he woke up, he found himself in a coastal town. Some dismissed what he
  saw as a mere hallucination in his dying moments, yet no one could explain how he
  survived such a critical situation.


  Hendrik was convinced that he was rescued by an envoy of the "Sunken Nation," as
  he often heard calls from there in his dreams. Driven by this belief, he vowed to
  find the ancient city at all costs.


  Hendrik returned to the sea area where the shipwreck happened, but his search for
  the "Sunken Nation" ended up futile. Nevertheless, he was not ready to give up just
  yet.


  He broke the bank and built a gigantic submarine called "The Neptune," believing
  that the ancient city had merely "moved" to another part of the sea. Although The
  Neptune was capable of traversing the seven seas, few were willing to be a part
  of his crazy plan, except for those treasure hunters who believed in the treasure
  of the "Sunken Nation." Hendrik had no choice but to attack other ships and commandeered
  their crews to serve aboard his vessel. Those lucky survivors often mistook the
  assaults for attacks by sea monsters.


  The time Hendrik spent talking to the murmurs in his dreams has granted him the
  special ability to communicate with the sea creatures around his submarine in astonishing
  ways, as if through telepathy. These sea inhabitants are his helpers whenever he
  finds himself in trouble.'
