story: '"What did you say? Speak up!" The townsfolk have gotten used to the gruff
  male voice of Charlie.


  The loud and rough Charlie has had a long career as an explosives demolitionist.
  A lot of people associate Charlie with his dangerous job and keep a distance from
  him.


  However, just talk to Charlie and you will know this man has a heart of gold. Moreover,
  his constant yelling has nothing to do with an angry attitude. It''s a side effect
  of years of explosives on Charlie''s ear drums.


  Charlie''s explosives knowledge is invaluable for the difficult coal mining process.
  Despite his scruffy appearance, he is extremely attentive to detail. This helped
  him to stay safe in a risky line of work.


  Charlie prefers to stay behind the battlefield wherever possible but is certainly
  not scared of a fight. Enemies will quickly discover the power of chemistry over
  swords. Not only is Charlie an expert on a wide variety of explosives and grenades,
  but his strong arms provide decent throw range. Charlie has not won the battlefield
  nickname "the grenadier" for nothing.


  There are two guaranteed ways to provoke Charlie: the first is to violate safety
  procedures during the coal mining process. The second is to attempt to plunder fellow
  workers'' hard-won resources. Crazy Joe and his bandits have learned that lesson
  the hard way. Nothing has ever sent Joe''s bandits into a full retreat as quickly
  as Charlie''s explosions.


  Joe has not taken Charlie''s explosive retaliation to heart. In fact, Joe has become
  quite interested in Charlie''s potential as a fellow outlaw. He often dreams about
  what he could do with someone like Charlie in his group. Fortunately, Charlie does
  not know, nor does he care about Joe''s interest in him.'
