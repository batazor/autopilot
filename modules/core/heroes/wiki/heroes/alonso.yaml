skills:
- name: Trapnet
  description: Alonso casts a wide net over the target area, dealing Attack* 200%/220%/240%/260%/280%
    Area of Effect Damage and immobilizing enemies for 1.5s.
- name: Tidal Force
  description: Alonso shoots a harpoon with tsunami-like force at a target, dealing
    Attack* 50%/55%/60%/65%/70% Area of Effect Damage.
- name: Harpoon Blast
  description: Alonso's heavy harpoon can really do some damage, stunning targets
    for 0.2/0.2/0.4/0.4/0.5s after every 8/7/7/6/5 strikes.
- name: Onslaught
  description: Alonso attacks like the waves, granting a 40% chance of increasing
    all troop's Lethality by 10%/20%/30%/40%/50%
- name: Iron Strength
  description: Alonso's indomitable will grants all troops' attack a 20% chance of
    reducing damage dealt by 10%/20%/30%/40%/50% for all enemy troops for 2 turns.
- name: Poison Harpoon
  description: Alonso coats weapons with lethal toxins, granting all troops' attack
    a 50% chance of dealing + 10%/20%/30%/40%/50% more damage.
- name: Ocean's Bounty (Lv. 5)
  description: Alonso knows how to share the spoils of success, with his fresh fish
    meals healing your weakest hero by 15% with each basic attack.
- name: Harpoon Enhancement (Lv. 5)
  description: Alonso has made some modifications to your troops' weapons, boosting
    Rally Squad Lethality by 15%.
