story: 'The legends of Alonso "the whale hunter" was known far and wide.\nHe is described
  as a stout, well-built man of few words. He always carries his netting and trusty
  harpoon wherever he goes. This whale hunter travels from one seaside town to another
  in search of good ale and the intel on a certain sea monster.


  According to the stories, the monster that Alonso seeks is the same one that slaughtered
  his entire crew 30 years ago. He wishes to settle scores with the mythical "Leviathan"
  that took his crew, his friends, and his family...


  The creature "Leviathan" grows more bizarre with each tavern retelling. Apparently,
  the beast has a huge horn and a body that spans hundreds of meters. Many laughed
  at such an impossible tale behind Alonso''s back, but none dared to mock Alonso
  to his face. After all, this man is capable of taking down Giant Apes and Cryptids
  single-handedly.


  Alonso had defended many Cities from pillagers during his travel. In one instance,
  all the townsfolks panicked at the sight of bandits but Alonso rallied them and
  organized an excellent defense. When he gave orders, Alonso was like the captain
  of a City-sized ship.


  Not long ago, he caught a glimpse of a former crew member that was supposedly killed
  by "Leviathan" many years ago.\nAlonso refused to believe it had been a trick of
  the eyes. He questioned half the town and finally learned his former crew is now
  a slave onboard a giant, steam-powered submarine called the "Neptune". "That’s it..."
  Alonso thought to himself, "Leviathan is not a monster, but a submarine!". Now,
  he hopes to find Neptune and reunite with his former crew.


  To Alonso, there is not much difference between hunting down a Leviathan and a lot
  of bandits.'
