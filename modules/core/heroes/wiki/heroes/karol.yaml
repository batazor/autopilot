story: 'There is a flutter and howl on the battlefield unlike any other. Allies know
  salvation is at hand and enemies quake with fear: the charge of the Eagle Brigade
  has come. With lances, swords, and cleansing steel, the Eagle Brigade can quickly
  crisscross the battlefield to win crucial victories for their cause.


  Karol may be one of the youngest in the Brigade''s history but he has already achieved
  near legendary status among his men for mastery of war on horseback and long string
  of successes in war.


  Karol''s hometown was known before the Great Chill for endless fertile fields and
  excellent stables, which continue to supply horses into the tundra. Humble families
  like Karol''s and their frost-hardened horses have become the backbone of the Eagles
  and bulwark to a number of cities along the plains region.


  Karol was always interested in joining the Eagles. What boy wouldn''t dream of being
  part of a heroic brigade defending people''s lives? Yet visiting recruiters nearly
  rejected the rather short and stocky Karol until he proved them wrong with a stunning
  display of footwork that left the recruiter flat on his back.


  Karol''s cohort received a baptism of fire when a group of mercenaries equipped
  with Helios Cannons and plated steam-tanks arrived with imperial ambitions. The
  Eagles were ill-prepared for such devilry. Karol''s hometown would likely have fallen
  had a fierce blizzard not intervened.


  Snowstorms may be bad for horses, but they are even worse for siege engines and
  Helios Cannons. By morning the blizzard had eased and what was left of the defenders
  saw their chance. Karol sounded the horn for the defiant final charge of the Eagles.


  Karol rode with his commander into the thick of the action while a smaller group
  attacked from the flank. The battle lasted until the middle of the day until the
  invaders signaled a general retreat. Losses were terrible.


  Karol took up the standard from his fallen commander. He surveyed the victory. There
  were so few of them now. But he saw in his men''s eyes that the Eagles had found
  a new leader, one much younger than expected. Karol would have to move quickly.
  New alliances must be found to keep such enemies far away from home.'
