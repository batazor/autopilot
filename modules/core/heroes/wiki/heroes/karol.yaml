skills:
- name: Dawn Charge
  description: The dawn sun lights a path for Karol's invincible charge, lancing frontal
    enemies with Attack* 200%/220%/240%/260%/280% area damage and reducing their Defense
    by 5%/10%/15%/20%/25% for 2 seconds.
- name: Bristling Strike
  description: Karol launches a blistering series of strikes dealing Attack* 100%/110%/120%/130%/140%
    damage against enemies within a certain area.
- name: Soaring Victory
  description: The taste of victory gives sweet succor to the warrior, increasing
    Karol's Attack by 4%/6%/8%/10%/12% for every fallen hero enemy while restoring
    2%/4%/6%/8%/10% of Health.
- name: In the Wings
  description: A great offence is a great defense in the case of Karol's cavalry diversions,
    reducing all troops' damage taken by 4%/8%/12%/16%/20% .
- name: Shieldbreaker
  description: Karol knows exactly where enemy infantry are weakest against forces
    like his own, increasing all troops' Damage Dealt to Lancers by 6%/12%/18%/24%/30%
    and 5%/10%/15%/20%/25% to Infantry.
- name: Standard of Ages
  description: Karol has turned the lessons of past brigades into a roadmap for victory,
    increasing all Troops' Attack by 3%/6%/9%/12%/15% and Defense by 2%/4%/6%/8%/10%
    .
- name: Eagle Flutter (Lv. 5)
  description: The howling flutter of Karol's Eagles is instantly recognizable, spurring
    an increase in friendly Squad Attack by 14% and Movement Speed by 100% for 5 seconds
    with every Dawn Charge.
- name: Triumphant March (Lv. 5)
  description: Karol's Eagle Brigade often relies on combined arms, enhancing his
    Rally Squad Attack by 15%.
