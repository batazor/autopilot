story: 'Norah''s three defining qualities must be her remarkable courage, leadership
  of a light mechanized brigade, and identity as one of very few truly exceptional
  leaders in the Dawn Alliance.Norah and her brigade often penetrate deep into enemy
  territory with the speed of an arrow,undertaking reconnaissance missions, strikes,
  and rescue operations. And the combination of Norah''s tactical brilliance, timing
  on the battlefield, and weapons expertise makes her an absolute nightmare for Phaethon.Norah''s
  exceptional calmness under pressure and decisive demeanor impress even the most
  seasoned soldiers-even against near-insurmountable odds. If anything could possibly
  disturb Norah''s resolve, it must be fears for her younger sister Gwen''s safety.


  Norah may have been part of the same training cohort as Bahiti at the Academy, but
  the two could not be more different. Unlike Bahiti, Norah is a a master battlefield
  commander and tactician with little interest in anything unrelated to the intricacies
  of fighting since her scientist father''s tragic fate.Norah has developed the firm
  belief no amount of knowledge can compare to what truly matters:safeguarding those
  she holds dear.


  Norah was only a child when she spotted Phaethon''s columns advancing toward her
  father''s laboratory.All her father''s brilliance, his vast wealth of knowledge,
  proved powerless in saving him from the dreadful fate that followed. Norah stood
  resolute by her father''s side, receiving his final testament and instructions on
  how to flee, all while her baby sister Gwen remained cradled in swaddling clothes.
  With aheavy heart, Norah carried Gwen to their father''s steam-powered sled and
  escaped with the great


  driving skills he had carefully fostered.Eventually, she stopped to look back at
  the lab. All she could see was rising smoke.


  Norah and her sister were rescued by her father''s colleagues at the Dawn Alliance.
  This encounter ignited a burning hatred for Phaethon, an unyielding dedication to
  her younger sister, and zeal for the path of the warrior-soldier within Norah.In
  the course of time Norah''s younger sister has become something of a weak spot in
  Norah''s rigid life-or perhaps Norah''s only soft spot. Unlike Norah, Gwen showed
  extraordinary talent as an inventor, a challenge for Norah who would have preferred
  Gwen to focus more on ordinary combat skills. Yet Norah could not bring herself
  to spar against Gwen even in a controlled setting, the thought of an accident and
  fresh grief too much to bear. Yet Norah has since grown to value Gwen''s ingenuity
  on the battlefield, especially when rescuing fellow soldiers.And over time Norah
  has gradually come to terms with the reality that Gwen has found her own strong
  and independent footing.'
