skills:
- name: Rapid Bombardment
  description: Lloyd summons three propeller bombs to attack the target, each dealing
    Attack* 70%/77%/84%/91%/98% AoE damage.
- name: Weakness Focus
  description: Lloyd fires bullets at the target's weaknesses, dealing Attack* 100%/110%/120%/130%/140%
    and exposing the weaknesses for 3s, during which the target takes 10%/12.5%/15%/17.5%/20%
    more damage.
- name: Practiced Perfection
  description: Lloyd sharpens his combat skills with the craftsman's spirit, increasing
    his Attack Speed by 10%/15%/20%/25%/30% .
- name: Bird Invasion
  description: Lloyd summons a large number of mechanical birds to disrupt enemies,
    reducing their Lethality by 4%/8%/12%/16%/20% .
- name: Iceflare Bomb
  description: Lloyd prepares special bomb for all Lancers, which detonates every
    3 turns, increases their attack by 30%/60%/90%/120%/150% and releases frosty mist
    that reduces enemy Lethality by 6%/12%/18%/24%/30% for 1 turn.
- name: Ingenious Mastery
  description: Lloyd works to equips his forces with unstable by interesting creations,
    granting a 40% chance to increase all Troops' Lethality by 10%/20%/30%/40%/50%
    .
- name: Frosty Whisper (Lv. 5)
  description: Lloyd's mechanical cuckoos freeze the bullets with liquid nitrogen,
    making his normal attacks deal Attack*15% extra damage and reducing the target's
    Attack Speed by 15% for 2s. The effects are not stackable.
- name: Steel Maze (Lv. 5)
  description: Lloyd installs traps on the barricade to assist in the defense, increasing
    Defender Troops' Attack by 15%.
