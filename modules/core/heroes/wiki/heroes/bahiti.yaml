story: 'Bahiti and his mammoth-drawn carriage has become one of the most famous symbols
  of the Dawn Alliance. He travels over ice and snow, from City to City, and encourages
  struggling survivors to establish shelters of their own. His arrival often means
  essential medicines, supplies, and a message of hope from the Dawn Alliance.


  Bahiti spent much of his life in the inhospitable wasteland and makes the perfect
  candidate for an emissary. Fighting against Phaethon helped him to hone his marksmanship
  and leadership.


  Bahiti has met plenty of capable fellow survivors on his job. Explorer Cloris and
  soldier Sergey are two of his dependable teammates. Even the most powerful bandits
  are wary of picking a fight with such a popular figure.


  Earlier members of the Dawn Alliance found Bahiti as a defenseless child in an abandoned
  shelter. They raised Bahiti and taught him all about hope and justice. When Bahiti
  grew up, he became Dawn Alliance’s most loyal follower and the representative of
  its ideals.


  His mentor at the Dawn Alliance came up with a theory: What if our planet itself
  was responsible for deviating from its orbitary plane and causing the Great Chill?
  In other words, could the planet be a living entity? If so, then surely there must
  be a way to communicate... and return it closer to the sun.


  Bahiti''s mentor has long passed, and none of his theories were ever confirmed.
  Still, Bahiti searches for a way to start conversing with the planet.'
