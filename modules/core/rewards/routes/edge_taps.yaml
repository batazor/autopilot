# Generic reward popup exit: tap-anywhere returns to main_city. Both
# ``button.tap_anywhere_to_exit`` (variant ``rewards.title``) and
# ``button.click_to_continue`` (VIP-styled ``rewards.title.v2``) are defined
# in this module's ``area.yaml`` under the ``rewards`` screen entry.
edges:
  rewards:
    main_city: [button.tap_anywhere_to_exit, button.click_to_continue]
