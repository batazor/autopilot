overlay:
  - name: isNewPeople.visible
    region: isNewPeople
    action: findIcon
    threshold: 0.9
    screens:
      - main_city
    ttl: 2s
    pushScenario:
      - name: welcome_new_survivors

  - name: isWorkers.visible
    region: isWorkers
    isRedDot: true
    screens:
      - main_city
      - survivor_status.status
    pushScenario:
      - name: assign_worker

  - name: survivors.intro.visible
    region: survivors.intro
    action: findIcon
    priority: 90_000
    threshold: 0.9
    ttl: 3
    screens:
      - survivor_status
    pushScenario:
      - name: survivors_intro
