overlay:
  - name: isNewPeople.visible
    region: isNewPeople
    action: findIcon
    threshold: 0.9
    screens:
      - main_city
    ttl: 2s
    pushScenario:
      - name: welcome_new_survivors

  - name: isWorkers.visible
    region: isWorkers
    isRedDot: true
    screens:
      - main_city
      - survivor_status.status
    pushScenario:
      - name: assign_worker
