overlay:
  - name: trials.main_city.event_icon.visible
    region: main_city.icon_search
    action: findIcon
    template: modules/events/trials/references/event.trials.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    pushScenario:
      - name: event.trials
        ttl: 1m

  - name: trials.day.1.has_red_dot
