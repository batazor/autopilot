enabled: true
name: Vault of Enigma
node: deals.vault_of_enigma
icon: vault_of_enigma
steps:
  - while_match: vault_of_enigma.box
    isRedDot: true
    max: 1
    steps:
      - click: vault_of_enigma.box
      - wait: 1s

  - while_match: button.claim
    max: 3
    steps:
      - click: button.claim
      - wait: 1s
  - while_match: button.claim.big
    max: 3
    steps:
      - click: button.claim.big
      - wait: 1s
      - click: tapanywhereyoexit
