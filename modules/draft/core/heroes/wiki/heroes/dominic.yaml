story: 'Dominic is the most brilliant magician to be found on the tundra. Not even
  Mia, renowned for her mastery of illusions, can match his remarkable skill and boundless
  imagination. So impressed was she by his extraordinary talent that she invited him
  to join her caravan on its journey across the land.


  From teleportation and telekinesis to levitating the caravan, conjuring elegant
  ladies from paintings, or transforming audience into portraits—his inventive performances
  never fail to bring the house down. Thanks to him, the caravan rakes in a fortune.
  Yet, the applause of the crowd seems to leave him indifferent, as his sole passion
  lies in crafting even more breathtaking magic.


  Beyond the elaborate setups for his illusions, Dominic also excels at designing
  a range of concealable weapons, such as umbrellas that fire tranquilizer darts and
  boxes that unleash powerful punches. These ingenious tools help the caravan to turn
  the tables in the face of unexpected ambushes.


  Physically strong and fearless, Dominic never fails to slip away from danger, using
  his masterful escape techniques to defy the odds.


  On top of all his talents, Dominic is a master of disguise, able to gather vital
  intelligence for Mia with impeccable personas. What baffles her, however, is that
  while he effortlessly mingles with people in disguise, once he reverts to his true
  self, he becomes cold and utterly unapproachable.


  In contrast to many members of the caravan, who have complex backgrounds or are
  on the run from enemies, Dominic is just an average man, making him an anomaly.


  Dominic was once a wanderer with no place to call home, but that was due to his
  eccentric personality putting him at odds with the powerful. Joining the caravan
  has granted him true freedom, allowing him to focus entirely on perfecting his magic
  without needing to interact much with his quirky companions. With Mia''s wealth,
  even his wildest ideas can be brought to life.


  Dominic''s father was once the most prominent magician in town, until the arrival
  of an engineer who ruined everything by seeing through even the most intricately
  designed tricks before they were completed. As the magic shows quickly lost their
  appeal, Dominic''s father, disheartened, left home in search of greater skill.


  In the beginning, Dominic''s passion for magic was fueled by a desire to create
  the perfect illusion his father had always dreamed of, believing it would make his
  father stay if he ever returned. As he grew, he eventually crafted the ultimate
  trick that fooled everyone, including the engineer, but he never saw his father
  again. Still, the genius was not disappointed; he realized that magic was the only
  thing that truly mattered to him.'
