skills:
- name: Box Trick
  description: Dominic conjures three magical boxes around the target, each delivering
    heavy punches the deal Attack* 200%/220%/240%/260%/280% Area Damage and stun the
    target for 1s
- name: Scorching Roses
  description: Dominic hurls rose that transforms into flames, dealing Attack* 100%/110%/120%/130%/140%
    damage and setting the target on fire which deal Attack* 4%/6%/8%/10%/12% damage
    every 0.5s for 2s
- name: Double Trouble
  description: Dominic uses illusions to escape. When his Health drops to zero, he
    vanishes and reappears in a magical box 5 seconds later with 10%/20%/30%/40%/50%
    Health. This skill can be used once per battle.
- name: Mystic Mechanism
  description: Dominic equips his troops with weapons cleverly crafted from magic
    props, increasing damage dealt by 4%/8%/12%/16%/20% for all troops.
- name: Spiky Assault
  description: Dominic equips his Lancers with secret deices that launch poisonous
    spikes, increasing their damage dealt per attack by 12%/24%/36%/48%/60% . Poisoned
    targets receive 5%/10%/15%/20%/25% more damage for 1 turn.
- name: Mirror Maze
  description: Dominic disrupts enemy strategies by performing optical tricks with
    a mirror, reducing damage take by Infantry and Marksmen by 3%/6%/9%/12%/15% and
    increasing their damage dealt by 3%/6%/9%/12%/15%
- name: Illusion Mastery
  description: Dominic perfects his magical skills through dedicated practice, increasing
    his damage dealt by 25%
- name: Grand Fantasy
  description: Dominic turns the battlefield into his stage, increasing Rally Troops'
    Lethality by 15%
