skills:
- name: Starfall Impact
  description: Rufus fires grenades that bombards the ground like meteors, dealing
    Attack* 200%/220%/240%/260%/280% AoE damage. The grenades set the ground ablaze,
    dealing Attack* 20%/22.5%/25%/27.5%/30% to targets within range every 0.5s for
    2s.
- name: Splinter Blast
  description: Rufus fires explosive bullets, dealing Attack* 100%/110%/120%/130%/140%
    damage to the target. The splinters deal Attack* 50%/55%/60%/65%/70% damage to
    nearby enemies.
- name: Raging Fury
  description: Rufus morphs into an unstoppable presence on the battlefield, increasing
    his Crit Rate by 7%/10%/13%/16%/20% .
- name: Inferno Regiment
  description: Rufus uses his bold leadership to transform all troops into blazing
    flames on the battlefield, increasing their Attack by 5%/10%/15%/20%/25% .
- name: Armor Crush
  description: Rufus equips his Marksmen with armor-piercing rounds, dealing 12%/24%/36%/48%/60%
    extra damage for each attack and increases the target's damage taken by 5%/10%/15%/20%/25%
    for 1 turn.
- name: Wrathful Quake
  description: Rufus' aggressive combat style grants all troops a 20% chance to intimidate
    enemies, reducing their Lethality by 10%/20%/30%/40%/50% for 2 turns.
- name: Ember of Conflict (Lv. 5)
  description: Rufus' normal attacks shoot scorching bullets that set the target on
    fire, dealing Attack*30% damage per second for 2s.
- name: Blazing Legion (Lv. 5)
  description: Rufus rallies his troops under his phoenix banner, increasing their
    Attack by 15%.
