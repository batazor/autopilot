skills:
- name: Frenzied Slashes
  description: Hank switches his circular saw to "Frenzy" mode to perform two slashes
    in a row. Each slash deals Attack* 120%/130%/140%/150%/160% damage to frontal
    enemies within range, while also reducing their Defense by 10%/15%/20%/25%/30%
    for 2s.
- name: Urgent Energy
  description: Hank's backup power unit activates when things get tough, increasing
    his circular saw's destructive power. When Hank's Health drops below 50%, his
    Attack increases by 10%/15%/20%/25%/30% . This can be triggered once per battle.
- name: Recycle & Reuse
  description: As a master of improvisation, Hank can use combat scrap to heal himself.
    10%/15%/20%/25%/30% of Hank's damage dealt is converted into Health for himself.
- name: Roaring Rage
  description: Hank's rage and the roaring of his chainsaw ignite the fighting spirit
    of all troops, boosting all troops' Lethality by 5%/10%/15%/20%/25% .
- name: Flying Sparks
  description: The sparks of the chainsaw ignite allied morale. For every 5 attacks
    Hank's Infantry perform, the damage dealt by all allied troops is increased by
    5%/10%/15%/20%/25% , while their damage taken is reduced by 5%/10%/15%/20%/25%
    .
- name: Raging Force
  description: Hank's wild attacks weaken enemy morale. Every 4 turns, the damage
    taken by enemy Infantry is increased by 6%/12%/18%/24%/30% , while the damage
    dealt by enemy Marksmen is reduced by 6%/12%/18%/24%/30% . This effect lasts for
    2 turns.
- name: Steel Barricade
  description: Slash your heart away under the protection of sturdy armor. Hank gains
    a shield worth Attack*220% when using the Frenzied Slashes skill for 3 seconds.
- name: Wall of Despair
  description: Hank's courage and willpower bolster defenses, increasing the Health
    of Defender Troops by 15%.
