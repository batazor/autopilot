story: 'Atop the vast tundra lie regions where humanity struggles to survive, whether
  due to harsh terrain or wild beasts. The mission of the Icebreaker Alliance is to
  conquer these perilous lands and expand the horizons of human civilization to survive
  this long winter of raging winds and heavy snow. Hank belongs to the Icebreaker
  Alliance as one of its fearless pioneers.


  Gifted with tremendous strength and great courage, Hank has developed immense willpower
  through his decades of pioneering adventures, including countless clashes with bandits
  amidst the lawless icefields. Through all those battles, Hank mastered the art of
  wielding a variety of hand tools as weapons, allowing him to take on up to ten enemies
  at a time.


  The Icebreaker Alliance''s most celebrated achievement has to be the establishment
  of Arena tournaments that swept across the tundra, of which Hank is a massive fan.


  He knows the stats of every Arena legend by heart, possesses a deep understanding
  of Arena tactics and formations, and he''s even put forth new strategic concepts
  of his own. Armed with such strength and skill, Hank could certainly find success
  in the Arena himself, but he seems happy to remain a spectator. Anyway, the tactics
  he learns from watching matches are all useful in his everyday combat work.


  Hank might seem like just another tough guy, but he''s also got a tender heart.
  His chainsaw is rugged, but he can also use it to craft exquisite works of art,
  including carvings in ice and wood. He even dreams up fantastic stories for the
  lifelike figures he creates, which tundra children find enthralling. Not only that,
  but Hank is also a chef who specializes in desserts. Patrick often uses him as a
  taste-tester to sample his wildly imaginative new dishes.'
