story: 'Sonya is the chief engineer on The Neptune, a submarine. Despite only joining
  the crew a few years ago, she has risen as a queen-like presence on the submarine.
  The rundown vessel is spared from frequent breakdowns, thanks to her exceptional
  skills.


  Just like the captain, Sonya longs to find the "Sunken Nation", but she is only
  interested in the treasure. Some are surprised by her belief in the elusive legend,
  given how rational and wise she is. The truth is, Sonya had already secured clues
  leading to the underwater nation from various ancient ruins around the world even
  before joining The Neptune. She believes she will find her long-desired treasure
  with her wisdom and Hendrik''s vessel.


  Initially, Sonya boarded The Neptune as a prisoner. When Captain Hendrik realized
  she could let herself free using her skills and intelligence, and no one could stop
  her, he simply allowed her to roam freely on the vessel.


  Everyone knows that Sonya and Hendrik are merely using each other. Once there is
  a conflict of


  interests, they will turn against each other. At least for now, their "partnership"
  has been going well. The crew members find Sonya intimidating not only because of
  her physical prowess but also because she knows everyone''s secrets and weaknesses
  and how to exploit them.


  Sonya''s desire for wealth stems from her past. As a distant relative of the old
  kingdom''s royal family, she used to live an extravagant life but lost everything
  on the day Sunfire Castle fell. Years of homelessness and destitution gave her a
  hard time and stripped her of dignity. Although she has gradually mastered the law
  of survival in the icy post-apocalyptic world, she finds herself increasingly convinced
  that money is the sole path to redemption and the ultimate truth! Hence, she spares
  no effort in seeking the opportunities to get rich.


  Her outstanding knowledge and combat skills gained during her time as a wanderer
  drew invitations from the Dawn Alliance, the mercenaries, and even the Phaethon.
  However, she was not satisfied with the "meager" pay they offered, so she focused
  all her attention on the treasures across the world instead.


  During her treasure hunt, she stumbled upon clues regarding a "Sunken Nation." She
  intentionally got herself captured by Captain Hendrik, as she needed his expensive
  vessel to locate the mysterious realm hidden underwater. She believes that once
  she discovers the lost treasure, she will become the wealthiest person in the entire
  tundra. She will then rebuild the kingdom of Solaris and crown herself as the new
  queen.'
