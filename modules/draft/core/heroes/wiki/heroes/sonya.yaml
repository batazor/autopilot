skills:
- name: Extreme Cold
  description: Sonya shoots jets of cryogen, freezing a target for 1.5s and dealing
    Attack* 220%/240%/260%/280%/300% Area of Effect Damage to the target and nearby
    enemies.
- name: Frozen Bomb
  description: Sonya fires a frozen bomb, dealing Attack* 100%/110%/120%/130%/140%
    damage to an enemy and reducing the Attack Speed of nearby enemies by 50% for
    3s.
- name: Money-Hungry
  description: Sonya’s burning desire for bounty propels her into a frenzied state
    on the battlefield, increasing her Attack by 10%/15%/20%/25%/30% .
- name: Treasure Hunter
  description: “Everyone has a share when the legendary ocean treasure is found!”
    Sonya’s promise inspires everyone, increasing Damage by 4%/8%/12%/16%/20% for
    all troops.
- name: Bounty Temptation
  description: Sonya motivates her Troops with bounty, making her Lancers deal 15%/30%/45%/60%/75%
    more damage every 2 attacks and increasing Attack by 5%/10%/15%/20%/25% for all
    troops for 1 turn.
- name: Torrential Impact
  description: Sonya’s Lancers will seize every chance to launch a surprise raid like
    underwater currents. Her Lancers deal 50%/100%/150%/200%/250% damage every 5 turns
    and stun the target for 1 turn.
- name: Chilled to the Bone (Lv. 5)
  description: Sonya improves the formula of her cryogen, increasing her Attack by
    24%. When the freezing effect of Extreme Cold ends, shattered ice will deal Attack*70%
    Damage to nearby enemies.
- name: Vortex Turret (Lv. 5)
  description: Sonya sets up turrets that spurt out streams of water, increasing Defender
    Troops Lethality by 15%.
