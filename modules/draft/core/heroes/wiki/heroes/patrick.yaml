story: '"Who cares if the world''s turned to ice? At least our diners can reach heaven!"
  - Patrick.\n Masterchef Patrick of Sunfire Castle has always believed nice food
  helps to uplift the spirit. He has spent most of his life developing, researching,
  and cooking the best dishes in the world. He has earned recognition from the President
  and local nobles of all stripes.


  Patrick''s life was turned upside down by the collapse of the Solaris Royal Family.
  Though he was no longer the Masterchef, life still has to go on. In the Cities,
  he no longer had access to the royal pantry and had to scramble for ingredients
  and condiments. Many still remark on his inventive cuisine as comparable to the
  finest in the old world.


  Occasionally, Patrick''s skills are also needed in battle. Pantry thieves and resource
  hunt have made combat a necessity. To many’s surprise, Patrick is a descent fighter.
  Not only does he possess a lifetime''s worth of experience handling all kinds of
  knives, he also has the strength and stamina to use them quite efficiently. The
  busy kitchen has honed his intuition that can be easily applied to other "dynamic"
  situations.


  This is not to say the renowned Masterchef Patrick never gets it wrong. Necessity
  is the mother of invention, and much inventiveness is needed in Cities. Anyone sampling
  his newest creations should be cautious - new ingredients can be tricky even for
  a seasoned chef like Patrick. Bahiti can particularly attest to this.


  Patrick has taken the loss of his position at Sunfire Castle fairly well, all things
  considered. The low point was when he and several other public servants were trapped
  in a makeshift shelter following the collapse of Sunfire Castle. After a while,
  the supply ran low and everyone thought they were doomed.


  Patrick went to great effort to ensure the group''s "last meal" would at least be
  a happy one. But despair soon gave way to warmth as the delicious food soothed their
  earlier exhaustion. The group outlasted the snowstorm and arrived together at a
  new shelter - in no small part thanks to that meal, which was the most meaningful
  moment of Patrick''s career.'
