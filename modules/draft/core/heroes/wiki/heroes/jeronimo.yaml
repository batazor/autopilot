skills:
- name: Combo Slash
  description: Jeronimo launches enemies in the target area into the air, following
    up with three slashes, each dealing Attack* 160%/176%/192%/208%/224% damage.
- name: Sword Art
  description: Each of Jeronimo's attacks releases sword energy, dealing Attack* 15%/17%/19%/21%/23%
    damage to enemies in a rectangular area straight ahead.
- name: Lone Wolf
  description: Jeronimo is a master at pressing advantages, gaining a + 16%/24%/32%/40%/48%
    Attack boost over 50% Health.
- name: Battle Manifesto
  description: Jeronimo delivers a rousing rally speech ahead of the battle, increasing
    damage dealt by + 5%/10%/15%/20%/25% for all troops.
- name: Swordmentor
  description: Jeronimo imparts the secrets of swordsmanship, increasing attack by
    + 5%/10%/15%/20%/25% for all troops.
- name: Expert Swordsmanship
  description: Jeronimo's sword arts empower soldiers to seize battle opportunities,
    increasing Damage Dealt by 6%/12%/18%/24%/30% for all troops for 2 turns every
    4 turns.
- name: Natural Leader
  description: Jeronimo easily inspires others even from afar, boosting all troops'
    Lethality and Health by 3%/6%/9%/12%/15%
- name: Shield of Swords (Lv. 5)
  description: When attacking, Jeronimo's sword energy forms a shield, reducing his
    damage received by 30%.
- name: Discernment (Lv. 5)
  description: Jeronimo attacks with a sword formation, increasing Rally Troops' attack
    by 15%.
