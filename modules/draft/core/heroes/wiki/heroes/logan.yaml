story: 'The lion-headed, steel-bodied Logan is one of the fiercest defenders of the
  Dawn Alliance.


  One of the original Dawn Alliance founders, Logan could not be more different from
  his mostly academic colleagues. But what Logan lacks in refinement he makes up for
  in decisiveness; and what he lacks in gracefulness he makes up for with a fiery
  temperament that, as he puts it, gets results. But that is not to say he is a stranger
  to the ways of the scholar. Logan is one of the best engineers on the planet.


  The steam-powered suit of armor that powers Logan across the tundra is also one
  of his own inventions—his gateway to a new life after a disabling injury. The mech
  is not exactly the most subtle of diplomatic instruments, but no one can deny the
  effectiveness of a metal fist when negotiations between the Dawn Alliance and less
  civil powers break down.


  Logan plays the role of a kind of a "semi-vigilante" and "all-purpose guard" for
  the Dawn Alliance.\nLogan is the brute force solution: a walking tank in place of
  careful schemes. Whatever one might say of Logan''s "often crazy" battle plans,
  consistent victory on the battlefield speaks for itself. The power suit grants Logan
  capabilities ordinary warriors can scarcely imagine.


  Logan is no stranger to Phaethon, one of the Dawn Alliance''s most implacable enemies.
  In fact, he was at one point made Lead Designer of Phaethon''s daring Planetary
  Realignment Drive, which attempted to correct the Earth''s course closer to the
  sun. It was Logan''s good friend Bill who first opened his eyes to extraordinarily
  tragic human cost of the project. For the first time, Logan began to experience
  doubts about the end justifying the means. It was during this period of hesitation
  when Phaethon turned on Logan, removing his arm and almost his life. The Dawn Alliance
  rescued the grateful engineer. He quickly joined and swore himself to fixing the
  mistakes of his past.


  Logan is not a man who spends much time in regret. "Talk is cheap" and "only action
  creates real change" from Logan''s point of view. Logan''s contributions to mankind
  are already immense. Even his worst enemies, those persuaded by Phaethon that his
  abandonment of the Planetary Alignment Project was unforgivable, are probably benefiting
  from the warmth of one of Logan''s Furnaces. Logan''s masterful Furnace design has
  saved countless lives in the Great Chill, its design inspired by a Planetary Realignment
  Drive prototype. But no matter how many people Logan has helped, close friends often
  hear the same sad refrains from the bottom of another empty drink: "It doesn''t
  matter how much you do. You can''t bring back the dead."'
