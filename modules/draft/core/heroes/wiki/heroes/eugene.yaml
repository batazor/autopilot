story: 'Wood is a crucial material for building Cities, but its acquisition is an
  extremely laborious and time-intensive process. Most lumberjacks do not pick up
  their axe and head into the forest by choice. Eugene does. He truly enjoys harvesting
  the forest''s bounty.


  Eugene is extremely passionate about his work. He''s happy to accept demanding tasks
  and gets rather restless when he is not physically exhausted from work. Rumor has
  it that Eugene''s strange temperament may have much to do with his equally strange
  past. Eugene approaches combat with the same zest, his large axe is a terror to
  any foes in his way.


  A man like Eugene, who works hard and conducts himself well, is always welcomed
  in any City. He certainly does love his liquor - but only in his free time. Only
  the blacksmith has an issue with Eugene - his axes have to be replaced rather frequently.


  Eugene is stubborn in his choice of tools and has zero interest in trying out more
  convenient alternatives like the new steam-powered chainsaws. Eugene''s first choice
  would always be those crafted by his drinking buddy Smith, as his axes are the sturdiest
  and easiest to handle.


  A major accident several years ago left Eugene with a strange vision: he began seeing
  "evil spirits" everywhere. The constant sense of anxiety eventually drove him over
  the edge. He fought the demonic vision, only to later discover he had attacked none
  other than the Chief of the City. He was cast out into the frozen tundra and was
  luckily saved by a passing caravan.


  Dr. Philly surmised that Eugene''s excessive exposure to an unstable fire crystal
  had altered his memory and senses. It had also made him incredibly strong and short-tempered.
  Although Philly could not find a cure, there was a temporary solution: exhausting
  manual labor prevented the visions.


  Logging has since become his answer to the "evil spirits" problem until a more permanent
  cure can be found. Alternatively, if Eugene runs out of wood to chop, chopping down
  enemies will do just fine.'
