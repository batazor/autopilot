skills:
- name: Acid Rain
  description: Fred rains down his special acidic formulation on the target area,
    dealing Attack* 60%/66%/72%/78%/84% damage every 0.5 seconds while increasing
    targets' damage taken by 15% for 3 seconds.
- name: Water Cannon
  description: Fred water-blasts the target, rinsing away their combat bonuses while
    dealing damage equal to Attack* 200%/220%/240%/260%/280% .
- name: Perfect Responder
  description: Fred performs better under extreme stress, increasing Attack by 8%/12%/16%/20%/24%
    and Defense by 25%/37.5%/50%/62.5%/75% when under 50% Health.
- name: Hydraulic Suppression
  description: Fred's water volleys destroy opponent momentum, reducing all enemy
    troops’ lethality by 4%/8%/12%/16%/20% .
- name: Acidification
  description: Fred coats enemy Infantry shields with a special acidic blend, amplifying
    their damage taken by 4%/8%/12%/16%/20% .
- name: Floodbringer
  description: A master of pressure both hydraulic and tactical, Fred's Lancers deal
    40%/80%/120%/160%/200% additional damage every 4 strikes and reduce enemy troop
    damage dealt by 4%/8%/12%/16%/20% on the next turn.
- name: Idealism (Lv. 5)
  description: The noble idealism of Fred's calling increases his attack by 24%, and
    increases his Defense by 10% for each bonus dispelled until the end of battle
    (max 5 stacks).
- name: Call of the Firefighter (Lv. 5)
  description: Few troops can remain unmoved by Fred's remarkable heroics, increasing
    Rally Troops' Attack by 15%.
