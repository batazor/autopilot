story: '"Show me the fire. I''ll deal with the heat!"


  Fred has been a dependable fixture of the City''s fire brigade for what seems like
  centuries, first to wade into the fiery maelstrom, last to surrender survivors''
  dwellings to the flames. Many years of service have built up a strong sense of gratitude
  on behalf of grateful survivors for his efforts.


  A Fire Chief has to be smart too. Fred hasn''t survived this long without building
  up an uncanny understanding of unusual scenarios and a sixth sense for risk. This
  is surely why the last great engineers of the Solaris Dynasty gifted Fred with the
  so-called "Antifire", an extremely advanced and powerful piece of firefighting equipment
  the likes of which has never been seen since.


  Strip away all the oldworld heroics and Fred consistently models a strong sense
  of humility and kindness, endearing him to his fervent fans everywhere—particularly
  in the Dawn Alliance. If Fred has a fault, an extremely minor one, it is that the
  man simply doesn''t have much of a sense of humor (or, for that matter, the ability
  to detect sarcasm). To quote Bahiti on this topic: "Fred''s the nearest I''ve ever
  seen to a perfect human being. If only he could lighten up a little..."


  Fred would not claim to be perfect. Many decades ago, when the world was a very
  different place, Fred was already well-known in the Solaris Capital as the city''s
  youngest ever and most successful fire chief. It was in fact on the eve of a ceremony
  celebrating Fred''s achievements, with the anointing of a great bronze figurine
  in his honor at the Fire Bureau''s gates, when disaster struck! The great Fire Crystal
  at the heart of the capital, powering much of its industry, ignited into an enormous
  explosion that rocked the city. Fred''s failures that night have become an eternal
  weight on his conscience.


  Fred has had plenty of time to ponder the collapse of the Empire in the years following.
  Had he been but a noble cog in its unfeeling machine, blinded by devotion? Which,
  once the pomp and majesty were removed, was covered by the scars of suffering and
  injustice? Fred has learned to accept that for all the faults of the new world,
  cities today do not have to maintain themselves at such a vast human cost.


  It was the arrival of the Dawn Alliance that ultimately filled Fred''s heart with
  the hope missing since the Great Collapse. Now he is devoted not only to the extinguishing
  of harmful fires, but to that much deadlier fire: the fire of war, which threatens
  all of humanity.'
