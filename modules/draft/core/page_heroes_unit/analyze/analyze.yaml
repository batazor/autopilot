# Heroes — single unit detail page. Uses only regions already defined in area.json.
overlay:
# OCR analyzers disabled — re-enable when OCR sidecar is desired for wiki scrape.
# On any hero card screen (62 distinct ``page.heroes.<id>`` nodes
# verified by per-hero OCR rules), fire the wiki-reader scenario. The
# ``page.heroes.*`` glob in ``screens:`` is matched via fnmatch — saves
# us from listing every hero explicitly. Long TTL because hero wiki
# content rarely changes per-visit; the bot just needs to scrape it once.
# - name: page.heroes.unit.wiki.present
#   region: page.heroes.unit.wiki
#   action: text
#   screens:
#     - page.heroes.*
#   pushScenario:
#   - name: read_hero_wiki
#     ttl: 24h

# Red dot on the same wiki button means there are unclaimed wiki rewards
# / new content markers inside. The ``${hero_id}`` placeholder resolves
# from ``current_screen`` (``page.heroes.<id>``) via the overlay enqueuer,
# so this single rule fans out to all 62 ``heroes.<id>.wiki`` scenarios.
- name: page.heroes.unit.wiki.red_dot
  region: page.heroes.unit.wiki
  isRedDot: true
  screens:
    - page.heroes.*
  pushScenario:
  - name: heroes.${hero_id}.wiki
