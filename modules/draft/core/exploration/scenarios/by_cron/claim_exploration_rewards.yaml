enabled: true
name: 🗺️ Claim Exploration Rewards

node: exploration

cron: "0 */4 * * *"

steps:
  - click: button.claim
  - wait: 2s
  - while_match: button.claim.big
    steps:
      - click: button.claim.big
      - wait: 2s
      - match: popup.tap_anywhere
        expected: ["tap anywhere"]
        threshold: 0.7
        steps:
          - click: popup.tap_anywhere
          - wait: 0.5s
