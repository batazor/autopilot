overlay:
# Inline-claim on the 7-Day Login event screen. Gated by the screen-unique
# ``event.7-day`` banner (no page_title fallback — the banner is more reliable
# and avoids racing with text_switch). When the big claim button is visible,
# tap it inline via the shared ``big_claim_button`` scenario (while_match loop).
- name: event.7-day.big_claim_button.visible
  region: big_claim_button
  action: findIcon
  threshold: 0.9
  screens:
  - event.7-day
  ttl: 5s
  pushScenario:
  - name: big_claim_button
