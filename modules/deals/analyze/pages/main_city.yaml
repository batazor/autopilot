overlay:
  # Each rule pushes the page-bound claim scenario directly — its ``nodes:``
  # declaration lets the scheduler navigate from main_city via the
  # template_icon edges, no dedicated "open" scenarios needed.
  - name: deals.main_city.event_icon.visible
    region: main_city.icon_search
    action: findIcon
    template: modules/deals/references/crop/main_city_main_city.to.deals.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    steps:
      - push_scenario:
          name: deals.hall_of_heroes
          ttl: 1m
  - name: deals.sign_in.main_city.event_icon.visible
    region: main_city.icon_search
    action: findIcon
    template: modules/deals/references/crop/main_city_main_city.to.sign_in.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    steps:
      - push_scenario:
          name: deals.sign_in
          ttl: 1m
  - name: deals.first_purchase.main_city.event_icon.visible
    region: main_city.icon_search
    action: findIcon
    template: modules/deals/references/crop/main_city_main_city.to.1st_purchase.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    # Push the page-bound scenario directly — its ``nodes:`` declaration
    # lets the scheduler navigate from main_city to deals.first_purchase
    # via the template_icon edge, no dedicated "open" scenario needed.
    steps:
      - push_scenario:
          name: deals.first_purchase
          ttl: 1m
