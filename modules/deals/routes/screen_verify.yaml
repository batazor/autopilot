# Screen detection landmarks for the Deals page family.
#
# Sub-pages MUST come before the generic ``deals`` hub in detection order:
# ``deals.title`` (the parent landmark) is visible on every sub-page, so a
# parent-first check returns ``deals`` even when the device is on a sub-tab.
# Lower ``priority`` value = checked earlier.
#
# Each entry below is wired to a landmark region name that the annotator will
# create when the corresponding reference is labeled. Until those regions
# exist, screen detection for ``deals.*`` will simply not match — that is
# fine, the FSM falls back to ``unknown`` and ``current_screen`` stays empty.
screens:
  deals.sign_in:
    priority: 50
    landmarks:
      - match: deals.sign_in.title
        threshold: 0.9
    rules:
      - match: deals.sign_in.title
        threshold: 0.9

  deals.first_purchase:
    priority: 51
    landmarks:
      - match: deals.first_purchase.title
        threshold: 0.9
    rules:
      - match: deals.first_purchase.title
        threshold: 0.9

  deals.home_and_beyond:
    priority: 52
    landmarks:
      - match: deals.home_and_beyound.title
        threshold: 0.9
    rules:
      - match: deals.home_and_beyound.title
        threshold: 0.9

  deals.hall_of_heroes:
    priority: 53
    landmarks:
      - match: deals.hall_of_heroes.title
        threshold: 0.9
    rules:
      - match: deals.hall_of_heroes.title
        threshold: 0.9

  # Witness sub-page off Hall of Heroes.
  hall_of_heroes.witness:
    priority: 54
    landmarks:
      - match: hall_of_heroes.witness.title
        threshold: 0.9
    rules:
      - match: hall_of_heroes.witness.title
        threshold: 0.9

  # Generic deals hub — checked LAST so the sub-page landmarks above win first.
  deals:
    priority: 60
    landmarks:
      - match: deals.title
        threshold: 0.9
    rules:
      - match: deals.title
        threshold: 0.9
