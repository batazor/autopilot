name: "Resource Rush"
priority: 150
repeat: true
enabled: false

conditions:
  - type: time_range
    from: "00:00"
    to: "23:59"

steps:
  - id: step_gather_wood
    task: gathering
    priority: 800
    cooldown: 1h
    params:
      resources: [wood]
      march_slots: all

  - id: step_gather_food
    task: gathering
    priority: 780
    cooldown: 1h
    params:
      resources: [food]
      march_slots: all

  - id: step_training_resource
    task: training
    priority: 400
    cooldown: 30m
    params:
      troop_type: infantry
      quantity: auto
