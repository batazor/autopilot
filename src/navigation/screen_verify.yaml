# Screen verification config used by navigation.detector + navigation.navigator.
#
# - screens.<name>.landmarks: used by ScreenDetector to recognize the current screen.
# - screens.<name>.rules: used by Navigator to verify that a route/tap reached target screen.
# Navigation checks should be image/template-based (`match`) so screen detection
# stays fast and deterministic.
retry:
  attempts: 6
  interval_seconds: 0.8

screens:
  loading:
    # Startup/loading splash. Treat as a real screen so Redis current_screen
    # is not cleared to unknown while the game is still booting.
    priority: 1
    landmarks:
      - match: text.survival
        threshold: 0.9
    rules:
      - match: text.survival
        threshold: 0.9

  text.frostdragon_tyrant:
    # Frostdragon Tyrant popup/card. Recognize before hub screens so overlay
    # automation can close it without trying normal navigation.
    priority: 2
    landmarks:
      - match: text.frostdragon_tyrant
        threshold: 0.9
    rules:
      - match: text.frostdragon_tyrant
        threshold: 0.9

  main_city:
    priority: 10
    landmarks:
      - match: icon.world
    rules:
      - match: icon.world
        threshold: 0.9

  mail.wars:
    priority: 15
    landmarks:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.wars
    rules:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.wars

  mail.alliance:
    priority: 15
    landmarks:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.alliance
    rules:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.alliance

  mail.system:
    priority: 15
    landmarks:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.system
    rules:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.system

  mail.reports:
    priority: 15
    landmarks:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.reports
    rules:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.reports

  mail.starred:
    priority: 15
    landmarks:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.starred
    rules:
      - match: mail.title
        threshold: 0.9
        tab_active: mail.tab.starred

  mail:
    priority: 30
    landmarks:
      - match: mail.title
        threshold: 0.9
    rules:
      - match: mail.title
        threshold: 0.9

  vip:
    priority: 30
    landmarks:
      - match: page.vip.box
        threshold: 0.9
      - match: page.vip.add
        threshold: 0.9
      - match: page.vip.unlock
        threshold: 0.9
    rules:
      - match: page.vip.box
        threshold: 0.9
      - match: page.vip.add
        threshold: 0.9
      - match: page.vip.unlock
        threshold: 0.9

  alliance.invitation:
    priority: 20
    landmarks:
      - match: alliance.title
        threshold: 0.9
    rules:
      - match: alliance.title
        threshold: 0.9

  rewards:
    priority: 5
    landmarks:
      - match: rewards.title
        threshold: 0.9
      - match: rewards.title.v2
        threshold: 0.9
    rules:
      - match: rewards.title
        threshold: 0.9
      - match: rewards.title.v2
        threshold: 0.9

  increase_level:
    priority: 5
    landmarks:
      - match: increase_level.title
        threshold: 0.9
    rules:
      - match: increase_level.title
        threshold: 0.9

  welcome_back:
    priority: 100
    landmarks:
      - match: text.welcome_back
        threshold: 0.9
    rules:
      - match: text.welcome_back
        threshold: 0.9

