# Screen verification — navigation.detector (current screen) + navigator (post-tap verify).
#
# Write ``rules`` only; ``landmarks`` default to the same list at load time.
# Optional ``landmarks`` when detection must differ from verify (e.g. shop sub-tabs).
#
# ``parent`` (optional): the broader screen this entry layers on top of (e.g.
# ``mail.wars`` parents ``mail``). The detector evaluates the parent's anchor
# template first; when it doesn't fire on the current frame, every child sharing
# that parent is skipped without running its unique tab_active / landmark match.
# Add it for any screen that is strictly a sub-view of another screen.
retry:
  attempts: 2
  interval_seconds: 0.3
screens:
  loading:
    priority: 1
    rules:
    - match: text.survival
      threshold: 0.9
  text.frostdragon_tyrant:
    priority: 2
    rules:
    - match: text.frostdragon_tyrant
      threshold: 0.9
  main_city:
    priority: 10
    rules:
    - match: icon.world
      threshold: 0.9
  mail.wars:
    parent: mail
    priority: 15
    rules:
    - match: mail.title
      threshold: 0.9
      tab_active: mail.tab.wars
  mail.alliance:
    parent: mail
    priority: 15
    rules:
    - match: mail.title
      threshold: 0.9
      tab_active: mail.tab.alliance
  mail.system:
    parent: mail
    priority: 15
    rules:
    - match: mail.title
      threshold: 0.9
      tab_active: mail.tab.system
  mail.reports:
    parent: mail
    priority: 15
    rules:
    - match: mail.title
      threshold: 0.9
      tab_active: mail.tab.reports
  mail.starred:
    parent: mail
    priority: 15
    rules:
    - match: mail.title
      threshold: 0.9
      tab_active: mail.tab.starred
  mail:
    priority: 30
    rules:
    - match: mail.title
      threshold: 0.9
  vip:
    priority: 30
    rules:
    - match: page.vip.box
      threshold: 0.9
    - match: page.vip.add
      threshold: 0.9
    - match: page.vip.unlock
      threshold: 0.9
  alliance.invitation:
    priority: 20
    rules:
    - match: alliance.title
      threshold: 0.9
  increase_level:
    priority: 5
    rules:
    - match: increase_level.title
      threshold: 0.9
  welcome_back:
    priority: 100
    rules:
    - match: text.welcome_back
      threshold: 0.9
