# Per-hero priors for the upgrade scorer. Heroes not listed under
# ``overrides`` inherit ``defaults`` verbatim — keeps the file small and
# makes "edit only the heroes I care about" the normal flow.
#
# Source priors: deep-research-report.md, section "Data model and YAML DSL".
# mode_weights are 0..100 (relative). role_tags drive which actions the
# optimizer considers; manual_level_cap_* cap support-tier XP spend.

defaults:
  role_tags: [generic]
  mode_weights:
    expedition: 40
    exploration: 30
    arena: 20
    bear_join: 10
  skill_priority:
    expedition: [1]
    exploration: [1, 2]
    arena: [1]
  general_shard_policy: deny_by_default
  manual_level_cap_pre_drill: 30
  manual_level_cap_post_drill: 60
  replacement_risk_curve:
    # Risk that this hero is dropped from active lineup within N days from
    # account start. Multiplied with sunkness to compute replacement_penalty.
    30: 0.10
    60: 0.30
    90: 0.50
    120: 0.70

overrides:
  # --- Core trio (F2P expedition core) ----------------------------------
  molly:
    role_tags: [core, exploration_carry, arena_carry]
    mode_weights: { expedition: 80, exploration: 90, arena: 85, bear_join: 30 }
    general_shard_policy: allow_threshold_only

  sergey:
    role_tags: [core, tank, expedition_frontline]
    mode_weights: { expedition: 75, exploration: 30, arena: 20, bear_join: 40 }
    skill_priority:
      expedition: [1]
      exploration: [2]
    general_shard_policy: allow_core_only

  bahiti:
    role_tags: [core, marksman, expedition_dps]
    mode_weights: { expedition: 75, exploration: 35, arena: 30, bear_join: 60 }
    general_shard_policy: allow_core_only

  # --- Dual-role / Bear-relevant ----------------------------------------
  jessie:
    role_tags: [dual_role_support, bear_joiner]
    mode_weights: { expedition: 40, exploration: 60, arena: 25, bear_join: 95 }
    skill_priority:
      expedition: [1]   # bear threshold first
      exploration: [1, 2]
    general_shard_policy: allow_core_only

  gina:
    role_tags: [exploration_support, beast_utility]
    mode_weights: { expedition: 25, exploration: 70, arena: 20, bear_join: 50 }

  jasser:
    role_tags: [joiner_only, bear_specialist]
    mode_weights: { expedition: 20, exploration: 10, arena: 10, bear_join: 90 }
    skill_priority:
      expedition: [1]
    manual_level_cap_pre_drill: 10
    manual_level_cap_post_drill: 0

  seo_yoon:
    role_tags: [joiner_only, bear_specialist]
    mode_weights: { expedition: 20, exploration: 15, arena: 15, bear_join: 80 }
    skill_priority:
      expedition: [1]
    manual_level_cap_pre_drill: 10
    manual_level_cap_post_drill: 0

  # --- Wheel path -------------------------------------------------------
  zinman:
    role_tags: [wheel_path, gen1_wheel]
    mode_weights: { expedition: 40, exploration: 35, arena: 30, bear_join: 30 }

  # --- Gen2 replacement wave -------------------------------------------
  flint:
    role_tags: [gen2_replacement_carry]
    mode_weights: { expedition: 70, exploration: 65, arena: 55, bear_join: 40 }
    replacement_risk_curve:
      30: 0.05
      60: 0.15
      90: 0.30
      120: 0.50

  alonso:
    role_tags: [gen2_replacement]
    mode_weights: { expedition: 60, exploration: 55, arena: 50, bear_join: 35 }
    replacement_risk_curve:
      30: 0.05
      60: 0.15
      90: 0.30
      120: 0.50
