# Top-level scoring profiles. Pick one as active; the scorer mixes its
# objective_weights with each hero's mode_weights from hero_meta.yaml.
# Source priors: deep-research-report.md, sections "Пример последовательностей
# для стартового F2P-аккаунта" and "Модель scoring".

active: conservative_long_term_f2p

profiles:
  conservative_long_term_f2p:
    description: >
      Default F2P opening. Saves gems for the next Lucky Wheel hero,
      blocks mythic general shards entirely, allows epic generals only on
      the core trio + Jessie.
    objective_weights:
      expedition: 35
      exploration: 30
      arena: 20
      bear_join: 15
    wheel_policy: reserve_for_next_gen
    general_shard_policy:
      mythic:
        mode: deny_by_default
        allow_heroes: []
      epic:
        mode: allow_core_only
        allow_heroes: [sergey, bahiti, jessie]

  aggressive_opening_f2p:
    description: >
      Faster first-month progress on Molly. Spends mythic general shards
      on Molly up to Star 3, allows more epic general usage. Wheel reserve
      relaxes when current Gen blocks progress.
    objective_weights:
      expedition: 30
      exploration: 35
      arena: 20
      bear_join: 15
    wheel_policy: current_gen_if_blocked_progress
    general_shard_policy:
      mythic:
        mode: allow_threshold_only
        allow_heroes:
          molly:
            max_star: 3
      epic:
        mode: allow_core_only
        allow_heroes: [sergey, bahiti, jessie, gina]

  bear_alliance_support:
    description: >
      Alliance KPI is Bear damage. Joiner skills and manuals come first,
      gems and widgets are guarded harder than in the conservative
      profile.
    objective_weights:
      expedition: 25
      exploration: 20
      arena: 15
      bear_join: 40
    wheel_policy: reserve_for_next_gen
    general_shard_policy:
      mythic:
        mode: deny_by_default
        allow_heroes: []
      epic:
        mode: allow_core_only
        allow_heroes: [jessie, jasser, seo_yoon]
