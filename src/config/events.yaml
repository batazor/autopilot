# Canonical event registry.
#
# Each entry maps a recognised event-block OCR string (and fuzzy variants) to a
# screen node defined in navigation/. The scanner exec handler
# `scan_event_blocks` OCRs the four main_city event slots, fuzzy-matches each
# against `ocr_aliases`, and writes the resolved screen name into Redis hash
# `wos:instance:<id>:event_blocks` keyed by block index. Downstream DSL steps
# can then look up which block currently leads to a given event.
#
# OCR aliases are case-insensitive substrings — the scanner runs rapidfuzz
# ratio per alias (see ocr/fuzzy.py) and picks the highest-scoring event.
# Aliases should cover OCR quirks (cropped first letter, missing hyphen, etc.).

events:
  - name: event.trials
    ocr_aliases: [trials, trial]
  - name: event.7-day
    ocr_aliases: [7-day, 7 day, 7days]
  - name: event.first_purchase
    ocr_aliases: [1st purchase, first purchase, t purchase, st purchase]
  - name: event.snowstorm
    ocr_aliases: [snowstorm, snow storm]
  - name: event.shining_city_pack
    ocr_aliases: ["shining city pack", "shining city", "city pack"]
