skills:
- name: Fate’s Finale
  description: Mia throws a tarot card at enemies, dealing Attack * 270%/297%/324%/351%/378%
    damage, and can either reduce the target's Attack by 20% for 2s or stun the target
    for 1.5s.
- name: Bad Omen
  description: Mia curses an enemy target, dealing fluctuating damage based on a "base
    value" of Mia's Attack * 50%/55%/60%/65%/70% . The final damage dealt will be
    a random figure ranging from 5% to 600% of the "base value."
- name: Guardian of Destiny
  description: Mia protects the hero with the lowest remaining Health and restores
    Health for the hero based on a "base value" of Mia's Attack * 100%/110%/120%/130%/140%
    . The final Health restored will be a random figure ranging from 5% to 400% of
    the "base value."
- name: Bad Luck Streak
  description: Grants all troops' attack a 50% chance of cursing the target, increasing
    their damage taken by 10%/20%/30%/40%/50% .
- name: Lucky Charm
  description: Mia brings good luck to our troops, granting all troops' attack a 50%
    chance of dealing 10%/20%/30%/40%/50% . more damage.
- name: Ritual Deciphering
  description: Mia foresees potential dangers before battle, granting a 40% chance
    of reducing damage taken by 10%/20%/30%/40%/50% for all troops.
- name: Vision of Truth (Lv. 5)
  description: Figures out the secret of fate through the crystal ball, increasing
    the upper limit and lower limit of all “fluctuating” skills of Mia by 150%.
- name: Rally of Fate (Lv. 5)
  description: Mia divines the most advantageous moments for an assault, increasing
    Rally Troop Attack by 15%.
