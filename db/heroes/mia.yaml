story: 'One of the most exciting times in any City''s week must be the arrival of
  Mia''s famous caravan, always greeted by eager children excited to see what new
  shows Mia''s performers have in store. There may also be goods of extraordinary
  value for the discerning buyer.


  Mia''s shows are legendary—featuring strongmen, illusionists, and vanishing ninjas
  from far-away lands. But it is their leader, Mia, in the role of a soothsayer, who
  usually captures the public''s imagination. It is said that her magic grants clairvoyant
  vision of a person''s past, present, and future. It is a skill Mia uses to great
  effect and profit.


  As everyone knows, there is no such thing as a "real" soothsayer. Yet no matter
  how many times sceptics have tried to disprove Mia''s abilities, her naysayers have
  yet to explain the source of her unnerving accuracy.


  Mia''s convoy is the source of not only interesting trinkets, but also intel on
  other Cities, the Dawn Alliance, Phaethon, and other important factions, individuals,
  and old Imperial remnants.\nTraveling widely may be one factor, but Mia''s buyers
  are still not quite sure exactly how she obtains so much valuable intel. Its accuracy,
  however, is never in doubt. But Mia also has a conscience. She will not trade such
  secrets except with those she believes deserve her trust.


  Bahiti is one of many intrepid explorers often drawn to Mia''s soothsayer hut, wondering
  aloud on each occasion whether the Mia''s levitating crystal ball is really a result
  of "witchcraft". Mia always responds that it is merely a trick that careful observation
  will quickly unravel. Bahiti is one of the keenest minds in the Dawn Alliance, and
  yet somehow has never been able to locate the mechanism behind Mia''s "parlor tricks".


  Mia''s background, as well as the identities of many of her mysterious followers,
  are also shrouded in mystery. No one quite knows the story behind her ragtag—and
  often scary—cabal. According to one legend, bandits were about to raid Mia''s convoy
  when they accidentally observed the unmasked face of one of the caravan''s frightening
  guards. Whatever the bandits saw, it made such an impression they fled the scene
  without further ado. It''s difficult to unravel the mystery surrounding Mia, her
  abilities, and her followers. Their presence on the tundra may be a riddle, but
  what is not a riddle is that aggravating this mysterious group or its leader would
  be very, very foolish.'
