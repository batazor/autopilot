skills:
- name: Frozen Fury
  description: Magnus whirls twin axes, taunting nearby enemies to attack while dealing
    Attack* 60%/66%/72%/78%/84% damage to the same foes every 0.5 seconds for 3 seconds.
- name: Wind Tomahawk
  description: Magnus targets a hero with a devastating axe throw, dealing Attack*
    100%/110%/120%/130%/140% damage, also tearing the wound and deals a further Attack*
    50%/55%/60%/65%/70% damage for 3 seconds.
- name: Sunderer
  description: Magnus' normal attacks have a 30% chance of sundering opponent armor,
    dealing Attack* 50%/55%/60%/65%/70% additional damage and reducing Defense by
    5%/10%/15%/20%/25% for 2 seconds.
- name: Rapacious
  description: Magnus rouses his troops with brutal intensity, boosting friendly Troop
    Attack by 5%/10%/15%/20%/25% .
- name: Iron Phalanx
  description: A master of tight formations, Infantry under Magnus' command enjoy
    a 40% chance of gaining 10%/20%/30%/40%/50% Defense when attacking for 1 turn.
- name: Iceman
  description: Magnus' intrepid adventuring skills provide a 2%/4%/6%/8%/10% reduction
    in damage versus friendly Infantry while boosting friendly Marksmen damage by
    2%/4%/6%/8%/10% .
- name: Heroic Stock (Lv. 5)
  description: A true son of the tundra, Magnus' iron constitution reduces incoming
    damage by 15% while increasing Frozen Fury's Defense bonus by 75%.
- name: Valoric Inspiration (Lv. 5)
  description: Ever the raconteur, Magnus' tales of Valhalla and ancient heroics inspires
    Defender Squads with 15% increased Health.
