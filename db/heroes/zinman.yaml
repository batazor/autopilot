story: 'In the bygone era of the Sunfire Castle, Zinman was renowned as "the Greatest
  Architect". His understanding of architectural science and art is unparalleled.
  His designs were brilliant, and his reputation was oustanding. However, his appearance...
  let’s just say Zinman had no time for such trivial things. If not for the Great
  Chill, he would no doubt reach ever greater heights in his field of study.


  While many of Zinman''s former colleagues settled in the nearest Cities, Zinman
  mysteriously vanished for several years. When he showed himself again, he became
  a key member of the powerful Dawn Alliance. Under the alliance, Zinman developed
  new defensive engineering techniques and improvements to the City Furnace. He takes
  pride in these less artistic but highly practical structures.


  Zinman rarely speaks of his family, but people knew of the sudden passing of his
  daughter. It had always been her dream to see a magnificent greenhouse full of all
  kinds of flowers. This project was eventually approved by the President of Sunfire
  Castle after Zinman spent years petitioning for it. Nearly a decade of work on the
  unfinished greenhouse was destroyed in the chaos following the Great Chill.


  Initially, Zinman could not let go of his daughter''s dream greenhouse. Then reality
  beckoned, and he realized survival is everyone’s top priority in the frozen world.


  Zinman''s post-Chill inventions include shelters with enhanced snow cover and conversion
  kits to turn nail guns into effective weapons. Although he is helping a lot of survivors
  with his knowledge, Zinman is painfully aware of his failure to fulfill the promise
  to his daughter.


  After joining Dawn Alliance as the chief architect, Zinman found hope and purpose
  again. He was glad to use his architectural knowledge to save countless lives, families,
  and cities. The smile on their faces offered immeasurable comfort to Zinman. He
  still dreams that one day far in the future, he would build that greenhouse, as
  an act of remembrance for his family...'
