- name: Nail Scatter
  description: Zinman covers the target in a stream of nails, each dealing Attack*
    55%/60%/65%/70%/75% damage and a 2-second Stun.
- name: Quick Defense
  description: Zinman works well under pressure, fortifying his position under 50%
    Health with a + 50%/75%/100%/125%/150% boost to his Defense.
- name: Robust
  description: Zinman's energetic poise provides a + 10%/15%/20%/25%/30% Attack Speed
    boost.
- name: Implacable
  description: Zinman the master builder understands what is required of a strong
    defensive line, increasing all troops' Defense by 2%/4%/6%/8%/10% and Health by
    2%/4%/6%/8%/10% .
- name: Bastionist
  description: Zinman's skillful control of the construction workflow reduces basic
    resource consumption (Meat, Wood, Coal, Iron) by 3%/6%/9%/12%/15% and increases
