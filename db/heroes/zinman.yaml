- name: Positional Battler
  description: Zinman masterfully manipulates the battlefield, increasing Lethality
    by 5%/10%/15%/20%/25% for all troops.
- name: Overclocked Nail Gun (Lv. 5)
  description: Zinman's Nail Gun enters Overcharged Mode, increasing his Attack by
    24%.
- name: Defend to Attack (Lv. 5)
  description: Zinman constructs an Archer Towers, increasing Defender Troops' Attack
    by 15%.
