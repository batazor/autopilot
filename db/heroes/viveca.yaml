skills:
- name: Evernight Finale
  description: Deliver the final strike with ruthless bullets! Deals Attack* 200%/220%/240%/260%/280%
    damage to a single target and inflicts Bleed, causing them to take Attack* 7%/9%/11%/13%/15%
    damage every 0.5s for 2s.
- name: Dark Scion
  description: As the hunt's final moment approaches, the black-winged dark scion
    takes action! Summons a raven to mark a single target for 6/7/8/9/10 s, during
    which the target takes 5%/10%/15%/20%/25% more damage and becomes the locked target
    for Viveca's Normal Attacks and her Evernight Finale skill.
- name: Frigid Dirge
  description: Successful hunts strengthen the leader of the Night's Guard. For each
    enemy hero defeated, Viveca's Attack is increased by 3%/6%/9%/12%/15% for the
    rest of the battle.
- name: Nightfall Legion
  description: Applies the Night Guard's tactics on the battlefield, increasing the
    Attack of all allied troops by 5%/10%/15%/20%/25% .
- name: Shadow World
  description: Viveca's Marksmen gain tremendous insight from their battles against
    darkness, allowing them to pinpoint enemy weaknesses. Attacks have a 20% chance
    to deal 20%/40%/60%/80%/100% extra damage to all enemy troops.
- name: Children of the Mist
  description: The formations and tactics of the Night's Guard provide balanced offense
    and defense, reducing damage taken by allied Infantry by 2%/4%/6%/8%/10% . and
    increasing damage dealt by allied Marksmen by 2%/4%/6%/8%/10% .
- name: Blood Hunt
  description: Viveca refines her weapon based on the experience gained from countless
    battles, increasing her damage dealt by 25%.
- name: Song of Dawn
  description: The dawn-heralding horn dispels the mist to bolster morale, increasing
    the Lethality of rallied troops by 15%.
