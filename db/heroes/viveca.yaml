story: 'Commander of the Night''s Guard, Viveca is a cold and stern leader who just
  so happens to also be a marksman with perfect accuracy. Her lifelong mission is
  to contain the disaster triggered by the Blood Moon plague, to confine it within
  the mist-shrouded domain of the Abandoned City—a place she once called home—and
  she will stop at nothing to achieve her mission.


  Facing the mutated beings that emerge from the mist, most would be petrified, as
  those enemies defy all understanding. Viveca, on the other hand, faces them without
  the slightest flinch, as she knows their weaknesses. Under her fearless leadership,
  members of the Night''s Guard have also found the courage to face the darkness head-on.


  Viveca is usually cold, quiet, and aloof. She keeps most people at arm''s length,
  and her only companion besides Freya, Dr. Philly, and a few Night''s Guard officers
  is her pet raven, Veilwing. Her personality seems innate, as if she were simply
  born without emotions, but Freya knows the truth: Viveca has experienced too much
  trauma to let her heart remain open and vulnerable. "After all, you can''t lose
  something you never show."


  If Viveca is usually cold, then on the battlefield, she''s utterly frigid and ruthless.


  When the Blood Moon Plague broke out in the Abandoned City, she had to slaughter
  her very own friends because they''d mutated into inhuman horrors. Even today, she
  does not hesitate to pull the trigger when faced with allies who''ve been infected.


  Yet still, no one in the Night''s Guard holds a grudge against her, as every time
  she presents the tactical plan for an operation, she always reserves the most dangerous
  role for herself. Moreover, she issued a command long ago—if she were ever to be
  infected, the Night''s Guard must eliminate her without hesitation.


  The survivors of the Abandoned City established a new settlement right outside the
  mist: New Metiya. The town produced supplies for the Night''s Guard and served as
  a hub for traders and travelers from distant lands. Not long ago, a mysterious stranger
  arrived, speaking of disturbing theories.


  The stranger claimed that the Blood Moon Plague was not a curse at all, but an "opportunity
  for transformation". The infected did not fall into chaos, but rather forged a new
  order. These mutated ones acted according to certain rules and had developed intelligence.
  Perhaps, with enough time, they might even be able to reclaim their former selves.


  The visitor''s theories provoked deep reflection in Viveca, since she''d witnessed
  in recent battles that some of the infected were capable of mimicking normal humans.
  Once, she''d even heard a voice calling out her name from the depths of the mist—a
  voice long forgotten, but still buried deep in her memories. And she''d never mentioned
  this to anyone...'
