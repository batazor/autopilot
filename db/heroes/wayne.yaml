story: 'Wayne has always kept to himself as a bounty hunter, and he is as capable
  as he is experienced. He always completes his missions precisely and efficiently
  like a stone-cold machine, and never utters a word more than necessary.


  He is an excellent sharpshooter with razor reflexes,amaking him one of the best
  shooters on the ice fields.According to Bahiti, Wayne can do a quick draw at 100
  paces and hit multiple coins thrown in the air in quick succession. However, he
  prefers to deal with his opponents with his modified Power Boomerang, which is a
  more effective tool for him to turn in the targets "intact" to the employer.


  Sometimes, he gives his combative and resistant"prey" a fair fighting chance. He''s
  never lost, of course.


  Wayne has practically no friends, and doesn''t view "bonding with other people"
  as something that''s necessary. He also says that he accepts various arduous and
  dangerous missions-mostly pursuing vicious bandits-not out of a sense of justice,
  but for the money.


  As a long-time "business partner," Greg the judge is thankful that Wayne probably
  has his own moral code and doesn''t blindly accept all commissions, and doesn''t
  become an accomplice to evil "for the money.


  "I''m from another world-a world that no longer exists," said Wayne when one of
  his acquaintances asked about his past. This absurd statement wasn''t taken seriously,
  but it wasn''t entirely untrue. The town where Wayne was born and raised had indeed
  met its demise under extreme circumstances.His beloved home was lost to history,
  and all the people and things he had loved had turned to dust.Because of this, Wayne
  closed himself off so that he would not form connections, and stepped onto the path
  of a lone wolf.


  Wayne''s "hunts" do not always go smoothly.On a hunt for Zenobia, Queen of Violence,
  he was shot and fell to the bottom of a valley. A young mountain maid named Matilda
  saved him and brought him home to nurse him back to health. After losing her husband,
  Matilda and her young son depended on each other to live, and the arrival of a stranger
  brought much color to their daily grind.Just as Wayne recovered, Zenobia and her
  cronies invaded Matilda''s village. Expecting helpless victims,Zenobia was stopped
  short by her old nemesis.Wayne captured the vicious criminal and bid farewell to
  Matilda. Even he did not realize that small change had been wrought in a small part
  of his heart.'
