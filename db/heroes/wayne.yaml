skills:
- name: Hurricane Blowback
  description: Wayne throws a boomerang, dealing Attack 100%/110%/120%/130%/140% area
    of effect damage to ennemies in a straight line. On its return, it deals the same
    amount of damage to ennemies in its path.
- name: Phantom Blitz
  description: Wayne draws and fires in the blink of an eye. Each normal attack has
    a 15%/20%/25%/30%/35% chance of triggering another normal attack.
- name: Noon Time
  description: Wayne's impecable aim grants a 3%/6%/9%/12%/15% Crit Rate on dealing
    damage.
- name: Thunder Strike
  description: Wayne's brilliant battle planning allows all troops to launch an extra
    attack every 4 turns, dealing 20%/40%/60%/80%/100% damage.
- name: Roundabout Hit
  description: Wayne's stratagems can pierce the thickest of defense. On every other
    attack, his Marksmen deal 8%/16%/24%/32%/40% extra damage to enemy Lancer and
    4%/8%/12%/16%/20% extra damage to enemy Marksmen.
- name: Fleet
  description: Wayne ensure no misstep goes unpunished with an eagle's eye for weakness,
    granting all troop's attacks a 5%/10%/15%/20%/25% Crit Rate.
- name: Gunslinger (Lv. 5)
  description: Wayne unleashes a rapid five-shot barrage, dealing Attack 56% damage
    to a random ennemy. If the target is an Escort, there is a 100% chance of instantly
    knocking them down.
- name: Offensive Defense (Lv. 5)
  description: Waynes strategic brilliance increases DefenderTroops' Lethality by
    15%.
