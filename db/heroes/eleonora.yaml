story: 'The frozen queen, the nation liberator, the Sunfire Castle mayor, the ruler
  of the tundra, the hope of Solaris, and the shield princess... All these describe
  Eleonora III, the current ruler of the Solaris Dynasty, whose legitimacy is recognized
  by few.\nAfter the fall of the her kingdom, Eleonora lived in exile under the protection
  of her loyal knights until she came of age. Now, she has blossomed into a formidable
  knight and an exceptional commander. While restoring her kingdom is her ultimate
  goal, she has to work as a mercenary to make a living.


  Eleonora was just an infant when Sunfire Castle collapsed, leaving her with no memory
  of the old kingdom. For a long time, she simply accepted the mission to restore
  it, without truly resonating with the aspiration. However, during her years of exile,
  she endured much contempt and humiliation from the emerging nobility, and it was
  through this hardship that the desire to create her own kingdom began to take root
  in her heart.


  Eleonora mastered the art of combat under the tutelage of Sir Gregory, even surpassing
  her mentor. She slowly built a reputation on the tundra with her remarkable skills.


  Nevertheless, she didn''t win everyone''s approval. In Jeronimo''s eyes, Eleonora
  and her followers were nothing more than some imposters pretending to be royalty,
  and he boldly claimed to have found the true princess. To clear her name, Eleonora
  decided to challenge the arrogant swordsman. Although Sir Gregory eventually intervened
  and stopped the duel, the desire to prove herself against Jeronimo still burned
  deep within her.


  With the backing of some old nobles, Eleonora once captured a sprawling city to
  serve as her new capital. Yet, it wasn''t long before she fell out with her benefactors.


  The indulgent and corrupt nobles levied heavy taxes and forced labor upon the people,
  plunging them into misery. Eleonora, having once experienced the pain of being uprooted,
  saw through the cruelty of the old order. She tried to help the struggling masses,
  but her actions threatened the nobles'' interests. In response, they turned their
  backs on her, expelled her from the new capital, and accused her of being an imposter.


  With no other option but to start anew, Eleonora had the support of Sir Gregory
  and other loyal warriors. Now, she has wholeheartedly embraced the dream of restoring
  her kingdom—one founded on equality and compassion.'
