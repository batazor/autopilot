skills:
- name: Shield of Blaze
  description: Eleonora raises a spiked shield, a symbol of royalty, gaining Attack*
    100%/130%/160%/190%/220% shield value and reflecting 30% of damage taken to the
    enemy. The shield ruptures after 3s, dealing 60%/65%/70%/75%/80% damage to nearby
    enemies.
- name: Regal Sanction
  description: Eleonora strikes forcefully at the target with a heavy hammer, dealing
    Attack* 100%/110%/120%/130%/140% damage and reducing the target's Defense by 10%/15%/20%/25%/30%
    for 2s.
- name: Majestic Corona
  description: The noble blood in Eleonora renders her an unyielding spirit, reducing
    her damage taken by 5%/7.5%/10%/12.5%/15% and increasing her damage dealt by 5%/7.5%/10%/12.5%/15%
    .
- name: Scorching Sun
  description: Eleonora inspires all troops with her royal aura and sense of honor,
    increasing their Health by 5%/10%/15%/20%/25% .
- name: Solaris Nexus
  description: Eleonora deploys a balanced formation, reducing damage taken by 2%/4%/6%/8%/10%
    for her Infantries and increasing damage dealt by 2%/4%/6%/8%/10% for her Marksmen.
- name: Soaring Flame
  description: Eleonora strikes fear into her enemies with her fierce assaults, increasing
    all troops' damage dealt by 5%/10%/15%/20%/25% and reducing their damage taken
    by 5%/10%/15%/20%/25% every 5 attacks made by Infantry for 2 turns.
- name: Hammer & Shield (Lv. 5)
  description: Eleonora developed adaptability during her exile, increasing Attack
    by 24% when her Health is higher than 50% and increasing her Defense by 75% when
    her Health is under 50%.
- name: Last Fortress (Lv. 5)
  description: Eleonora fights every battle like her last, inspiring Defender Troops
    and increasing their Health by 15%.
