skills:
- name: King's Resolve
  description: Gatot activated a shield of Resolve as the heir of kings, providing
    Shield with protection equals to Attack * 220%/260%/300%/340%/380% that will be
    deducted first, lasts for 5s.
- name: Royal Authority
  description: Gatot’s inherent regal aura intimidates all enemy heroes, reducing
    Attack by 1%/2%/3%/4%/5% and increasing his Attack by an amount equal to 1%/2%/3%/4%/5%
    * number of intimidated heroes for 3s.
- name: Regal Dance
  description: Gatot’s exceptional combat skills resemble a powerful war dance, granting
    him a 3%/6%/9%/12%/15% chance of dodging enemy’s Normal Attack and a 4%/8%/12%/16%/20%
    Crit Rate.
- name: Golden Guard
  description: Gatot commands his troops with imperial guard tactics, increasing his
    Infantry’s Defense by 6%/12%/18%/24%/30% .
- name: King's Bestowal
  description: The great kings blesses Gatot’s Infantry, granting Infantry a Shield
    with protection equal to Attack* 6%/12%/18%/24%/30% each time they attack, for
    1 turn.
- name: Royal Legion
  description: Gatot’s formidable legion instills fear in enemies, reducing their
    Attack by 5%/10%/15%/20%/25% .
- name: King’s Punishment (Lv. 5)
  description: Extra Shield protection equal to Attack*95% is granted to King’s Resolve,
    reflecting 30% damage to the enemy while shield is active.
- name: Indestructible City (Lv. 5)
  description: Indestructible cities are forged with courage and determination, increases
    Defender Troops' Defense by 15%.
