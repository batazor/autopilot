story: 'Gatot is a valiant warrior as well as an outstanding commander. He came from
  a faraway land with an elite squad, seemingly in search of something on the tundra.


  Little is known about Gatot''s past. Uncertain about his stance, many chiefs on
  the tundra keep their distances from him. For some reason, Gatot and his followers
  exhibit strong hostility toward the Phaethon. Following the principle, "The enemy
  of my enemy is my friend," the Dawn Alliance has high hopes for Gatot. Gatot might
  not be interested in joining the alliance, but he is impressed by the valor displayed
  by its warriors in their battles against the Phaethon.


  The first cooperation between the Dawn Alliance and Gatot took place when the former
  was facing a perilous situation.


  At that time, the Phaethon launched an attack on the camp resided by the alliance''s
  top guns, having intercepted crucial intelligence. The camp was in dire straits
  under Helios Cannon''s relentless Firepower and Zenobia''s swift charge.


  At that critical moment, Gatot joined the battle as a third party. The unexpected
  presence of his squad on the flanks tore apart the Phaethon''s formation.


  During a one-on-one battle, Gatot successfully stabbed the arrogant Zenobia, providing
  an opportunity for Logan to break free. All by himself, Logan reached the peak of
  a cliff and destroyed the cannon. In the end, the two formidable forces worked in
  tandem to repel the Phaethon''s attack. Despite turning down the chance to join
  the Dawn Alliance, Gatot made no secret of his admiration for Logan and his wish
  to recruit him as a general of his squad.


  Gatot is actually a king of a faraway, exotic land. As a teenager, he ascended to
  the throne when his kingdom was plagued by both internal conflicts and external
  threats. In just a few years, he stabilized his precarious rule and quelled rebellions,
  restoring unity in his discordant kingdom. His people saw him as a hero after he
  fended off formidable enemies


  against overwhelming odds.


  Through his persistent efforts in territorial expansion, his kingdom had prospered
  like never before. In just ten years on the throne, he already emerged as the greatest
  king of the kingdom.


  However, the good times did not last long. Because of an incident, Gatot was forced
  to entrust his kingdom to another to embark on a journey away from his homeland...


  A priceless treasure was once hidden in Gatot''s palace-a peculiar book that recorded
  the fate of the world but remained undecipherable.


  A few years back, a Phaethon''s emissary visited his palace. Considering the emissary
  was


  knowledgeable and well-versed in ancient languages, Gatot invited her to unravel
  the secrets within the book. However, the mystery remained unsolved, and the book
  was gone along with the mysterious emissary.


  Gatot attributed the loss of the book to his negligence. As the king, he felt compelled
  to shoulder the responsibility of retrieving the national treasure. Before setting
  off on his expedition together with his most trusted legion, he swore in front of
  his people to never return until the book was reclaimed from the Phaethon.'
