    for 2s.
- name: Escape Capsule
  description: Mr. Tin ejects his core as an escape capsule for Edith at 0 health,
    detonating the rest of his body in a fiery explosion, dealing attack 200%/220%/240%/260%/280%
    damage to nearby enemies.
- name: Preemptive Alerts
  description: Edith's battlefield intel warns Mr. Tin of potential dangers, granting
    him a 10%/20%/30%/40%/50% chance of reducing damage taken by 50%
- name: Strategic Balance
  description: Mr. Tin's colossal presence automatically shields friendly ranged units,
    reducing damage taken by 4%/8%/12%/16%/20% for Marksmen, and supresses the ennemy,
    increasing damage dealt by 4%/8%/12%/16%/20% for Lancers.
- name: Ironclad
  description: Mr. Tin's metallic body functions as a fortified wall on the field,
    reducing damage taken by 4%/8%/12%/16%/20% for Infantry.
- name: Steel Sentinel
  description: Edith's mobile defence system is reliable, increasing helth by 5%/10%/15%/20%/25%
