- name: Energizing Shot
  description: Phillys special shot improves troops focus, granting a 40% chance of
    reducing all troops Damage Taken by 10%/20%/30%/40%/50% .
- name: Extraction (Lv. 5)
  description: Philly has done much to raise the strength of her herbal skills, increasing
