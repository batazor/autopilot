story: 'The sight of a strange masked woman can be unsettling. What does she look
  like behind that beaked mask? Or is it actually part of her? For that, people always
  stayed away from Dr. Philly, until a plague struck several years ago.


  The deadly disease hit the Cities without warning. The Chiefs designated a village
  as the quarantine spot for all those infected. Although, without proper resources,
  people in the village were practically left to die. When all hope was lost for the
  sick and forsaken, Dr. Philly chose to enter the village in search of a cure.


  And she succeeded. She was dubbed a miracle worker, an angel of the Cities. Philly
  spends a lot of time in the City graveyards and often faced accusations of grave
  robbery. Her studies of dead bodies are now encouraged by authorities, as her discoveries
  often lead to new cures for diseases. Philly is still regarded as a somewhat mysterious
  figure for spending long hours at the morgue and apothecary. This air of mystery
  made some people believe that Philly possesses supernatural power against diseases.


  The truth was far more mundane. Philly was a promising medical researcher in the
  academy before a plague claimed the lives of all her families. Philly was the only
  survivor in her house. After that, she became determined to push boundaries and
  find new treatments for the plague.


  Philly threw herself back into her studies with a vengeance. She has marked out
  disease and death as her personal enemies. And with anger came courage to face whatever
  dangers head on. However, Philly''s goal is not just to conquer disease. She believes
  that one day she will be able to find a way to reverse death, even to the extent
  of bringing her family back...'
