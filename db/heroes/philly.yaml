skills:
- name: First Aid
  description: Philly's advanced medical training immediately restores Health equal
    to her Attack * 200%/220%/240%/260%/280% to all friendly heroes.
- name: Restorative Hands
  description: A master of first aid on the point of death, Philly immediately restores
    Health equal to her Attack * 100%/110%/120%/130%/140% to the weakest friendly
    hero.
- name: Paralytic Lotion
  description: Philly poisons the target, disabling the enemy for 1s while dealing
    Attack* 140%/154%/168%/182%/196% damage.
- name: Vigor Tactics
  description: Philly's secret remedy strengthens the soldiers, increasing Attack
    by 3%/6%/9%/12%/15% and Defense by 2%/4%/6%/8%/10% for all troops.
- name: Dosage Boost
  description: Philly's uses her secret tonic to enhance the warriors' strength, granting
    all troops' attack a 25% chance of dealing + 120%/140%/160%/180%/200% damage.
- name: Energizing Shot
  description: Phillys special shot improves troops focus, granting a 40% chance of
    reducing all troops Damage Taken by 10%/20%/30%/40%/50% .
- name: Extraction (Lv. 5)
  description: Philly has done much to raise the strength of her herbal skills, increasing
    their healing effects by 70%.
- name: First Aid Training (Lv. 5)
  description: Philly imparts her basic first-aid and care techniques, increasing
    Defender Troops' Health by 15%.
