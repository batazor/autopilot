story: 'Mia’s group of traveling merchants is never short of people with extraordinary
  abilities. Among them, there is a foreign young lady named Reina. Reina might not
  stand out at first sight, but she is, only known to a few, an excellent juggler
  during the day and a ninjutsu master at night.


  Reina is a changed woman once she puts on her ninja attire. Leaving no traces when
  moving around, she is good at disguising herself and sneaking into places. Her target
  could hardly notice her presence even if she were close at hand. With this amazing
  skill, Reina has collected a lot of vital intel for Mia.


  Undoubtedly, assassination is Reina’s best skill. Whether using a ninjaken, a sword,
  or her bare hands, she can easily finish off her target without causing a stir.


  Reina is Mia’s right-hand woman as well as her best friend. From time to time, some
  forces will go after Mia and the other merchants because they have discovered too
  many secrets. Whenever Mia is in danger, Reina will put her life on the line to
  protect Mia and help her deal with the crisis. Reina always goes all out for Mia,
  not only to repay Mia’s kindness of taking her in but also for the sake of their
  close friendship formed during their expedition.


  Reina was unconscious when Mia met her for the first time, Mia''s caravan took Reina
  in, and saved her life. At first, Reina was wary about things around her and was
  unwilling to interact with other people. It was Mia’s pet cat, Bastet, that opened
  Reina’s heart and provided her with warmth. Now, Reina and Bastet have become inseparable.


  Reina was an orphan raised by the Phaethon Mercenaries. Together with her childhood
  friends, she was trained to be an assassin. Despite performing her duties with dedication,
  she became a target to be eliminated after finding out a crucial secret of the mercenaries.
  Reina’s dark past leaves her tormented by guilt, but Mia believes that Reina is
  capable of moving on. What is truly concerning for Mia is the possibility of the
  Phaethon Mercenaries coming to their door again...'
