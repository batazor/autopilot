skills:
- name: Poison Blast
  description: Gordon throws a vase that disintegrates into a toxic mist, dealing
    Attack by 50%/55%/60%/65%/70% damage to nearby enemy every 0.5s for 3s.
- name: Toxic Molotov
  description: Gordon hurls a chemical flask with precision and poisons the target,
    dealing Attack 25%/27.5%/30%/32.5%/35% damage every 0.5s and increasing its Damage
    Taken by 5%/10%/15%/20%/25% for 2s.
- name: Tolerization
  description: Gordon's body has adapted to toxic over-exposure by generating new
    responses, increasing his Defense by 25%/37.5%/50%/62.5%/75% .
- name: Venom Infusion
  description: Gordon dips Lancer's weapons in venom. Every 2 attacks, Lancers deals
    20%/40%/60%/80%/100% extra damage and apply poison to the target for 1 turn. Posioned
    ennemies deals 4%/8%/12%/16%/20% less damage.
- name: Chemical Terror
  description: Gordon's envenomed weapons terorizes the field, increasing Lancer's
    Damage Dealt by 30%/60%/90%/120%/150% and reducing Damage Dealt by 6%/12%/18%/24%/30%
    for all ennemy troops for 1 turn, every 3 turns.
- name: Toxic Release
  description: Gordon generates a defensive bio-toxic fog, confusing enemy frontline
    Infantry, increasing their Damage Taken by 6%/12%/18%/24%/30% , while blocking
    enemy Marksmen's line of sigth to reduce their Damage Dealt by 6%/12%/15%/24%/30%
    for 2 turns every 4 turns.
- name: 'Potion #1325 (Lv. 5)'
  description: Gordon's chemical arsenal increases his Damage Dealt by 25% and reduces
    the Attack of poisoned target by 15%.
- name: Bio Assault (Lv. 5)
  description: Gordon privileges his allies with special envenomed weaponry, increasing
    Rally Squad's Lethality by 15%.
