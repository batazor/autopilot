skills:
- name: Barrage
  description: Norah unleashes a 5-grenade cascade against random target (heroes first),
    dealing Attack 60%/66%/72%/78%/84% Area of Effect damage.
- name: Flashbang
  description: Norah throws the flasbang, dealing Attack 50%/55%/60%/65%/70% damage
    and stuns the target for 1.5s.
- name: Valkyrie Cry
  description: Norah blitzes the ennemy, boosting all Troops Attack by 3%/3.5%/4%/4.5%/5%
    .
- name: Combined Arms
  description: Norah is well trained in combined arms tactics, decreasing Damage Taken
    by 3%/6%/9%/12%/15% and boosting Damage Dealt by 3%/6%/9%/12%/15% for Infantry
    and Marksman.
- name: Sneak Strike
  description: Norah has an eye for weaknesses, granting her Lancers a 20% chance
    of dealing 20%/40%/60%/80%/100% extra damage to all enemies on attack.
- name: Momentum
  description: Norah motivates our troops, increasing all troops' Damage Dealt by
    5%/10%/15%/20%/25% and reducing their damage taken by 5%/10%/15%/20%/25% every
    5 attack made by lancer for 2 turns.
- name: Disruptor (Lv. 5)
  description: Norah improves her Barrage grenades, granting a 35% chance of stunning
    the target for 1s.
- name: True Grit (Lv. 5)
  description: Norah inspires other with her courage under fire, boosting Defender
    Troops Deffense by 15%.
