skills:
- name: Spike Guard
  description: Seigel extends the metal spikes on his armor for 5 seconds, increasing
    Defense by 5%/10%/15%/20%/25% and reflecting 5%/10%/15%/20%/25% of damage back
    to attackers.
- name: Spear of the Moon
  description: Seigel lunges forward with his mighty spear, dealing Attack* 40%/45%/50%/55%/60%
    area of effect damage to enemies in a straight line before swinging in a fan-shaped
    arc for Attack* 40%/45%/50%/55%/60% area damage to enemies in its path.
- name: Cursed Protection
  description: Life in Hell has endowed Seigel with dark determination, reducing damage
    taken by 4%/8%/12%/16%/20% and granting immunity from negative effects for the
    first 6/7/8/9/10 seconds of battle.
- name: Armor of Night
  description: Seigel will always seek to bring the most advanced weapons and armor
    of the Night's Guard to his outfit, increasing Health by 5%/10%/15%/20%/25% for
    all troops.
- name: Night's Defense
  description: Seigel would rather blunt an enemy's spear than sharpen his own. His
    Infantry suffer 4%/8%/12%/16%/20% reduced Attack, but the additional protection
    reduces enemy Marksman and Lancer Attack by 7%/14%/21%/28%/35% .
- name: Vanguard of Eternity
  description: Seigel's inhuman defenses and iron will are transferred to Infantry
    under his command, reducing damage from normal attacks by 5%/10%/15%/20%/25% or
    6%/12%/18%/24%/30% from enemy skills.
- name: Inhuman Cast
  description: The Blood Moon plague still living inside Seigel finds a foothold in
    battle, extending Spike Guard and restoring his Health by 25% of damage dealt.
- name: Hell's Vow
  description: Seigel drives himself onward with an iron determination that cannot
    help but increase Defender Troops Lethality by 15%.
