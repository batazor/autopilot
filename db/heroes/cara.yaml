skills:
- name: Arcane Blast
  description: Cara launches a powerful cannon at enemies, dealing Attack* 200%/220%/240%/260%/280%
    Area damage.
- name: Gloomy Mist
  description: Cara fires a Steamy Whammy, releasing a mist-like gas that obscures
    the enemy's vision and reduces their accuracy by 7%/9%/11%/13%/15% . The gas burns
    the targets continuously, dealing Attack* 7%/9%/11%/13%/15% damage per 0.5s for
    2s.
- name: Heartfelt Friendship
  description: Each time an ally Hero is knocked down. Cara's rage and power are fueled,
    increasing her Attack by 3%/6%/9%/12%/15% until the end of the battle.
- name: Smoky Encounter
  description: Cara drops smoke grenades from the air, hindering enemy attacks and
    reducing their Lethality by 4%/8%/12%/16%/20%
- name: Mech Pet
  description: The Mech Pets crafted by Oestermore crafters join forces with the warriors,
    increasing normal attack damage by 10%/15%/20%/25%/30% for all troops
- name: Witch's Wrath
  description: Thanks to Cara's flying broom, she effortlessly bypasses the enemy
    infantry on the frontline. Her Marksmen deal 8%/16%/24%/32%/40% extra damage to
    enemy Lancers and 4%/8%/12%/16%/20% extra damage to enemy Marksmen every two attacks
- name: Techno Power
  description: The crafters from Oestermore modify Cara's gear, increasing the duration
    of Gloomy Mist by 1s and increasing her normal attack damage by 25%
- name: Shrouded Haven
  description: Cara defends the city like her hometown, inspiring the Defender Troops
    and increasing their Lethality by 15%
