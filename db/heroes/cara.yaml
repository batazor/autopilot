story: 'With Cara of the Oestermore Postal Service, the mail always gets through.


  The red-headed wonder girl can be seen flying over and between the towns of Ostermore
  at different times of the day or night courtesy of her steam-powered air-broom,
  delivering letters and much-needed smiles to survivors anxiously awaiting the mail.
  Children may chase her down the street and ask her to perform a magic trick, but
  the only real witchery here is the magic of great charm and talent.


  In these strange times, the best postal workers come with considerable firepower.
  Life for even the privileged City-dweller isn''t easy. Bandits and wild predators
  are always on the prowl, and many a time has Cara had to intervene directly or with
  a broom-based diversion while reinforcements arrive.


  Cara always finds time in her busy delivery schedule to pursue the twin interests
  of baking (in which she has become a deft creator of macaroons and Mont Blancs)
  and sleuth of Oestermore''s urban legends. In the former she is joined frequently
  by friends Edith and Gisela, fellow notable members of the Tundra, but the latter
  is only a source of anxiety for everyone else.


  The Tundra is still full of wild unknowns. If only Cara could make a name for herself
  by identifying a new species like the legendary "Jumping Jack", sighted in Ostermore
  a few times! There is still surprisingly a lot of raw feeling around this strange
  phenomenon. Gisela has urged Cara to drop her investigation many times-for what
  sinister figures may be trying to keep the mystery under wraps?!


  But for Cara bravery is a kind of code of conduct.


  The more her friends urge Cara to drop an issue, the more she insists on pursuing
  it.


  And Cara has plenty of reasons to want to be brave.


  Most Oestermorians could tell you what they were doing on the day the City was nearly
  lost to bandits. For Cara, she had just finished delivering a toy to a child at
  a local orphanage when the unmistakable tremors of cannonballs started shaking the
  city walls. Everywhere all at once there was a great uproar. Not knowing what they
  faced and fearing for the child''s safety, Cara immediately brought the child with
  her as far from the fighting as possible. Cara only learned later what had happened:
  the City fell to the invaders, but only for one night.


  The wounds have already healed but the scars remain from Oestermore''s brief occupation,
  in which many senior leaders were badly injured or worse. As one of the City''s
  most skilled technologists, Cara finds it hard to forgive herself for being absent
  during the fall of the City no matter the reason why.


  By way of consolation, Gisela went to the effort of crafting Cara a personalized
  weapons suite in case the situation ever arose again. As often happens with prototypes,
  the new air-broom ended up slightly miss-calibrated, resulting in a much more powerful
  cannon than intended. A surprising accident, but a happy one as Cara would discover.


  Cara was returning from a routine delivery when she spotted a menacing airship outfitted
  with an enormous cannon, piloted by the same bandits who had occupied Ostermore
  years ago! Cara quickly realized two things: the bandits must be planning to bombard
  the city gates in preparation for a larger attack and her flying air-broom had not
  yet been detected. Cara lined up the perfect shot and let loose: bullseye! Smoke
  began to emerge from the airship as a general alarm was sounded over the city. There
  was no way the bandits could press their attack now.


  Cara was hailed as a hero upon her return, which went some way to relieving her
  self-imposed feelings of inadequacy.'
