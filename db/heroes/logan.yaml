- name: Fists of Destruction
  description: Smashes Fists of Steel on the ground, releasing a powerful blast that
    deals Attack* 120%/132%/144%/156%/168% damage to the target and reduces the Attack
    Speed of the target by 50% for 4s.
- name: Power Suit
  description: Logan’s Power Suit provides extraordinary protection and has a 8%/10%/12%/14%/16%
    chance of increasing Defense by 8%/11%/13%/17%/20% when attacked for 2s up to
    5 stacks.
- name: Blustery Strike
  description: Performs a powerful punch that comes with a freezing and blustery wind,
    dealing Attack* 80%/88%/96%/104%/112% damage to the targets in a cone-shaped area
    with a 30% chance of stunning the targets for 1s.
- name: Lion's Might
  description: Logan overwhelms his enemies with a fierce presence, reducing all enemy's
    Troops' Attack by 4%/8%/12%/16%/20% .
- name: Lion Intimidation
  description: Logan intimidates his opponent with the ferocity of a lion, reducing
    damage taken by 4%/8%/12%/16%/20% for all troops.
- name: Leader Inspiration
  description: Logan inspires everyone with his inherent leadership qualities, increasing
    the Health by 5%/10%/15%/20%/25% for all troops.
