story: 'From Greg’s perspective, the frozen world is like a forest full of perils.
  Only the harshest environment can dehumanize one and bring out one’s evil side the
  best. “That’s why we need order,” he said.


  Greg tries to restore the order of the world with rationality and regulations, and
  he is devoted to maintaining the dignity of the law. As a judge, he is impartial
  and dedicated to his job, but he is often sabotaged by others because of that. More
  than once his life has been put on the line, but he never wavers. On the contrary,
  he became more determined than ever after going through many life-and-death situations.


  This is his warning for the lawless: One day, you will all be sanctioned by the
  Edict. Although the Solaris has fallen, Grey still defends the old law as usual.


  He understands that some of the old regulations are outdated, considering that the
  Edict protects the rights of the long-gone aristocrats. Nevertheless, there are
  no better options at the moment. Perhaps, Greg will accept the suggestion of the
  Dawn Alliance one day and help them put together a new Edict.


  Greg''s ideology is very different from the vigilante Flint. Greg believes the desire
  for vengeance is no reason to bypass trials and proper judicial proceedings. Flint,
  on the other hand, would rather just burn Phaethon and all the despicable marauders
  to the ground. Although Flint is on Greg’s list of wanted suspects, Greg has never
  laid a hand on Flint even when coming face-to-face with him.


  Sergey''s story is the only thing that made Greg question his own commitment to
  strict jurisprudence. Did Sergey really deserve a death sentence for disobeying
  his superiors in an attempt to protect a City? Greg admitted, "If I was the judge
  that day, I do not know whether I should pass the sentence."'
