skills:
- name: Righteous Wind
  description: Summons a cage from the sky, dealing Attack* 160%/176%/192%/208%/224%
    damage to enemies within range and stunning them for 2s.
- name: Poetic Justice
  description: Puts an enemy target on trial and imposes punishment or gives commendation.
    Punishment will deal damage equal to Greg's Attack* 220%/240%/260%/280%/300% to
    the target whereas commendation will restore Health equal to Greg's Attack*50%
    for the target.
- name: Fair Judgment
  description: Let the enemies be severely punished for the crimes they have committed,
    increasing their damage taken by 10%/15%/20%/25%/30% for 3s.
- name: Sword of Justice
  description: Greg transforms our troops into a relentless sword of justice, granting
    a 20% chance of increasing damage dealt by 8%/16%/24%/32%/40% for all troops for
    3 turns.
- name: Deterrence of Law
  description: Greg uses the authority of the law to intimidate enemies, granting
    all troops' attack a 20% chance of reducing damage dealt by 10%/20%/30%/40%/50%
    for all enemy troops for 2 turns.
- name: Law and Order
  description: Greg's faith in law and order uplifts everyone, increasing Health by
    5%/10%/15%/20%/25% for all troops.
- name: Courtroom Order (Lv. 5)
  description: Greg silences and prevents the from using skills for 5s (skills already
    cast are not affected), and dealing Attack*300% damage to them.
- name: Trumpet of Justice (Lv. 5)
  description: Greg mobilizes the army under the banner of justice and belief, increasing
    Rally Troop Health by 15%.
