story: 'Jeronimo was born with a silver spoon in his mouth. He was the heir of a local
  Duke in the old empire. Even after the old world''s collapse, he maintained the
  noble style of dress, decorum, and speech. Many people dislike his demeanor, but
  none can deny that Jeronimo is an invaluable asset to the Dawn Alliance.


  He is an extremely capable swordfighter. Jeronimo''s techniques are the embodiment
  of sword-fighting science and art. Unfortunately, the intricacy of his techniques
  made it almost impossible for other soldiers to learn.


  Jeronimo is also one of Dawn Alliance’s finest commanders, thanks to his education
  at the Imperial Military Academy. Jeronimo''s early life in the upper class has
  raised him with expensive tastes. Such tastes are impossible to maintain even for
  an accomplished fighter like him. As a result, he accumulated a huge amount of debt.
  The debt drove him to work as a "contract commander" under Phaethon Mercenaries.
  He also became their duel master and trainer.


  His years in the Phaethon had seen various engagements against the Dawn Alliance.
  Some members of the Alliance, Bahiti for one, can’t come to terms with that so easily.
  Jeronimo''s upbringing and education made him a model of chivalry. He hated the
  underhanded techniques of Phaethon leaders, and his departure was an inevitability.


  Phaethon''s revenge came quicker than Jeronimo''s resignation. In a fight against
  bandits, Jeronimo was outmanned and Phaethon''s promised reinforcements were nowhere
  to be seen. He sent an urgent request to the Dawn Alliance for help instead. From
  there, it was easy enough for the Alliance to persuade Jeronimo to join them.


  Off the battlefield, Jeronimo fancies himself as a poet, and most of his creations
  are love poetry. When they were on the same assignments, Cloris'' fighting prowess
  and supposed royal bloodline stirred something in Jeronimo''s heart. However, below
  is Cloris’ response to Jeronimo''s many advances: "Of all the awkward, stupid, and
  moronic things you do and say, Jeronimo, your love poems are surely the worst."'
