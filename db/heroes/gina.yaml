story: 'Curt, tight-lipped, reserved - all these traits make Gina one of the least
  approachable survivors of the City. Of course, being the leader of a fearsome band
  of mercenaries probably has a lot to do with that as well.


  "You''d better pray she stays on our side because she would make one hell of an
  enemy" is what Sergey says about her. Gina''s tactics are ruthless, her bow skills
  are legendary, and her explosive arrows strike fear into the hearts of enemies.
  Gina is also an extremely aggressive commander that deploys "guerilla-style" strategies,
  launching attacks from multiple fronts to ensure maximum enemy confusion.


  Mercenaries generally have a bad reputation in Cities. They are often loud, obnoxious,
  and take whatever that pleases them (even from clients). Mercenaries represent a
  two-edged sword for Cities without military defenses. However, Gina''s Eagles are
  different. They have the same rigorous standards as an elite military group. Many
  crews are orphans, and some were even rescued by Gina herself. Gina’s motto is ingrained
  in every member of the group: "Discipline is strength".


  Gina had a very negative experience early in her career. It was an inter-City war.
  After she helped the winning Chief secure victory, Gina saw the fallen City''s survivors
  being put to the sword. Gina kept telling herself they were merely performing a
  contract, but the war crimes had caused much self-doubt. Since then, the group never
  raised their swords against innocent survivors.


  Gina is a hard-nosed mercenary, but she also has a softer side. Patrick once talked
  about her love of sweet desserts and cute plush toys, and Gina had to teach him
  a lesson on confidentiality afterward.'
