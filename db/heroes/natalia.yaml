skills:
- name: Beast Charge
  description: Natalia's bear violently smashes the ground, knocking back enemies
    in range and stunning them for 1s, while dealing Attack* 160%/176%/192%/208%/224%
    Area of Effect Damage.
- name: Whip
  description: Natalia wields her whip against a target for Attack* 150%/165%/180%/195%/210%
    damage.
- name: Rage Response
  description: Only fools would dare anger Natalia or her furry companion. Natalia
    has a 10% chance of gaining a + 4%/6%/8%/10%/12% Attack boost for 3s upon taking
    damage (max 5 stacks).
- name: Feral Protection
  description: Natalia Commands the beasts to cover your troops, granting a 40% chance
    of reducing all troops' Damage Taken by 10%/20%/30%/40%/50%
- name: Queen of the Wild
  description: Natalia is a natural leader, increasing Attack by 5%/10%/15%/20%/25%
    for all troops.
- name: Call of the Wild
  description: Natalia's unexplained connection with nature allows her to rally wild
    beast, increasing damage dealt by 5%/10%/15%/20%/25% for all troops.
- name: Ursus Strength
  description: Natalia exhibits the ferocity of a polar bear on the field, inspiring
    friendlies even in her absence, increasing all troops' Attack and Defense by 2%/4%/6%/8%/10%
- name: Unity (Lv. 5)
  description: Natalia and the Polar Bear are in perfect synchrony, increasing damage
    dealt by 30%. (maxed)
- name: Invincibles (Lv. 5)
  description: Natalia summons a herd of beasts to join the rally, raising the rallying
    Troops' Lethality by 15%. (maxed)
