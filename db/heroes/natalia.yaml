story: '"Natalia knows the scientific and common names of every species of flora or
  fauna".Above is Bahiti’s impression of Natalia, the young prodigy. Natalia possesses
  knowledge far beyond her years, having studied ecology, geology, and astronomy.


  Yet Natalia''s most extraordinary ability is to communicate with and befriend wild
  animals. She is a good companion for fellow survivors as well, although she tends
  to talk non-stop on topics of of her own interest.


  Natalia was little more than a baby when she met the grizzly cub Kasia. The cub
  was separated from its family, and wouldn’t have survived in the wilderness alone.
  Natalia and her father took Kasia in and raised it into a strong beast. The two
  were inseparable, and the cross-species bond is strong. After the passing of Natalia’s
  father, they depended on each other and survived together in the long winter...


  Natalia''s father Tyle is a "planetary ecologist". By comparing soil samples throughout
  the years, Tyle concluded that the global cooling process might be slowing, and
  could even reverse at some point in the near future. This observation filled him
  with optimism. Tyle had also begun work on self-sustaining heat sources with experimental
  fire crystals. Even Phaethon took great interest in Tyle''s work and began to sponsor
  his research...


  Tyle''s fire crystal technology was the greatest accomplishment of his scientific
  career. It had the potential to help all humankind, but can also cause disasters
  in the wrong hands. Tyle soon realized his sponsor was much more interested in personal
  gains than the greater good. Tyle passed his most crucial research notes to Natalia
  before his death at Phaethon''s hands. He hoped that Natalia might finish his designs.
  Tyle’s noble sacrifice continues to inspire Natalia.'
