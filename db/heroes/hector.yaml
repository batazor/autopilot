skills:
- name: Sword Whirlwind
  description: Hector unleashes a whirlwind of scordplay, increasing Attack Speed
    by 80%/90%/100%/110%/120% and becoming immune to Freeze, Stun and other control
    effect, for 4s.
- name: Desperado
  description: Hector thrives with danger, reduce Damage Taken by 20%/30%/40%/50%/60%
    under 50% health.
- name: Adrenaline Surge
  description: Mortal peril is a powerful elixir to Hector's battle-hardened will.Hector
    gains + 16%/24%/32%/40%/48% Attack under 50% Health.
- name: Survival Instincts
  description: A seasoned warrior with an uncanny knack for reading the battlefield,
    Hector's presence has a 40% chance of reducing damage taken by 10%/20%/30%/40%/50%
    for all troops.
- name: Rampant
  description: Hector excels at raiding on fortified positions with well-coordinated
    Marksmen, increasing Infantry's Damage Dealt by 100%/125%/150%/175%/200% , and
    Marksman's Damage dealt by 20%/40%/60%/80%/100% , it is effective for 10 attacks,
    with each attack's damage boost being 85% of the previous one.
- name: Blitz
  description: Hector has mastered the offensive strategy, granting a 25% chance of
    dealing 120%/140%/160%/180%/200% damage on attack.
- name: Reaper's Embrace (Lv. 5)
  description: The heat of battle reforges a warrior's spirit, extending Hector's
    Sword Whirlwind by 1.5s and restore Hector's health by 15% of damage dealt.
- name: Goliath (Lv. 5)
  description: Hector excels at using terrain against attackers, increasing Defender
    Troops Attack by 15%.
