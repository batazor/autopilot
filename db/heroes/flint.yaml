skills:
- name: Fires of Vengeance
  description: Flint's fire-breathing attack deals Attack* 60%/66%/72%/78%/84% damage
    every 0.5s and amplifies damage taken by the target by 10%/15%/20%/25%/30% for
    2s.
- name: Incinerator
  description: Pain only boosts Flint's potential. Flint immediately regains 20%/25%/30%/35%/40%
    of his max Health when Health is below 50%. Can only activate once per battle.
- name: Heat Diffusion
  description: The warmth of Flint's fire represents hope in troubling times, boosting
    your heroes' Attack Speed by 3%/4%/5%/6%/7% .
- name: Pyromaniac
  description: Every flame, no matter how small, can ignite a roaring fire. Flint
    increases his infantry's Damage Dealt by 20%/40%/60%/80%/100%
- name: Burning Resolve
  description: Flint's fire not only dispels the cold but also ignites the passion
    for battle, increasing Attack by 5%/10%/15%/20%/25% for all troops.
- name: Immolation
  description: Flint's flame of anger devours everything. Increasing all troops' Lethality
    by 5%/10%/15%/20%/25% .
- name: Vengeful Task (Lv. 5)
  description: Once released, the fires of Flint's vengeance cannot be quenched, boosting
    Attack by 24% until the end of battle once "Incinerator" is triggered.
- name: Dragonbreath (Lv. 5)
  description: Flint fortifies his flamethrower for city defense, increasing Defense
    Troops' Attack by 15%.
