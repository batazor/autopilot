id: lucky_pouch
name: Lucky Pouch
wiki_url: https://www.whiteoutsurvival.wiki/items/lucky-pouch/
category: ''
description: 'Shares one Lucky Pouch in the Alliance Chat Channel upon use. Tap the
  Lucky Bag to claim a reward of 500 to 5,000 Gems!


  When used, the Lucky Pouch can be shared in chat channels for other Chiefs to claim.


  The Lucky Pouch remains valid for 24 hours, after which it expires and cannot be
  claimed.


  You can claim up to 10 Lucky Pouches shared by others each day.


  If you successfully share a pouch, you''ll receive a pouch reward for yourself that
  does not count toward your daily claim limit.


  When sharing a Lucky Pouch, you can choose whether to share it to the World Channel.
  Bonus Lucky Pouches won''t use up your items but only have a 50% chance of sharing
  successfully.


  World Channel Lucky Bags require a Lv. 10


  Furnace to claim and cannot be sent or claimed in the Cross-State World Channel.


  When you successfully claim a Lucky Pouch, you will receive a reward of 500 to 5,000
  Gems.'
sources:
- You can claim up to 10 Lucky Pouches shared by others each day.
- World Channel Lucky Bags require a Lv. 10
- Furnace to claim and cannot be sent or claimed in the Cross-State World Channel.
- Kasia's Wish House
