description: This Teleport will place you closest to where your R5 is located, no
  matter if they are in an Alliance Area or not. Keep that in mind when using the
  teleport if you want to move to your hive, as the alliance territory gives bonuses
  but only when your Furnace is placed on the alliance territory!
