id: mithril
name: Mithril
wiki_url: https://www.whiteoutsurvival.wiki/items/mithril/
category: ''
description: 'A mysterious metal that imbues Hero gear with extraordinary power. You
  will need Mithril to continue leveling up your hero gear.


  How much will you need?


  Mythril


  is used for Hero gear ascension. After your hero gear reaches


  level 100


  and


  level 10 mastery forging


  you can spend


  2 mythic gear


  to make it red. After its red you have to enhance it to


  level 19 and level 11 mastery forging


  . then you can make the first enhancement with mythril. It will cost


  10 mithril and 3 mythic gear


  .


  The first enhancement will give you


  20 percent attack or defense


  in expedition depening on which hero gear you decide to upgrade. After you upgrade
  your gear will be


  level 20


  .


  You then have to bring it to


  level 39 and mastery forging level 12 to


  enhance it again with mythril. Upgarde will cost


  5 mythic gear and 20 mithril


  .


  The next upgrade will either give you


  7.5% hero health or lethality


  for exploration depending on which gear you chose.


  After your upgrade your gear will be


  level 40


  and you have to bring it to


  level 59 and mastery forging level 13


  to enhance it again with Mythril.


  The upgrade will cost


  30 mithril and 5 mythic gear


  . Your upgrade will either give you


  30 percent defense or attack depending


  on which gear you chose.


  After your upgrade your gear will be


  level 60


  and you have to bring it to


  level 79 and mastery forging level 14


  to enhance it again with mythril. Your upgrade will cost


  40 mithril and 10 mythic gear


  .


  If you decide to upgrade it further with mythril your upgrade will give you either


  15 % hero attack or defense


  for exploration. After your upgrade your gear will be


  level 80


  .


  You have to again enhance it to


  level 99 and mastery forging level 15


  to make your next upgrade with myhril. The upgrade will cost


  50 mithril and 10 mythic gear


  . It will either give you


  50 percent attack or defense for expedition


  . After your upgrade the gear will be


  level 100


  and


  maxed out for mythril upgrades


  How to get Mithril?


  Mithril is one of the most expensive items in the game. You can get 3 Mithril each
  week in the Arena and Labyrinth shops. Prioritize obtaining this item over others.


  You can also obtain it through certain events that appear on your calendar. We recommend
  prioritizing obtaining Mithril through these events.


  There are packs available in the store where you can purchase 1 Mithril from 5,99€
  and the following packs will scale in the usual way. Packages are reset weekly


  Tips:


  Everyone can follow their own strategy, but we recommend first upgrade the hero
  gear that each hero is designed for.


  Infantry will play a significant role in defense, so increasing their defense and
  health stats will be a priority.


  In the case of Markmen and Lancers, we recommend increasing lethality first.


  The order to carry out these increases, our recommendation is to start with the
  infantry, then markmen and finally lancers.


  Infantry: gauntlets, belt


  ,


  Marksmen: goggles, boots


  ,


  Lancer: goggles, boots'
