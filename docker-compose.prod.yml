# External-user setup — pulls pre-built images from GitHub Container Registry
# (published by ``.github/workflows/docker.yml`` on every push to ``main`` and
# every ``v*.*.*`` tag). No local toolchain required.
#
# Usage:
#     docker compose -f docker-compose.prod.yml up -d
#     open http://127.0.0.1:3000/overview
#
# Pinning a version (recommended for stability):
#     WOS_IMAGE_TAG=v0.1.0 docker compose -f docker-compose.prod.yml up -d
#
# Using a fork's images:
#     WOS_REGISTRY=ghcr.io/your-fork docker compose -f docker-compose.prod.yml up -d
#
# === ADB / network model ===
# ``bot`` runs in ``network_mode: host`` so the container shares the host's
# loopback. That way the host's ``adb start-server`` (bound to 127.0.0.1:5037
# by default — safe) is reachable as ``127.0.0.1:5037`` from inside the
# container, **without** exposing ADB on the host's external interfaces via
# ``adb -a``.
#
# Side effects of host-mode that this file already accounts for:
#   * ``bot`` cannot use the Compose-internal DNS name (``redis``)
#     for the other services — host-mode bot has no Compose network attached.
#     ``redis`` publishes to ``127.0.0.1:<port>`` on the host, and ``bot`` talks
#     to it via that.
#   * ``bot`` has no ``ports:`` block — workers bind only to Redis/ADB on the host.
#   * ``api`` and ``web`` use the default bridge network and reach Redis via
#     the ``redis`` service name; ``web`` proxies ``/api`` to ``api:8765``.
#
# Platform support:
#   * **Linux** — ``network_mode: host`` is fully supported out of the box.
#   * **Docker Desktop (macOS/Windows)** — works only with the **Host
#     networking** beta enabled: Settings → Resources → Network → "Enable
#     host networking". Without it, the bot can reach ``ocr`` / ``redis`` on
#     loopback but **not** the host's adb server. Older Docker Desktops fall
#     back to the bridge-network behaviour described in the comments below.
#
# Mutable repo files (labeling, devices, player state) are bind-mounted from
# the checkout so ``api`` writes are visible to ``bot``. Override the root:
#     WOS_REPO=/path/to/autopilot docker compose -f docker-compose.prod.yml up -d

x-wos-data-volumes: &wos-data-volumes
  - ${WOS_REPO:-.}/area.json:/app/area.json
  - ${WOS_REPO:-.}/references:/app/references
  - ${WOS_REPO:-.}/db:/app/db

# Redis Unix socket shared across containers. Skips the loopback TCP stack
# (no syscall pair per command, no checksums) for ~10-20% lower CPU on
# busy ZSET ops and ~30% shorter RTT on small commands. ``redis-py`` reads
# ``unix:///…`` URLs natively, so no app code change is needed. TCP stays
# published on 127.0.0.1:6379 for ``redis-cli`` / debugging.
x-wos-redis-socket-volume: &wos-redis-socket-volume
  - redis_socket:/var/run/redis

services:
  redis:
    image: redis:alpine
    # ``redis:alpine`` runs as the ``redis`` user, but a fresh named volume
    # is mounted root-owned — so bind() on the socket fails with EACCES on
    # first boot. ``chown`` the socket dir in a thin entrypoint wrapper,
    # then ``exec docker-entrypoint.sh`` keeps the upstream UID drop. The
    # ``--unixsocketperm 777`` line lets bot/api containers (different UIDs
    # from ``redis``) connect without us aligning UIDs across images.
    entrypoint:
      - sh
      - -c
      - >
        chown redis:redis /var/run/redis &&
        exec docker-entrypoint.sh
        redis-server
        --appendonly yes
        --unixsocket /var/run/redis/redis.sock
        --unixsocketperm 777
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - redis_socket:/var/run/redis
    restart: always
    healthcheck:
      # Use the socket itself for the health probe — that's exactly what
      # bot/api will use, so a TCP-only success would hide socket misconfig.
      test: ["CMD", "redis-cli", "-s", "/var/run/redis/redis.sock", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  bot:
    image: ${WOS_REGISTRY:-ghcr.io/batazor/whiteout-survival-autopilot}/bot:${WOS_IMAGE_TAG:-latest}
    # host-mode: shared loopback with the host so ``adb`` and the
    # ``127.0.0.1:5037`` server are reachable without ``adb -a`` (which would
    # expose ADB on every interface, including LAN). See header for the
    # Docker Desktop caveat — needs the "Host networking" beta toggle.
    network_mode: host
    # Compose's depends_on still works across networking modes, but the bot
    # connects to redis through the shared socket volume below.
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # ``redis-py`` accepts ``unix:///path?db=N`` directly. Volume-mounted
      # at the same path in this container; host-mode networking doesn't
      # affect bind mounts.
      WOS_REDIS_URL: unix:///var/run/redis/redis.sock?db=0
      # Host's adb server, untouched (default loopback bind is fine because
      # the container shares the host's lo).
      ADB_SERVER_SOCKET: tcp:127.0.0.1:5037
      # ``WOS_LICENSE`` env var still works as an override (CI / power users)
      # but the primary distribution path is a license file in
      # ``./license-data/wos-license.json`` (mounted below).
      WOS_LICENSE: ${WOS_LICENSE:-}
    volumes:
      - ${WOS_REPO:-.}/area.json:/app/area.json
      - ${WOS_REPO:-.}/references:/app/references
      - ${WOS_REPO:-.}/db:/app/db
      - redis_socket:/var/run/redis
      # License file lives here. The directory mount (not file mount) lets the
      # API container write to it via the /api/license/import endpoint and lets
      # the user drop the file in manually before first boot.
      - ${WOS_REPO:-.}/license-data:/app/license-data
      # Stable per-host id for license binding. Mounted :ro so the container
      # observes the same value across rebuilds. Falls back to MAC+hostname
      # if the file is absent (e.g. on platforms without systemd).
      - /etc/machine-id:/etc/machine-id:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[w]orker.supervisor' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  api:
    image: ${WOS_REGISTRY:-ghcr.io/batazor/whiteout-survival-autopilot}/bot:${WOS_IMAGE_TAG:-latest}
    command: ["api"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      WOS_REDIS_URL: unix:///var/run/redis/redis.sock?db=0
      WOS_API_HOST: 0.0.0.0
      WOS_API_PORT: "8765"
      # Same license-file path as ``bot`` (mounted below). ``WOS_LICENSE`` is
      # still honored as an env override. ``WOS_ADMIN_TOKEN`` is only set in
      # the maintainer's environment — without it, the issuer endpoint 403s.
      WOS_LICENSE: ${WOS_LICENSE:-}
      WOS_ADMIN_TOKEN: ${WOS_ADMIN_TOKEN:-}
    volumes:
      - ${WOS_REPO:-.}/area.json:/app/area.json
      - ${WOS_REPO:-.}/references:/app/references
      - ${WOS_REPO:-.}/db:/app/db
      - redis_socket:/var/run/redis
      - ${WOS_REPO:-.}/license-data:/app/license-data
      - /etc/machine-id:/etc/machine-id:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    image: ${WOS_REGISTRY:-ghcr.io/batazor/whiteout-survival-autopilot}/web:${WOS_IMAGE_TAG:-latest}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      WOS_API_URL: http://api:8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/overview').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

volumes:
  redis_data:
  redis_socket:
