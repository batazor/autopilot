[project]
name = "whiteout-survival-autopilot"
version = "0.1.0"
description = "Multi-account Whiteout Survival automation bot"
requires-python = ">=3.13"
dependencies = [
    "redis>=5.0",
    "httpx>=0.27",
    "tenacity>=8.3",
    "transitions>=0.9",
    "ortools>=9.10",
    "rapidfuzz>=3.9",
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "watchdog>=4.0",
    "psutil>=5.9",
    "numpy>=1.26",
    "networkx>=3.2",
    "pyobjc-framework-Quartz>=10.3",
    "opencv-python-headless>=4.9",
    "ddddocr>=1.4",
    "beautifulsoup4>=4.12",
    "streamlit>=1.39",
    "streamlit-autorefresh>=1.0",
    "streamlit-drawable-canvas>=0.9.3",
    "st-ant-tree>=0.0.16",
    "pillow>=10.0",
    "streamlit-react-flow>=0.0.3",
]

[project.optional-dependencies]
ocr = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "paddlepaddle>=2.6",
    "paddleocr>=2.7",
]
dev = [
    "ruff>=0.4",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]
ui = [
    "streamlit>=1.39",
    "streamlit-autorefresh>=1.0",
    "streamlit-drawable-canvas>=0.9.3",
    "st-ant-tree>=0.0.16",
    "pillow>=10.0",
    "streamlit-react-flow>=0.0.3",
]
annotator = [
    "streamlit>=1.39",
    "streamlit-drawable-canvas>=0.9.3",
    "pillow>=10.0",
]

[project.scripts]
wos = "worker.launch:main"
wos-bot = "worker.supervisor:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = [
    "account",
    "actions",
    "capture",
    "century",
    "config",
    "fsm",
    "gift",
    "layout",
    "navigation",
    "ocr",
    "scheduler",
    "scenarios",
    "tasks",
    "ui",
    "usecases",
    "worker",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = ["ANN401"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
