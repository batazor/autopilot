name: Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **security** issues, do not use this form —
        follow [SECURITY.md](../blob/main/SECURITY.md) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `uv run bot`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the image tag.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, emulator + ADB setup, Docker vs local.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste log output or a `uv run botctl trace <inst>` dump. Redact secrets.
      render: shell
