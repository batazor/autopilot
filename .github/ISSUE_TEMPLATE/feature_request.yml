name: Feature request
description: Suggest a new capability, scenario, or game module
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A new scenario, module, DSL step, UI?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scenario / DSL
        - New game module
        - Overlay engine / OCR
        - Web dashboard
        - API / worker
        - Docs
        - Other
