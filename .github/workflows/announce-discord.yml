name: announce-discord

# Manually post an announcement to the Discord release channel using the
# DISCORD_WEBHOOK secret (the same one the docker release workflow uses).
# Secrets can't be read outside Actions, so this runs inside CI where the
# secret is available. The message body lives in .github/discord/announce.md;
# edit that file and re-run this workflow to post an update.

on:
  workflow_dispatch:
    inputs:
      title:
        description: Discord embed title
        required: false
        default: "🚀 Autopilot — What's New Since 0.4.0"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post announcement to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TITLE: ${{ inputs.title }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret is not set" >&2
            exit 1
          fi
          # Discord embed descriptions cap at 4096 chars — trim to stay under.
          body=$(cat .github/discord/announce.md)
          body=${body:0:4000}
          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$body" \
            '{embeds:[{title:$title, description:$desc, color:5814783}]}')
          curl -fsS -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"
          echo "Posted announcement to Discord."
