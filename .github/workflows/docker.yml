name: docker

# Builds the runnable service so external users can pull the image and
# `docker compose up` without a local toolchain:
#   * bot — worker + scheduler + FastAPI entrypoint + local Tesseract OCR (multi-arch)
#   * web — Next.js operator dashboard (multi-arch)
#
# Built on every semver git tag and on demand via the workflow_dispatch button.
# Published as `:latest` only. Commits to main don't trigger.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: bot
            dockerfile: Dockerfile.bot
            # arm64 covered for Apple Silicon dev machines; main deps all have wheels.
            platforms: linux/amd64,linux/arm64
          - name: web
            dockerfile: Dockerfile.web
            platforms: linux/amd64,linux/arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Pin the BuildKit image so the boot pull is reproducible instead of
          # re-resolving the floating ``buildx-stable-1`` tag every run. If the
          # anonymous Docker Hub pull times out, just re-run the job.
          driver-opts: image=moby/buildkit:v0.30.0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # ``github.repository`` is ``owner/repo``; nested path keeps the two
          # services tidy under one repo's package namespace.
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=autopilot/${{ matrix.service.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ matrix.service.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake build identity into the image so /api/version can compare it
          # against the GHCR ``:latest`` manifest's ``org.opencontainers.image.revision``
          # label and surface "update available" in the dashboard.
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_REVISION=${{ github.sha }}
          # Per-service cache scopes so the bot and ocr builds don't evict
          # each other's layers. ``ignore-error`` keeps a transient GHA cache
          # backend outage (Azure 400 HTML page) from failing the whole build —
          # it logs a warning and skips the cache export instead.
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max,ignore-error=true
          provenance: false
