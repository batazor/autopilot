name: docker

# Builds the two runnable services so external users can pull the images and
# `docker compose up` without a local toolchain:
#   * ocr — PaddleOCR HTTP API (linux/amd64 only; paddlepaddle has no
#           upstream arm64 wheels for Python 3.13 as of writing)
#   * bot — worker + scheduler + Streamlit UI (multi-arch)
#
# Tagged on every push to main (`:latest`, `:<sha>`), on every semver tag
# (`:vX.Y.Z`, `:X.Y.Z`, `:X.Y`), and on demand via the workflow_dispatch button.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "Dockerfile.bot"
      - "ocr/Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: bot
            dockerfile: Dockerfile.bot
            # arm64 covered for Apple Silicon dev machines; main deps all have wheels.
            platforms: linux/amd64,linux/arm64
          - name: ocr
            dockerfile: ocr/Dockerfile
            # paddlepaddle has no Python 3.13 arm64 wheel — leave amd64 only.
            platforms: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only push on push events / tags. PRs from forks can't read packages:write
        # anyway, so skip the login + push for them.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ``github.repository`` is ``owner/repo``; nested path keeps the two
          # services tidy under one repo's package namespace.
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=whiteout-survival-autopilot/${{ matrix.service.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ matrix.service.platforms }}
          # PRs validate the build but don't publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-service cache scopes so the bot and ocr builds don't evict
          # each other's layers.
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          provenance: false
