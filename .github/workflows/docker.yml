name: docker

# Builds the runnable service so external users can pull the image and
# `docker compose up` without a local toolchain:
#   * bot — worker + scheduler + FastAPI entrypoint + local Tesseract OCR (multi-arch)
#   * web — Next.js operator dashboard (multi-arch)
#
# Tagged on every semver git tag (`:vX.Y.Z`, `:X.Y`, `:latest`) and on
# demand via the workflow_dispatch button. Commits to main don't trigger.

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "Dockerfile.bot"
      - "Dockerfile.web"
      - "pyproject.toml"
      - "uv.lock"
      - "web/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: bot
            dockerfile: Dockerfile.bot
            # arm64 covered for Apple Silicon dev machines; main deps all have wheels.
            platforms: linux/amd64,linux/arm64
          - name: web
            dockerfile: Dockerfile.web
            platforms: linux/amd64,linux/arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only push on push events / tags. PRs from forks can't read packages:write
        # anyway, so skip the login + push for them.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # ``github.repository`` is ``owner/repo``; nested path keeps the two
          # services tidy under one repo's package namespace.
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=autopilot/${{ matrix.service.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ matrix.service.platforms }}
          # PRs validate the build but don't publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-service cache scopes so the bot and ocr builds don't evict
          # each other's layers.
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          provenance: false
