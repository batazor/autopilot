name: "\U0001F381 Redeem Gift Codes (Kingshot)"
enabled: true

# Offset by 30 minutes from WOS so the two scrapes don't hammer the
# aggregator endpoints simultaneously on hosts that run both games.
cron: "30 */6 * * *"

steps:
  - exec: kingshot_gift_code_scrape
  - exec: kingshot_gift_code_redeem
