overlay:
  - name: labyrinth.main_city.event_icon.visible
    region: main_city.icon_search
    action: findIcon
    template: games/wos/events/labyrinth/references/crop/main_city_main_city.to.labyrinth.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    steps:
      - push_scenario:
          name: event.labyrinth
          ttl: 1m
  - name: labyrinth.main.visible
    region: labyrinth.title
    action: text
    expected:
      - Labyrinth
    threshold: 0.9
    screens:
      - event.labyrinth
    ttl: 5m
    steps:
      - push_scenario:
          name: event.labyrinth.sync_caves
          ttl: 5m
  - name: labyrinth.main_menu.land_of_heroes.claimable
