edges:
  main_city:
    event.tundra_trek:
      resolver: template_icon
      region: main_city.to.tundra_trek
      template: games/wos/events/tundra_trek/references/crop/main_city_main_city.to.tundra_trek.png
      search_region: main_city.tundra_trek.icon_search
      threshold: 0.9

  main_world:
    event.tundra_trek:
      resolver: template_icon
      region: main_world.to.tundra_trek
      template: games/wos/events/tundra_trek/references/crop/main_city_main_world.to.tundra_trek.png
      search_region: main_world.tundra_trek.icon_search
      threshold: 0.9

  event.tundra_trek:
    main_city: [icon.page.back]
    main_world: [icon.page.back]
    main_menu: [icon.page.back]
    # The trek hub hosts the Endless Wayfarer deal; its banner (red dot when a
    # milestone is claimable) opens the deal sub-screen. Gives the navigator a
    # second route into deals.endless_wayfarer besides the main_city icon.
    deals.endless_wayfarer: [tundra_trek.endless_wayfarer]

  # Back out of the Endless Wayfarer deal to the trek hub it was opened from.
  deals.endless_wayfarer:
    event.tundra_trek: [icon.page.back]

  # The travel/stop sub-screen backs out to the event main (signpost) screen,
  # which in turn backs out to main_city. Lets the navigator escape the trek.
  event.tundra_trek.stop:
    event.tundra_trek: [icon.page.back]
