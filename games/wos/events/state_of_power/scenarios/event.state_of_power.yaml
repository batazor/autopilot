enabled: true
name: State of Power
node: main_city
icon: state_of_power
steps:
  # The Events panel is a swipe-only carousel that opens on the primary event,
  # so State of Power can't be reached by the node graph (no segmentable tab
  # strip, non-discriminative crown icons). This exec opens the panel, swipes to
  # the leftmost page, OCR-confirms "State of Power", taps its tab and verifies.
  - exec: goto_state_of_power

  - ocr: state_of_power.matchmaking.ttl
    event_timer: state_of_power.matchmaking

  # Claim phase rewards (matchmaking / battle result screens).
  - while_match: button.claim
    max: 3
    steps:
      - click: button.claim
      - wait: 1s
  - while_match: button.claim.big
    max: 3
    steps:
      - click: button.claim.big
      - wait: 1s
      - while_match: tapanywhereyoexit
        expected: ["tap anywhere"]
        max: 1
        steps:
          - click: tapanywhereyoexit
          - wait: 1s

  # Field Triage phase — assist allies with Rebirth Tomes for State of Power
  # Points. Tomes are event-bound (use-or-lose), so spending them is strictly
  # good. The "Assist ally" red dot lights only while tomes remain, so it gates
  # the whole block and auto-stops once they're spent. Flow: open the Field
  # Hospital, open the first ally's assist popup, spend tomes 5-at-a-time then
  # the leftover 1-at-a-time (the popup persists between taps; tapping with no
  # tomes is a harmless no-op), then dismiss the stacked modals. Never taps
  # "Troop Revival" (spends your own healing speedups) or any Buy CTA.
  - while_match: state_of_power.assist_ally
    isRedDot: true
    max: 1
    steps:
      - click: state_of_power.assist_ally
      - wait: 1500ms
      - while_match: state_of_power.assist_icon
        max: 1
        steps:
          - click: state_of_power.assist_icon
          - wait: 1s
          - while_match: state_of_power.assist_5x
            max: 12
            steps:
              - click: state_of_power.assist_5x
              - wait: 900ms
          - while_match: state_of_power.assist_1x
            max: 4
            steps:
              - click: state_of_power.assist_1x
              - wait: 700ms
          # close the assist popup (back to the Field Hospital list). Retry the
          # probe so the X is caught once the popup has rendered/settled.
          - while_match: state_of_power.assist_popup.close
            max: 1
            retry: { attempts: 5, interval: 500ms }
            steps:
              - click: state_of_power.assist_popup.close
              - wait: 800ms
      # close the Field Hospital (back to the event screen). Retry so the X is
      # caught after the assist-popup close animation settles — a single probe
      # raced the transition and left the modal open.
      - while_match: state_of_power.field_hospital.close
        max: 1
        retry: { attempts: 5, interval: 500ms }
        steps:
          - click: state_of_power.field_hospital.close
          - wait: 800ms

  # Never linger on the event screen.
  - push_scenario: check_main_city
