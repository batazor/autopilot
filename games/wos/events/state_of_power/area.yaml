version: 2
screens:
  - id: 1
    screen_id: event.state_of_power
    ocr: references/main.png
    regions:
      - name: event.state_of_power
        action: exist
        threshold: 0.9
        bbox:
          x: 38.5
          y: 7.1
          width: 22.6
          height: 7.2
          rotation: 0
          original_width: 720
          original_height: 1280
      # Page title "State of Power", left-aligned below the tab strip. Present on
      # every SoP sub-screen (matchmaking / Defeat / Victory / Field Triage) but
      # NOT on sibling tabs (Calendar etc.), so it's the screen_verify landmark.
      # Read by OCR, not a template crop: the SoP banner reskins per phase.
      - name: state_of_power.title
        action: text
        type: string
        threshold: 0.8
        preprocess: fast_line
        bbox:
          x: 2.0
          y: 16.0
          width: 56.0
          height: 4.2
          rotation: 0
          original_width: 720
          original_height: 1280
      - name: state_of_power.matchmaking.ttl
        action: text
        threshold: 0.9
        bbox:
          x: 34.7
          y: 77.7
          width: 30.7
          height: 4.4
          rotation: 0
          original_width: 720
          original_height: 1280
        type: time
      # Field Triage phase: green "Assist ally" button (bottom-left). Its red dot
      # lights only while Rebirth Tomes remain, so it gates the assist flow.
      - name: state_of_power.assist_ally
        action: exist
        threshold: 0.85
        has_red_dot: true
        bbox:
          x: 8.0
          y: 90.0
          width: 42.0
          height: 5.5
          rotation: 0
          original_width: 720
          original_height: 1280
      # Field Hospital popup: the per-ally handshake (assist) icon at the right
      # of an ally row.
      - name: state_of_power.assist_icon
        action: exist
        threshold: 0.8
        bbox:
          x: 86.0
          y: 32.0
          width: 8.0
          height: 4.6
          rotation: 0
          original_width: 720
          original_height: 1280
      # Assist-ally popup: "Assist 5 times" (spends 5 Rebirth Tomes) and
      # "Assist 1 time" (spends 1). Tapping with no tomes is a harmless no-op.
      - name: state_of_power.assist_5x
        action: exist
        threshold: 0.85
        bbox:
          x: 8.0
          y: 57.4
          width: 32.0
          height: 7.0
          rotation: 0
          original_width: 720
          original_height: 1280
      - name: state_of_power.assist_1x
        action: exist
        threshold: 0.85
        bbox:
          x: 54.5
          y: 57.4
          width: 31.5
          height: 7.0
          rotation: 0
          original_width: 720
          original_height: 1280
      # Close (X) buttons for the stacked modals. The popup detector
      # mis-classifies the Field Hospital as a captcha (never auto-dismissed), so
      # the scenario taps these explicitly instead of relying on dismiss_popup.
      - name: state_of_power.assist_popup.close
        action: exist
        threshold: 0.8
        bbox:
          x: 84.6
          y: 27.3
          width: 7.2
          height: 4.1
          rotation: 0
          original_width: 720
          original_height: 1280
      - name: state_of_power.field_hospital.close
        action: exist
        threshold: 0.8
        bbox:
          x: 86.7
          y: 14.8
          width: 7.2
          height: 4.1
          rotation: 0
          original_width: 720
          original_height: 1280
