enabled: true
name: Journey of Light
priority: 80_000

node: deals
icon: journey_of_light

steps:
  - while_match: journey_of_light.claim_all
    max: 1
    retry:
      attempts: 2
      interval: 500ms
    steps:
      - click: journey_of_light.claim_all
      - wait: 1s
      - while_match: tapanywhereyoexit
        max: 1
        steps:
          - click: tapanywhereyoexit
          - wait: 1s

  - while_match: journey_of_light.add
    isRedDot: true
    steps:
      - click: journey_of_light.add
      - wait: 1s
      - click: quick_adventure_pack.free
      - wait: 1s
      - while_match: tapanywhereyoexit
        steps:
          - click: tapanywhereyoexit
          - wait: 1s
      - click: icon.page.back

  - while_match: journey_of_light.dispatch_all
    max: 1
    steps:
      - click: journey_of_light.dispatch_all
