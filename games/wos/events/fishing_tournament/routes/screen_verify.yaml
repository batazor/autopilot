screens:
  # Pre-start promo splash ("Countdown to Event Start" + Trial Stages).
  event.fishing_tournament:
    rules:
      - match: event.fishing_tournament
        threshold: 0.9

  # Live tournament hub (Frosty Prospector / Ice Fishing buttons + points
  # tracker). Distinct from the promo splash above — anchored on the play
  # buttons, which exist only here (template ~1.0 on this screen vs <0.21 on
  # gameplay / main_city).
  # The live hub has TWO states: a "choose mode" state with Frosty Prospector /
  # Ice Fishing play buttons, and a "resume" state with a single "Go Fish" button
  # (the live event icon opens THIS one mid-tournament — confirmed on-device).
  # Either landmark confirms the hub (rules are OR'd), so both states route.
  main_ready:
    priority: 30
    # The hub renders over a short load after the event-icon tap; give the
    # post-hop verify room so the inbound hop doesn't fail on a transient frame.
    retry:
      attempts: 6
      interval_seconds: 1.0
    rules:
      - match: fishing_tournament.play.frosty
        threshold: 0.85
      - match: fishing_tournament.go_fish
        threshold: 0.85

  # The fishing minigame itself. Anchored on the gameplay screen title (top-left
  # heading), present for the whole round. terminal: a round is driven by the
  # fishing exec FSM, not the screen graph; the system_back edge in edge_taps.yaml
  # is a safety recovery so it can never strand.
  gameplay:
    priority: 30
    terminal: true
    rules:
      - match: fishing_tournament.gameplay.title
        threshold: 0.9

  # Pause modal that overlays a running round — two buttons: "Continue" (resume)
  # and "Retreat" (abandon the round). Anchored on Retreat, which exists only on
  # this modal. Priority below gameplay so the modal wins detection even if the
  # gameplay title still shows behind it.
  pause:
    priority: 20
    rules:
      - match: fishing_tournament.retreat
        threshold: 0.9

  # Post-round catch summary ("Haul" — Depth + caught items). Appears when a
  # round finishes; its "to fishing tournament" button returns to the live hub.
  # Anchored on that button (template 1.0 here vs ≤0.53 on other screens).
  haul:
    priority: 30
    rules:
      - match: fishing_tournament_haul.to.fishing_tournament
        threshold: 0.85
