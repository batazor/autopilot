# Dreamscape Memory — solver map.
#
# The recall-road levels show a scene plus a row of word buttons at the bottom
# (OCR'd from regions ``dreamscape_memory.1`` / ``.2`` / ``.3``). Each word names
# an object hidden in the scene; you win by tapping that object.
#
# This map answers "where does WORD live in the scene?". Keys are the word as it
# is printed on the button, matched case-insensitively (leading/trailing space
# and inner whitespace are ignored). Values are the tap point as a percentage of
# the 720x1280 game frame — ``x``/``y`` are 0–100, measured from the top-left,
# and the bot taps that point.
#
# Populate from the labeling UI or a real screenshot. Any OCR'd word missing
# here is logged by ``exec.dreamscape_memory_solve`` (see exec.py) as an
# "unmapped" miss so you know exactly what to add. An empty / TODO map is a safe
# no-op: the solver simply taps nothing.
#
# Example:
#   targets:
#     book:  { x: 48.5, y: 41.0 }
#     wolf:  { x: 44.0, y: 55.5 }
#     smoke: { x: 52.0, y: 30.0 }

targets: {}
