enabled: true
name: "Troops: train lancer"
priority: 70_000
node: lancer
cond: "active_player != null"

steps:
  # Tap the camp building: collects the ready bubble when one is up,
  # otherwise opens the options ring (Details / Upgrade / Train).
  - click: lancer.complete
  - wait: 1s

  # If the first tap collected troops the options did NOT open (verified on a
  # live walk) — tap the building again, then enter Train.
  - while_match: troops.options.train
    max: 1
    steps:
      - click: troops.options.train
      - wait: 1.5s
    else:
      - click: lancer.complete
      - wait: 1s
      - click: troops.options.train
      - wait: 1.5s

  # New-tier unlock splash ("IX Supreme ... — Tap anywhere to continue") shows
  # up both on entering Train and when switching camp tabs.
  - while_match: troops.tap_anywhere
    max: 1
    steps:
      - click: troops.tap_anywhere
      - wait: 1s

  # Prefer promoting old troops to the newest tier (green up-arrow hint);
  # otherwise start a regular training batch.
  - while_match: train.upgrade
    max: 1
    steps:
      - click: train.upgrade
      - wait: 1s
      - click: troops.upgrade.start
      - wait: 1s
      - click: troops.promotion
      - wait: 1.5s
    else:
      - click: troops.train.start
      - wait: 1.5s

  # Conveyor: snapshot the Training/Promoting countdown pill and requeue this
  # scenario for right after the batch lands so the camp never idles.
  - ocr: troops.train.timer
    event_timer: troops.lancer.training
  - push_scenario:
      name: troops.lancer.train
      delay: "troops.lancer.training + 5m"
