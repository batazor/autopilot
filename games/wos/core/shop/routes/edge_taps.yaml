edges:
  main_city:
    shop: [main_city.to.shop]
  # Hub → tab: resolve dynamically. The navigator segments shop.tabs_strip,
  # identifies each tab by its per-page icon template (discover_tab_templates
  # still reads the labeled shop.to.* / page.shop.*.title crops), clicks the
  # match, and scrolls (next_region) when the target tab isn't on screen.
  # ``page`` defaults to the edge destination; ``namespace`` to the strip prefix.
  shop:
    main_city: [icon.page.back]
    shop.dawn_market:           { resolver: tab_identify, region: shop.tabs_strip }
    shop.mix_match:             { resolver: tab_identify, region: shop.tabs_strip }
    shop.chief_stamina:         { resolver: tab_identify, region: shop.tabs_strip }
    shop.ice_conqueror:         { resolver: tab_identify, region: shop.tabs_strip }
    shop.construction_queue:    { resolver: tab_identify, region: shop.tabs_strip }
    shop.daily_deals:           { resolver: tab_identify, region: shop.tabs_strip }
    shop.weekly_monthly_cards:  { resolver: tab_identify, region: shop.tabs_strip }
    shop.regular_pack:          { resolver: tab_identify, region: shop.tabs_strip }
    shop.dawn_fund:             { resolver: tab_identify, region: shop.tabs_strip }
    shop.get_gems:              { resolver: tab_identify, region: shop.tabs_strip }
    shop.artisans_trove:        { resolver: tab_identify, region: shop.tabs_strip }
    shop.custom_artistry_chest: { resolver: tab_identify, region: shop.tabs_strip }

  # Shop tabs close directly to main_city via icon.page.back — there is no
  # tab → hub edge (cross-tab navigation goes main_city → shop → tab).
  shop.dawn_market:         { main_city: [icon.page.back] }
  shop.mix_match:           { main_city: [icon.page.back] }
  shop.chief_stamina:       { main_city: [icon.page.back] }
  shop.ice_conqueror:       { main_city: [icon.page.back] }
  shop.construction_queue:  { main_city: [icon.page.back] }
  shop.daily_deals:         { main_city: [icon.page.back] }
  shop.weekly_monthly_cards: { main_city: [icon.page.back] }
  shop.regular_pack:        { main_city: [icon.page.back] }
  shop.dawn_fund:           { main_city: [icon.page.back] }
  shop.get_gems:            { main_city: [icon.page.back] }
  shop.artisans_trove:      { main_city: [icon.page.back] }
  shop.custom_artistry_chest: { main_city: [icon.page.back] }
