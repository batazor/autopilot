overlay:
  # Visible red-dot tabs should be handled before leaving Shop. This mirrors
  # Deals' tab-strip trigger, but keeps routing generic: the shared helper
  # clicks the first visible non-active red-dot tab even when the tab template
  # cannot be identified as a concrete page yet.
  - name: shop.tabs.visible_red_dot
    region: shop.tabs_strip
    action: detectTabs
    namespace: shop
    screens:
      - shop
      - shop.dawn_market
      - shop.daily_deals
      - shop.mix_match
      - shop.dawn_fund
      - shop.construction_queue
      - shop.weekly_monthly_cards
      - shop.get_gems
      - shop.artisans_trove
      - shop.custom_artistry_chest
      - shop.regular_pack
    steps:
      - push_scenario:
          name: tabs.strip.advance
          ttl: 5s
          args:
            region: shop.tabs_strip
            next_region: shop.tab.next_page

  # ── Cycle: advance to the next shop sub-page ─────────────────────────────
  # The right-arrow ``shop.tab.next_page`` is reachable from every shop
  # sub-page; the rule must be gated on each one explicitly because the
  # analyzer has no wildcard support. Without all screens listed, the bot
  # reaches a sub-page and never advances past it.
  - name: tabs.strip.advance.has_next_page
    region: shop.tab.next_page
    action: findIcon
    threshold: 0.8
    screens:
      - shop
      - shop.dawn_market
      - shop.daily_deals
      - shop.mix_match
      - shop.dawn_fund
      - shop.construction_queue
      - shop.weekly_monthly_cards
      - shop.get_gems
      - shop.artisans_trove
      - shop.custom_artistry_chest
      - shop.regular_pack
    steps:
      - push_scenario:
          name: tabs.strip.advance
          ttl: 5s
          args:
            region: shop.tabs_strip
            next_region: shop.tab.next_page
