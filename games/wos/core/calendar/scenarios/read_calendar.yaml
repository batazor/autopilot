# Recompute the event-calendar look-ahead and publish it to player state.
#
# Pure compute — no screen needed: the exec derives "what's on today and the
# next couple of days" from the declarative catalog (events.yaml) and writes the
# digest + per-event active flags so other modules' active_when conditions (e.g.
# the stamina allocator) can gate on a live event. Safe to run on any screen.
#
# Hourly is plenty: the windows are day-grained, so the only thing that changes
# between runs is which events crossed a start/end boundary.
name: Read calendar
enabled: true
cron: "0 * * * *"
steps:
  - exec: read_calendar
    days: 3
