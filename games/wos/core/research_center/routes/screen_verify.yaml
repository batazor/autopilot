screens:
  # Registers `research_center` as a verifiable FSM node (it was an edge/allowed
  # node in building.upgrade but had no verify rule — the same gap intel had).
  # OCR the screen title rather than a template so it survives event reskins.
  # TODO(on-device labeling): tighten research_center.title's bbox in area.yaml
  # against a real Research Center capture — the current bbox is a top-center
  # estimate.
  research_center:
    priority: 31
    rules:
      # RU «Белая мгла»: Research Center → «Исследовательский/Научный центр» (both
      # listed; verify exact wording on a live RU plate).
      - ocr: research_center.title
        contains: [Research, Исследовательский центр, Научный центр]
        threshold: 0.8

  # The Research Center building's action popup (Details / Upgrade / Research),
  # where the City-menu "Center Research" Go button lands. It has no stable title
  # plate, but it is ONLY ever reached straight from main_menu (the menu teleport),
  # so verify it image-less by its predecessor. from_screen rules don't compile to
  # detector landmarks, so this never causes a spurious detect_screen hit — it only
  # confirms the menu->research_center.building hop, after which the navigator taps
  # the Research button and re-verifies on research_center (the tech tree).
  research_center.building:
    priority: 31
    rules:
      - from_screen: main_menu
