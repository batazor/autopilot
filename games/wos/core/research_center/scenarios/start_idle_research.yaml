enabled: true
# Vertical slice: idle research slot → plan → navigate → start the tech.
#   1. plan_next_research     — value-greedy pick → planner.next_research (+ branch)
#   2. navigate_to_building   — radar navigator centres + opens the Research Center
#   3. start_planned_research — opens the tech tree, switches to the planned tech's
#      branch tab, scroll-locates its tile by name, taps it, then taps the in-tree
#      Research button (never the gem-spending Finish). All the dynamic logic
#      (branch→tab, OCR tile-locate, scroll) lives in the exec — the DSL can't
#      express it.
#
# Pushed by main_menu's panel scan when the Tech Research row reads Idle (that
# push is self-gated on THIS scenario's `enabled`, so this flag is the single
# switch that activates the whole research loop).
#
# The tech-tree regions are labeled (area.yaml) and the reader/dispatcher are
# implemented (exec.py). On-device navigation still leans on the radar navigator,
# which needs a saved main_city scan per account.
name: 🔬▶️ Start idle research · plan → navigate → research
device_level: true
priority: 56_000
cond: research.center.state.isAvailable ~= "1"
steps:
  - exec: dismiss_popup
  - exec: plan_next_research
  - cond: planner.next_research != ""
    steps:
      - exec: navigate_to_building
        building: research_center
        open: true
      - cond: nav.ok ~= "1"
        steps:
          - exec: start_planned_research
