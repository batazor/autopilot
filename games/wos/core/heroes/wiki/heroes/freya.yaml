skills:
- name: Chain Sunder
  description: 'Freya attacks the target with chains, dealing Attack* 200%/220%/240%/260%/280%
    damage to the target and surrounding enemies, leaving a mark on the target. When
    the marked target is attacked, 40%/50%/60%/70%/80% of the damage will be dealt
    to its surrounding enemies (trigger cooldown: 0.5s).'
- name: Prickled Bind
  description: Freya chain-smashes and binds a target, dealing Attack* 100%/110%/120%/130%/140%
    damage and immobilize them for 1.5s.
- name: Crystal Fury
  description: Freya's condition periodically erupts in a ferocious attack, increasing
    her Crit Rate by 60%/70%/80%/90%/100% per 8/7/6/5/4 normal attacks.
- name: Fog of War
  description: Freya lobs a smoke grenade to darken enemies' vision, reducing all
    enemy Troops' Attack by 4%/8%/12%/16%/20% .
- name: Blood Moon Scythe
  description: Freya reaps the fear of his enemies with her crescent-shaped weapon.
    After launching a normal attack, she has a 50% chance of performing Reap, dealing
    20%/40%/60%/80%/100% damage.
- name: Night's Vengeance
  description: Freya disrupts enemy attacks by launching a surprise raid and breaches
    enemy defense, decreasing damage taken by 3%/6%/9%/12%/15% and increasing damage
    dealt by 3%/6%/9%/12%/15% for her Infantries and Marksmen.
- name: Night Raid (Lv. 5)
  description: Freya's rigorous training increases her Damage by 30% while her instincts
    reflexively and instantly deal Attack*300% damage to enemies' summonees.
- name: Defender of the Watch (Lv. 5)
  description: Freya's eyes have never wavered from her sacred watch-task, increasing
    Defender Troops’ Defense by 15%.
