skills:
- name: Destructor
  description: Bradley primes his artillery with an extremely potent shell, dealing
    Attack 300%/330%/360%/390%/420% Area of Effect Damage.
- name: Incendiary Shell
  description: Bradley fires a special incendiary shell, dealing Attack 60%/66%/72%/78%/84%
    Area of Effect Damage. The flaming crater in its wake also deals Attack 17%/19%/21%/23%/25%
    damage to enemies every 0.5s for 2s.
- name: Audacious
  description: The prospect of death only energizes a seasoned warrior like Bradley,
    increasing his attack by 10%/14%/18%/22%/26% .
- name: Veteran's Might
  description: Bradley's years of combat experience enables him to destroy enemies
    efficiently, increasing Attack by 5%/10%/15%/20%/25% for all troops.
- name: Power Shot
  description: Bradley use his expertise in suppresive artillery against the ennemy
    vanguard, increasing Damage Dealt to Lancer by 6%/12%/18%/24%/30% , and to infantry
    by 5%/10%/15%/20%/25% for all troops.
- name: Tactical Assistance
  description: Bradley will press every advantage against a beleaguered ennemy, increasing
    Damage Dealt by 6%/12%/18%/24%/30% for all troops for 2 turns every 4 turns.
- name: Onslaught (Lv. 5)
  description: Shock and awe tactics can also boost morale. The "destructor" further
    increases Attack Speed by 14% for Heroes and Escorts for 5s.
- name: Siege Insight (Lv. 5)
  description: Bradley knows exactly where to place defenses as a sieges expert, increasing
    Defender Troops' Attack by 15%.
