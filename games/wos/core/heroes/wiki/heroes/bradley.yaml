story: 'Bradley is a model warrior, capable veteran, and military strategist trained
  by one of the finest military academies in oldworld history. Despite what may have
  happened afterward, he is also one of the Eagles'' finest warriors and will not
  tolerate anybody saying otherwise.


  A loyal soldier, Bradley earned his stripes primarily working artillery with his
  understanding of siege techniques, in this day and age, useful beyond measure. A
  calculating mind and occasional flashes of brilliance is the mainrason Bradley has
  retained his position as a member of Gina''s mercenary company and, at one point,
  Captain Fawkner''s rigth-hand man.


  The only shadow over Bradley remains the unexplained disappearance of his entire
  battalion on expedition, in which he was the sole survivor somehow unable to recall
  the circumstances surrounding their loss. Bradley returned a changed man, withdrawn,
  unable to explain why large parts of his recollection were now missing. It is doubtful
  he would have remained in the company without the backing of thei new leader, Gina,
  by whose trust Bradley has mounted a slow but gradual recovey.


  Bradley''s skills in the mechanical operation of all types of cannons is complemented
  by excellent sharp-shooting skills, swordsmanship when the situation requires, as
  well as fairly decent close-quarters combat abilities. A respected strategist, Bradley
  has developed a reputation for surgical strikes and minimizing civilian casualties,
  often quoting that, "Cannons do not win battles. Careful planning, timing, and hte
  courage to seize the moment do."


  Bradley was born into a relatively well-known military family in the old Solaris
  Empire, resulting in his acceptance to the ''last class" of the rapidity-dissolving
  Solaris Empire''s prestigious Royal Academy. Truth be told, the Imperial facade
  was already beginning to cruumble before Bradley was handed his first uniform.


  Bradley''s regiment came increassing to represent what the collapse of the old Empire
  might mean for everyday survival in the freezing world. Bradley still held out hope
  their ragtag group could somehow help rebuild the Solaris Empire and its honorable
  traditions. Most accepted the new reality: discipline and honor were dead, and survival
  required a cruel hand. The latter sparked Bradley''s transition to the mercenary
  life and confirmed his worst fears. The solaris Empire was gone and it would be
  rebuilt.


  Other than Captain Fawkner, just disappear? It was a relatively unexplored valley
  and site of many strange sightings. But why did only Bradley survive? Why can no
  one account for it?


  Bradley could have been cast out on suspicion of treachery were is not for Commander
  Gina''s abiding trust in the cursed man .Bradley has since begun a kind of regular
  pilgrimage to the same valley, seeking again and again some trace of Fawkner, his
  lost friends, or anything that might jog his memories. So far he has turned up nothing,
  yet still holds out hope.'
