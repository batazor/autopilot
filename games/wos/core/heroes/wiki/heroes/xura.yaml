skills:
- name: Life Dance
  description: Xura summons divine aid by dance invocation, healing all friendly heroes’
    health equal to Attack* 20%/40%/60%/80%/100% per second while reducing their damage
    taken by 50% for 3 seconds. Xura is immune to control effects throughout.
- name: Sporebind
  description: Xura infects the target with a deadly spore, dealing Attack* 100%/110%/120%/130%/140%
    damage each time the target attacks, lasts for 3s.
- name: Numbing Dart
  description: A blow dart lotion increases Xura's Attack by 4%/6%/8%/10%/12% with
    a 20% chance per dart of immobilizing the target for 1 second.
- name: Fungal Fog
  description: Xura releases an underground fungi that quickly multiplies to block
    enemy vision, reducing damage dealt to friendly troops by 4%/8%/12%/16%/20% .
- name: Piercing Arrow
  description: Being able to identify the weak spots in the enemy's armor, Xura's
    Marksmen deal 20%/40%/60%/80%/100% additional damage every 2 strikes and make
    their target take 5%/10%/15%/20%/25% more damage for 1 turn.
- name: Unorthodoxy
  description: Xura's unorthodox tactics are quite disruptive, increasing Marksmen’s
    damage dealt by 3%/6%/9%/12%/15% while reducing their damage taken by 2%/4%/6%/8%/10%
    .
- name: War Cry (Lv. 5)
  description: Xura exhorts the highest Attack ally with a tribal war dance, increasing
    their damage dealt by 60% for 4s.
- name: Gaiac Hymn (Lv. 5)
  description: Xura exhorts the City's Defenders with ancient hymns to Gaia, increasing
    their Attack by 15%.
