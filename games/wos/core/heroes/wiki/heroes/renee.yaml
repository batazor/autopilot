skills:
- name: Illusion Cloud
  description: Renee's colorful ball explodes and release a strage cloud, dealing
    Attack 100%/110%/120%/130%/140% Area of Effect damage to ennemies and confuse
    them for 1s. Confused ennemies attacks all surrounding targets, friend and foe.
- name: Starpaint
  description: Renee splashes dreamy paint, dealing Attack 50%/55%/60%/65%/70% damage
    to targets and placing a Star Mark target's damage taken by 2%/3%/4%/5%/6% for
    4s.
- name: Dream Vision
  description: Renee's targets painted with a Star Mark cannot escape her detection,
    incresaing her Attack by 8%/12%/16%/20%/24% , increasing damage dealt to marked
    targets by 4%/6%/8%/10%/12% .
- name: Nightmare Trace
  description: Renee always fights in unbelievable ways. The troops she commands can
    place Dream Marks on their targets every two turns, dealing extra 40%/80%/120%/160%/200%
    Lancer Damage once next turn. The Dream Marks last for 1 turns.
- name: Dreamcatcher
  description: Renee's Dreams Marks highilght ennemy vulnerabilities, incresing her
    Lancer's damage dealt to marked targets by 30%/60%/90%/120%/150% .
- name: Dreamslice
  description: Renee's Dream Marks expose ennemy weaknesses, increasing damage dealt
    to marked targets by 15%/30%/45%/60%/75% for all troops.
- name: Dream Illusion (Lv. 5)
  description: Renee attacks with drugged needles, granting attacks a 8% chance of
    confusing the target for 1s. Confused ennemies attacks all surrounding targets,
    friend and foe.
- name: Wistful Enchantment (Lv. 5)
  description: Renee boosts morale with her extraordinay talents, incresaing Rally
    Troops' Lethality by 15%.
