story: 'The wandering caravan attracts attention wherever it goes. Mia''s fortune-telling
  mesmerizes the adults,and Renee the clown is a favorite with children with her juggling
  and magic tricks. Renee also prefers spending time with children.


  Although Renee has a mind with thoughts that jump around too much for people to
  follow, she has an incredibly relatable personality and can easily makepeople open
  up their hearts to her. In addition, her performances also seem to have magic that
  can healthe soul, and make gloomy and hurt souls find joy again.


  However, like the other members of the caravan,Renee has secrets of her own too.
  No one knows what''s hidden behind that mask covered with paints


  Once, Mia''s caravan was attacked by a group of bandits but they cried and ran screaming
  after seeing Renee''s face.


  Because of this, all sorts of rumors spread about Renee''s face. Some curious people
  sneaked into the tent set up by the caravan to have a look at Renee''s terrifying
  face, but there was nobody in there. They turned back and were about to make their
  escape when they ran into Renee, who was returning. Unprepared, the intruders fell
  to the floor in fright, peeking between their fingers at Renee whose ghastly face
  was... not ghastly at all, but kind and friendly. They were not hurt due to their
  reckless actions either.


  It was not a ghastly face that had scared off those bandits, but a potion that made
  people fall inton ightmares called "Dream Mold" that Renee uses to fight and to
  defend herself.


  Renee has some immunity to these substances due to long term exposure to unstable
  Fire Crystals as a victim of an evil experiment, where her mind had been damaged.
  As Philly said, "No one can make someone who''s already insane go mad after all."Renee
  is not sad about her state, since she sees the world as a fairytale kingdom full
  of rainbows and lush green nature. Her companions are animals and elves, and those
  with ill-intent are transformed into evil magical creatures. In Renee''s view, she
  is in a wonderful land fighting bad monsters that want to disturb the peace.


  Long ago, Renee was a resident of the lost city of Arcadia. As a researcher, she
  worked towards finding a way to communicate with the will of the world with Fire
  Crystals, and to uncover the truth of why the world had changed.


  Renee was captured when Phaethon sacked Arcadia, and forced to forcibly connect
  with the world''s will, though her research was not yet perfected. Her will was
  assaulted horribly and destroyed in the process of coming into contact with a large
  number of unstable Fire Crystals, and her mind shattered completely. As her last
  shred of sanity was shed, unimaginable strength burst from her, and she broke free
  from Phaethon''s clutches.She was the only living person left in the huge laboratory
  when she was discovered by others.From that moment on, "the world she sees" included
  the melting of ice and snow.'
