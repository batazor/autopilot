story: 'Lumak Bokan is a fierce warrior from an ancient tribe in Emerald Valley. Surrounded
  by lush green mountains, his homeland was a hidden paradise untouched by the frozen
  Tundra. For generations, his people lived in harmony with the land, until the frost
  began to creep in.


  When Phaethon arrived uninvited, the valley''s vibrant life began to fade. The tribe
  knew that the "heart" of the land had been tainted, allowing the cold to take root.
  Determined to save the home he loved, Lumak set out on a journey to find a way to
  heal the land.


  Lumak''s father was a legendary warrior, and that legacy lives on in him. Even as
  a child, he had the strength and courage to face wild beasts head-on. By the time
  he came of age, he was already a match for his father. Armed only with traditional
  weapons, he was able to hold his own against Phaethon''s forces and their far superior
  equipment. He fought side by side with his father, defending their sacred land from
  those who dared to defile it.


  At the heart of Emerald Valley lies a spring—pure, sacred, and full of life. Its
  waters nourish every corner of the land with energy and spirit.Phaethon, driven
  by greed, sought to unravel its secrets. But their reckless experiments poisoned
  the spring beyond repair. To protect his people and the sacred spring, Lumak''s
  father sacrificed his life. Taking up his father''s spear, Lumak vowed to drive
  out the invaders. After years of struggle, he finally led his people to reclaim
  their homeland.


  Lumak roamed the Tundra in search of a cure. He clashed with Phaethon time and again,
  but also forged lasting bonds with the heroes of the Dawn Alliance. With their help,
  the sacred spring was finally purified, and Emerald Valley began to flourish once
  more. Still, Lumak chose to remain on the front lines, to honor his newfound friendships,
  and to make sure Phaethon paid for what they had done.'
