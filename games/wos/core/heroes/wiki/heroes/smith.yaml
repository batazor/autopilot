story: 'Smith comes across as an inconspicuous fellow running an everyday smithery
  in an average City. But his reputation for forging the best weapons has won him
  customers from all over the wilderness. Smith also offers perfectly-tailored custom
  weapons (be it guns or swords) if the price is right.


  Some say Smith himself is an expert in martial arts, hence his precise understanding
  of the weight, length, center of gravity, and other such specifications required
  of the perfect weapon. In any case, wise troublemakers know better than to upset
  this humble blacksmith.


  Smith prefers crafting melee weapons over ranged weapons. He find something truly
  exciting in the downward stroke of the rapier, the quick lunge of the scimitar,
  and the deflected blow of the spear. His drinking buddy Eugene also loves the aesthetics
  and feel of melee weapons, although Smith would rather Eugene not use his well-crafted
  axes simply for logging.


  Smith loves the loud clangs of hammer against anvil and the sparks from iron in
  the hot furnace. He has an intuitive understanding of each piece of metal and hears
  its "inner voice". He has claimed to friends that he simply follows the "will" of
  the metal as he intuitively interprets it - that''s his secret to making the best
  weapons.


  Smith''s forging talents did not come easily. In fact, he was abducted and forced
  to work as a blacksmith on the "Neptune" steam submarine as a child.


  It was a dark time, made darker still by Smith''s fear of the sea and confined spaces.
  One day, after years of forced labor, Smith suddenly heard a whisper from the metal
  he was working on… It was that same night Smith began to truly master forging. When
  the submarine docked for supplies, Smith used a secret weapon he had crafted to
  knock out the guards and escape from the "Neptune".'
