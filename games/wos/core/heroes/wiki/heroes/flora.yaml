story: 'Flora is not an inherently unfriendly person, nor is she arrogant. Her aloofness
  comes from a deep-seated preference for interacting with nature and plants rather
  than the rough-and-tumble world of complex social interactions. Flora would much
  rather deal with the former and she does, sometimes for days at a time, in a special
  greenhouse expertly constructed by Zinman and Jessie.


  Flora does enjoy the company of others — she’s just particular about whose company
  she keeps. Lydia, fellow botanist and agricultural expert, is a great source of
  joy. Jessie too, whose ingenuity designed the greenhouse temperature regulator.
  With these like-minded souls of deep thoughts Flora can enjoy many hours of spirited
  conversation.


  Horticulture is great expertise in these icy times. It was not so many years ago
  that a Dawn Alliance patrol stumbled on a seed preservation facility left by scientists
  unknown. Flora was given the task of categorizing and, if possible, reusing the
  revitalized seeds to grow cold-resistant crops to meet food shortages. Many survivors
  today owe their soft warm bread and fresh fruit to Flora''s pioneering work in the
  cultivation of new seed varieties.


  Flora''s love of plants began with books her parents read to her at bedtime, books
  filled with pictures of the old world and its lush paradise. Could there really
  have been such lush jungles as shown in the faded yellow pages? Such verdant gardens?
  The thought tantalized and fascinated Flora.


  Flora couldn''t stop imagining the fantastic potential within plants. What new and
  magical varieties could be grown by careful cultivation? She would make it her life''s
  work. Alongside classic food crops, Flora has also taken an interest in the darker
  and more sinister varieties: poisonous, flesh-eating flowers and highly aggressive
  climbing vines. Luckily, the terrors of these dangerous pests have been kept mostly
  in check... mostly.


  In these later years Flora has been deeply involved in the study of the great City
  of Arcadia, which first enchanted her when she was a child with stories of its magnificence
  and eyewitness accounts. Among them is Agnes, a living eyewitness scholar, who,
  together with other diehard souls, has been trying to gather a team to restore their
  lost home''s former glory.


  Agnes'' dreams of a New Arcadia shine to Flora like a beacon of hope. New Arcadia
  has big shoes to fill, but Flora is excited to be rebuilding paradise with the other
  survivors on fertile volcanic soil. Flora is the official Dawn Alliance emissary
  and this is her grandest project to date.'
