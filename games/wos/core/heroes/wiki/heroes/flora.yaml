skills:
- name: Envelopment
  description: Flora summons a fast-moving vine against enemies, dealing Attack* 100%/110%/120%/130%/140%
    Area Damage and stuns the target for 2s.
- name: Rosebloom
  description: Flora litters the target area with toxic Adoria bloom, dealing Attack*
    20%/25%/30%/35%/40% Area Damage which sprouts into a flesh-eating Adoria Rose
    versus heroes. It inherits 10%/15%/20%/25%/30% of Flora's attributes and attacks
    nearby enemies.
- name: Nature's Strength
  description: What does not kill the cultivator and the cultivated makes them stronger.
    Flora and summoned plants gain 2%/4%/6%/8%/10% Health and 4%/8%/12%/16%/20% Defense.
- name: Enmiring Vines
  description: Flora litters the ground with sharp vines to hobble enemy soldiers,
    granting all troops a 50% chance of increasing enemies' Damage Taken by 10%/20%/30%/40%/50%
    .
- name: Plantage
  description: Flora's defensive foliage reduces Infantry Damage Taken by 5%/10%/15%/20%/25%
    while better Adoria Rose coordination with Lancers gives joint attacks dealing
    5%/10%/15%/20%/25% extra damage.
- name: Confusion Pollen
  description: Flora's hallucinatory pollen increases enemy Infantry's Damage Taken
    by 6%/12%/18%/24%/30% , and decreases enemy Marksmen's Damage Dealt by 6%/12%/18%/24%/30%
    for 2 turns every 4 turns.
- name: Venom's Heart (Lv. 5)
  description: Adoria Roses and vines can always be more toxic. Targets now suffer
    Attack*25% damage every 0.5s for 2s.
- name: Fruit of Life (Lv. 5)
  description: Flora's new fruit is highly rejuvenating, granting Defender Troops
    15% increased Health.
