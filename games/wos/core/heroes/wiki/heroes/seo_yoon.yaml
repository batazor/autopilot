skills:
- name: Heartbeat of Valor
  description: Seo-yoon lifts the army's spirits with invigorating drum beats, increasing
    all troops' Attack by 1.5%/2%/2.5%/3%/3.5% and Attack Speed by 2.5%/3%/3.5%/4%/4.5%
    for 4s.
- name: Bullseye Bash
  description: Seo-yoon aims for the enemy's weak spot and hurls the drumstick with
    full force, dealing Attack* 150%/165%/180%/195%/210% damage.
- name: Gale's Pulse
  description: Seo-yoon dances to the rhythm, sharpening her assault. For every 3
    basic attacks, increases Attack Speed by 1%/2%/3%/4%/5% . Lasts until the end
    of the battle.
- name: Rallying Beat
  description: Seo-yoon beats the war drum to boost morale, increasing Troops Attack
    by 5%/10%/15%/20%/25% .
- name: Soothing Dance
  description: Seo-yoon treats wounded troops with traditional medicine, increasing
    Healing speed in the infirmary by 10%/20%/30%/40%/50% .
