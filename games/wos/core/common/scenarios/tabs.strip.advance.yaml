enabled: true
name: "Tabs: advance tab strip"
priority: 79_900
ranking:
  recent_debuff: false
# Generic helper for pages with a horizontal tab strip. Analyzer rules pass
# runtime args, so each module only owns its regions:
#
#   args:
#     region: deals.tabs_strip
#     next_region: shop.tab.next_page   # optional carousel arrow
#
# Runnable from every current Shop/Deals tab page. Event modules can join by
# adding their screen IDs here once they define a strip region.
#
# ``navigate: false`` — opportunistic helper. ``nodes:`` lists *where* advancing
# a strip is meaningful, but the bot must never travel there to run it: the
# analyzer pushes this only while already on a Shop/Deals sub-page, and a queued
# task that outlives the visit (e.g. popped back on ``main_city``) must skip, not
# walk into Shop just to flip a tab. Runs in place when already on a listed node.
navigate: false
nodes:
  - shop
  - shop.dawn_market
  - shop.daily_deals
  - shop.mix_match
  - shop.dawn_fund
  - shop.construction_queue
  - shop.weekly_monthly_cards
  - shop.get_gems
  - shop.artisans_trove
  - shop.custom_artistry_chest
  - shop.regular_pack
  - deals
  - deals.sign_in
  - deals.home_and_beyond
  - deals.hall_of_heroes
  - deals.vault_of_enigma
  - deals.hero_rally
  - deals.bank
  - deals.dead_shot
  - deals.endless_wayfarer
  - deals.journey_treasures
  - deals.tundra_trading_station
steps:
  - exec: advance_tab_strip
  - wait: 1s
