enabled: true
name: 👤 Who am I — capture chief profile
priority: 82_000

device_level: true
cond: active_player == ""

node: chief_profile

steps:
  - ocr: player.id
    store: player_id
    type: integer
    preprocess: fast_line
    threshold: 0.75
    min_digits: 8

  - ocr: player.state
    type: integer
    preprocess: fast_line
    threshold: 0.45
    state: state

  - exec: fetch_player

  - push_scenario:
      name: check_main_city
      priority: 82_000
    cond: active_player != null
