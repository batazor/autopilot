overlay:
  # The chapter banner sits in the same bottom-left corner on both hubs and
  # shows a red counter badge when missions are claimable — push the claim
  # scenario (it navigates to the chapter.daily_missions tab).
  - name: chapter.badge.visible
    region: chapter.new
    isRedDot: true
    # The labeled bbox is tall enough to include the counter badge slot in its
    # top-right corner — probe that corner of the matched template (offsets are
    # % of template size; slight overshoot above covers badge jitter).
    red_dot_bbox: { x: 55.0, y: -15.0, width: 55.0, height: 55.0 }
    device_level: true
    priority: 90_000
    screens:
      - main_city
      - main_world
    steps:
      - push_scenario: chapter.claim_missions

  # On the chapter panel itself: the green "Claim All" template only matches its
  # lit (claimable) state, so finding it on either tab means rewards are waiting.
  # This complements the main_city badge rule so the page self-claims when it is
  # already open (badge missed, or the bot entered the panel directly) — the same
  # on-page contract the deals sub-pages use. The pushed scenario then sweeps
  # Claim All + the per-row Claim buttons across both the Daily and Growth tabs.
  - name: chapter.claim_all.visible
    region: chapter.button.claim_all
    action: findIcon
    threshold: 0.9
    screens:
      - chapter.daily_missions
      - chapter.growth_missions
    steps:
      - push_scenario:
          name: chapter.claim_missions
          ttl: 1m

  # Growth often has only per-row "Claim" buttons, no Claim All. The
  # chapter.button.claim region is an isSearch template, so this remains dynamic
  # across row positions and scroll offsets.
  - name: chapter.claim.visible
    region: chapter.button.claim
    action: findIcon
    threshold: 0.9
    screens:
      - chapter.daily_missions
      - chapter.growth_missions
    steps:
      - push_scenario:
          name: chapter.claim_missions
          ttl: 1m
