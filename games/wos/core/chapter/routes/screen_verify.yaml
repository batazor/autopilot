screens:
  # No generic `chapter` screen: its "Daily" panel header overlapped the
  # per-tab titles and outranked them, so a tab never confirmed and navigation
  # to chapter.daily_missions/growth_missions failed. Detect the tabs directly.
  chapter.daily_missions:
    priority: 25
    rules:
      - match: chapter.daily_missions.title
        threshold: 0.8

  chapter.growth_missions:
    priority: 25
    rules:
      - match: chapter.growth_missions.title
        threshold: 0.9
