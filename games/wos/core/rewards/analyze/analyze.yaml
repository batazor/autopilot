overlay:
  - name: rewards.ribbon.visible
    region: rewards.ribbon
    action: reward_ribbon
    device_level: true
    type: blue
    threshold: 0.35
    # 0.15 floor: a real rewards ribbon sits mid-popup (component y_ratio ~0.24
    # on bs1), while the "Daily Deals" shop banner hugs the top of this bbox
    # (y_ratio ~0.00) and otherwise scores a near-identical blue mask (~0.58) —
    # the only clean discriminator is vertical position. Was 0.04, which the
    # scrcpy/normalized worker frame intermittently crossed → the bot mistook
    # Daily Deals for a rewards popup and looped exit_rewards_popup (prio 120k),
    # starving the daily queue.
    min_component_y_ratio: 0.15
    min_component_height_ratio: 0.7
    ttl: 5s
    priority: 120_000
    steps:
      - push_scenario:
          name: exit_rewards_popup
          ttl: 30s

  - name: rewards.upgraded.ribbon.visible
    region: rewards.ribbon
    action: reward_ribbon
    device_level: true
    type: orange
    threshold: 0.35
    # 0.15 floor: a real rewards ribbon sits mid-popup (component y_ratio ~0.24
    # on bs1), while the "Daily Deals" shop banner hugs the top of this bbox
    # (y_ratio ~0.00) and otherwise scores a near-identical blue mask (~0.58) —
    # the only clean discriminator is vertical position. Was 0.04, which the
    # scrcpy/normalized worker frame intermittently crossed → the bot mistook
    # Daily Deals for a rewards popup and looped exit_rewards_popup (prio 120k),
    # starving the daily queue.
    min_component_y_ratio: 0.15
    min_component_height_ratio: 0.7
    ttl: 5s
    priority: 120_000
    steps:
      - push_scenario:
          name: exit_rewards_upgraded_popup
          ttl: 30s

  - name: rewards.popup.visible
    region: rewards.title.v2
    action: findIcon
    device_level: true
    threshold: 0.9
    ttl: 5s
    priority: 120_000
    steps:
      - push_scenario:
          name: exit_rewards_popup
          ttl: 30s
