enabled: true
# Claim the "Online Rewards" (online-time rewards) from the main_menu City panel.
# Pushed by the panel scan when the My Rewards · Online Rewards row reads
# Completed/Claimable (self-gated on THIS scenario's `enabled`).
#
# Flow observed on bs1 (acct 401227964): the row's green check does NOT collect
# in place — it jumps to main_city with the camera centred on the rewards
# building (the row stayed "Completed" after the green-check tap alone), exactly
# like the Training "Completed" rows. So this mirrors accept_troops_*: tap the
# row, land on main_city, tap the centred building's collect bubble, then let the
# rewards popup be dismissed. The rewards module already auto-dismisses reward
# ribbons at device level (analyze/analyze.yaml); exit_rewards_popup makes the
# dismissal explicit for a standalone drive too.
name: 🎁 Claim online rewards
node: main_menu
cond: "active_player != null"
steps:
  - exec: tap_main_menu_panel_row
    section: my_rewards
    row: online_rewards
    approval_region: main_menu.panel.my_rewards.online_rewards
  - wait: 2s
  - wait_screen:
      any: [main_city, rewards]
      max: 8
      interval: 500ms
  # The green check centred the Online Rewards building; tap it (same target
  # accept_troops uses) to open the chest UI and collect the ready chest. Verified
  # on bs1: the chest screen then read "Next Chest Ready In 00:00:28" (claimed).
  - cond: currentNode == main_city
    steps:
      - click: main_city.center_building
      - wait: 1.5s
  # Close the chest modal / any reward ribbon so the bot isn't stranded on it
  # (template-free modal dismisser — the X / Claim / tap-to-continue).
  - exec: dismiss_popup
