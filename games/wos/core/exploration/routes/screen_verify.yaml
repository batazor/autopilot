screens:
  exploration:
    priority: 30
    rules:
    - ocr: page.common.title
      contains: Exploration
      threshold: 0.8
    - match: exploration.to.squad_settings
      threshold: 0.9
  squad_settings:
    priority: 30
    rules:
    - ocr: page.common.title
      contains: Squad Settings
      threshold: 0.8
  exploration.squad_fight:
    priority: 25
    # The in-progress battle animation. Genuinely transient: it has no exit
    # affordance other than the pause button (tapping which is unpredictable and
    # we WANT to wait the fight out, which the squad_fight scenario does via
    # `wait_screen`). It always auto-resolves to exploration.victory /
    # exploration.defeat, both of which now carry an outgoing `-> main_city` edge,
    # so a navigating cron that fires mid-battle recovers on the next tick once
    # the result screen appears (the stuck-task watchdog backstops a true hang).
    # terminal:true keeps the navigator from trying to route off the battle.
    terminal: true
    rules:
    - match: page.squad_fight.title
      threshold: 0.9
  exploration.victory:
    # Probe before arena.result (priority 20): the arena result screen is
    # detected by a generic "tap anywhere to exit" OCR that ALSO matches these
    # exploration battle-result screens. At equal priority arena.result wins the
    # tie and steals detection, which makes squad_fight's victory/defeat
    # wait_screen time out and leaves the bot stuck on the result screen.
    priority: 18
    # Battle-result screen; squad_fight taps `Continue` to dismiss in-flow. NOT
    # terminal: it now carries an outgoing `exploration.victory -> main_city` edge
    # (via the "Return to City" button) in edge_taps.yaml, so the navigator can
    # recover home if the bot strands here outside its own scenario.
    rules:
    - ocr: page.exploration.victory.title
      contains: "Victory"
  exploration.defeat:
    # See exploration.victory — beat the generic arena.result matcher (20).
    priority: 18
    rules:
    - ocr: exploration.defeat.title
      contains: "Defeat"
