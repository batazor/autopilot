overlay:
  - name: exploration.squad_fight.visible
    region: page.squad_fight.title
    action: findIcon
    threshold: 0.9
    screens:
      - squad_settings
      - exploration.squad_fight
    set_node: exploration.squad_fight
    ttl: 2s

  - name: exploration.squad_fight.auto.inactive
    region: page.squad_fight.auto
    action: findIcon
    threshold: 0.9
    screens:
      - exploration.squad_fight
    cond: exploration.level >= 5
    ttl: 10s
    steps:
      - click: page.squad_fight.auto
      - wait: 1s

  - name: exploration.squad_fight.speed.inactive
    region: page.squad_fight.speed
    action: findIcon
    threshold: 0.9
    screens:
      - exploration.squad_fight
    cond: exploration.level >= 10
    ttl: 10s
    steps:
      - click: page.squad_fight.speed

  - name: main_city.to.exploration.has_reward
    region: main_city.to.exploration
    threshold: 0.98
    isRedDot: true
    screens:
      - main_city
    steps:
      - push_scenario:
          name: claim_exploration_rewards
          ttl: 1m
