enabled: true
name: "🏗️ Build queue 2 · plan → navigate → upgrade"
priority: 80_000

# Pushed by scan_main_menu_panel when the City tab shows Building Queue 2 as Idle.
# Kept separate from queue 1 so scheduler dedup treats both empty slots as
# independent work. Planner-driven like queue 1, but takes the SECOND plan_builds
# pick (planner.build_q2) so two free queues build two distinct buildings instead
# of colliding on the same one. See building_queue_1_empty for the full rationale.
node: main_city
cond: "active_player != null"

steps:
  # A modal over the map breaks the radar navigator's ORB localization.
  - exec: dismiss_popup
  - exec: plan_next_builds
  - cond: planner.build_q2 != ""
    steps:
      - exec: navigate_to_building
        building_key: planner.build_q2
        open: true
      - cond: nav.ok ~= "1"
        steps:
          - push_scenario: building.upgrade
