enabled: true
name: "🏗️ Build queue 1 · plan → navigate → upgrade"
priority: 80_000

# Pushed by scan_main_menu_panel when the City tab shows Building Queue 1 as Idle.
# Planner-driven (furnace-first via plan_builds): instead of blindly tapping the
# centred building (the old flow drifted onto whatever screen the queue jump
# landed on and mis-clicked blue CTAs — it once ended on the Infirmary), it picks
# the value-greedy build for a free queue, drives the radar navigator to THAT
# building, opens it, and hands off to the existing building.upgrade flow.
# building_queue_2_empty takes the second pick so two free queues build two
# distinct buildings.
#
# Quality is bounded by buildings.levels.* coverage — without the building-level
# reader the planner treats unread buildings as level 0 and mis-picks; navigation
# also needs a saved main_city radar scan for this account.
node: main_city
cond: "active_player != null"

steps:
  # A modal over the map breaks the radar navigator's ORB localization.
  - exec: dismiss_popup
  - exec: plan_next_builds
  - cond: planner.build_q1 != ""
    steps:
      - exec: navigate_to_building
        building_key: planner.build_q1
        open: true
      - cond: nav.ok ~= "1"
        steps:
          - push_scenario: building.upgrade
