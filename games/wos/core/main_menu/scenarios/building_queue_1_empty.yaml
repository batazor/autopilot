enabled: true
name: "Use empty building queue 1"
priority: 80_000

# Pushed by scan_main_menu_panel when the City tab shows Building Queue 1 as
# Idle. First construction pass only opens the target from the main menu; the
# next branch depends on the building screen that appears after the tap.
node: main_menu
cond: "active_player != null"

steps:
  - exec: tap_main_menu_panel_row
    section: building_queue
    row: queue_1
    approval_region: main_menu.panel.building_queue.queue_1
  - wait: 2s
  - wait_screen:
      any: [building, main_city]
      max: 8
      interval: 500ms
  - click: main_city.center_building
  - wait: 400ms
  - click: main_city.center_building
  - while_match: upgrade_button
    threshold: 0.87
    max: 1
    steps:
      - click: upgrade_button
      - wait: 800ms
  - while_match: upgrade_blue_button
    threshold: 0.74
    min_match_saturation: 48
    max: 1
    steps:
      - click: upgrade_blue_button
      - wait: 2s
  - while_match: building.alliance_help_button
    threshold: 0.85
    max: 1
    steps:
      - click: building.alliance_help_button
      - wait: 800ms
