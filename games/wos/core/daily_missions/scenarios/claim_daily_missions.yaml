name: "📋 Daily Missions: Claim All"
enabled: true

# Account-level reward claim, but no player state is read/written and the click is
# idempotent — device_level keeps it always-runnable. The `match: daily.to_growth`
# landmark gate makes it a clean no-op off the Daily Missions screen.
device_level: true
priority: 70_000

# Ported from legacy `usecases/events/daily_missions/daily_missions_rewards.yaml`
# (Claim-All branch only). Per-row claim fallback + Growth Missions are follow-ups
# that need a live-captured Claim button template.
steps:
  - match: daily.to_growth
    threshold: 0.85

  # daily.claim_all is a color_check (green = lit/claimable).
  - match: daily.claim_all
    steps:
      - click: daily.claim_all
      - wait: 800ms
      - push_scenario: dismiss_unknown_popup
