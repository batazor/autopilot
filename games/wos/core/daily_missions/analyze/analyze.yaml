overlay:
  # When the Daily Missions screen shows a lit (green) "Claim All", drive the claim.
  # NOTE (port follow-up): `daily_missions` is not a wired navigation node yet, so
  # this fires only once screen detection knows it. The per-row Claim button and the
  # Growth Missions screen need a live-captured button crop (legacy used a dynamic
  # findIcon column scan with no static template).
  - name: daily.claim_all.lit
    region: daily.claim_all
    action: color_check
    type: green
    threshold: 0.9
    screens:
      - daily_missions
    ttl: 10m
    steps:
      - push_scenario: claim_daily_missions
