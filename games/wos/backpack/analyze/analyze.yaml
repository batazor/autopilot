overlay:
  - name: backpack.main_city.entry.visible
    region: main_city.to.backpack
    action: findIcon
    template: games/wos/backpack/references/crop/main_city_vip_main_city.to.backpack.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    steps:
      - push_scenario:
          name: backpack
          ttl: 5m
  # One dynamic tab-strip scan replaces the five hard-coded per-tab red-dot
  # regions. The segmenter re-anchors the grid every tick (the active capsule
  # is wider and shifts its neighbours), so a notification dot is attributed to
  # the correct tab regardless of which tab is currently open.
  # ``push_red_dot_pages`` enqueues the matching ``backpack.tab.<page>``
  # scenario for every dotted, non-active tab, left-to-right; the active tab
  # clears its own dot. ``ttl`` is inherited from the placeholder step below.
  - name: backpack.tabs.visible_red_dot
    region: backpack.tabs_strip
    action: detectTabs
    push_red_dot_pages: true
    tab_pages:
      - backpack.tab.resources
      - backpack.tab.speedup
      - backpack.tab.bonus
      - backpack.tab.gear
      - backpack.tab.other
    screens:
      - backpack*
    steps:
      - push_scenario:
          name: backpack.tab.resources
          ttl: 5m