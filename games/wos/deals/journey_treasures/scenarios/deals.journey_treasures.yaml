enabled: true
name: Journey Treasures
node: deals.journey_treasures
icon: journey_treasures
steps:
  - while_match: journey_treasures.claimable
    isRedDot: true
    max: 3
    retry:
      attempts: 1
      interval: 100ms
    steps:
      - click: journey_treasures.claimable
      - wait: 1s

  - wait: 2s
  - while_match: journey_treasures.close
    max: 1
    steps:
      - click: journey_treasures.close
      - wait: 1s
