overlay:
  - name: deals.sign_in.main_city.event_icon.visible
    region: main_city.icon_search
    action: findIcon
    template: games/wos/deals/sign_in/references/crop/main_city_main_city.to.sign_in.png
    threshold: 0.9
    isRedDot: true
    screens:
      - main_city
    steps:
      - push_scenario:
          name: deals.sign_in
          # Re-check cooldown (see deals/deals): avoid main_city re-entry churn.
          # Daily sign-in stays same-day; the in-panel page rule below claims it.
          ttl: 30m

  # When the FSM lands on ``deals.sign_in`` and the title region matches the
  # template crop, push the claim scenario. The scenario then uses
  # ``isYellowGlow: true`` inside ``deals.sign_in.free`` to enumerate and
  # click each glowing reward tile (same shape as shop.dawn_fund).
  - name: deals.sign_in.page
    region: deals.sign_in.title
    action: findIcon
    threshold: 0.9
    screens:
      - deals.sign_in
    steps:
      - push_scenario:
          name: deals.sign_in
          ttl: 1m

  # Top-tab strip exposes a "Home & Beyond" tab. When it carries a red dot,
  # push the claim scenario — the scheduler navigates from deals.sign_in to
  # deals.home_and_beyond via the edge_taps edge ``sign_in.to.home_and_beyound``.
  - name: deals.sign_in.to.home_and_beyond.has_red_dot
    region: sign_in.to.home_and_beyound
    isRedDot: true
    screens:
      - deals.sign_in
    steps:
      - push_scenario:
          name: deals.home_and_beyond
          ttl: 1m
