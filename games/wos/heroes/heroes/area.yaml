    threshold: 0.8
    # Bottom-left "Stats" tab — present on every hero detail card (owned heroes AND
    # the recruit variant), so it anchors the screen far more reliably than the
    # top-right wiki button template, which degrades under scrcpy H.264 and made the
    # navigator call the hero page UNKNOWN (so it could not route away from it).
    # Verified live on bs3: plain OCR reads "Stats" at conf 0.96.
