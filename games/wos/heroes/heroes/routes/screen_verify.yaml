screens:
  heroes:
    priority: 30
    rules:
    - match: heroes.grid
      threshold: 0.9

  hero.recruitment:
    priority: 30
    rules:
    - match: hero.recruitment.title
      threshold: 0.9

  # Per-hero detail page (reached from the grid). Anchored on the wiki
  # button, which is always present on a hero card regardless of level.
  page.heroes.unit:
    priority: 35
    rules:
    - match: page.heroes.unit.wiki
      threshold: 0.9

  heroes.sr.new:
    priority: 25
    rules:
    - match: heroes.sr.new.close
      threshold: 0.9
