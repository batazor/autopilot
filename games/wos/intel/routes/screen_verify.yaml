# Intel screen detection / nav-verify.
#
# Registers `intel` as a verifiable FSM screen so scenarios with `node: intel`
# (intel_run, intel_lighthouse) can self-route here — without this the navigator
# rejects the target ("unknown FSM screen 'intel' — skipping navigation").
#
# Anchored on the OCR title, which reads "Intel" on BOTH the normal skin
# (references/main.png) and the special-event skin (references/main_special.png),
# so the verify survives event reskins (template titles would go stale).
screens:
  intel:
    # Checked before main_world (priority 10): the widened isSearch
    # main_world.to.intel tap-region can match on the intel screen too, so intel
    # must resolve first.
    priority: 9
    rules:
      # Locale-tolerant title OCR: EN "Intel" reads cleanly. RU «Разведка» is
      # white-outlined and OCRs poorly (~0.4, partial), so it falls through to
      # the title TEMPLATE below — which findIcon-matches the styled title image
      # (EN main_intel.title.png / RU intel_intel.title.png via the wos_ru
      # overlay). The old `match: intel.stamina` landmark was repurposed to read
      # the «44/90» stamina bar (read_intel_stamina), so it no longer detects.
      - ocr: intel.title
        contains:
          - Intel
          - Разведка
        threshold: 0.8
      - match: intel.title
        threshold: 0.6
