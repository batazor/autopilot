# Pushed when the "New Intel in the Lighthouse" push notification fires.
# the notify service classifies that notification as event_type `intel_lighthouse`
# (see src/modules/notify/config.py); the event → push bridge enqueues this key.
name: Lighthouse Intel
enabled: true
priority: 80_000
node: intel

steps:
  # Read the board's "Refreshes in: HH:MM:SS" timer (seconds) so the MARCH
  # coordinator can pace the next intel run to the real board refresh instead
  # of the static cooldown placeholder.
  - ocr: intel.refresh_in
    type: time
    store: intel.refresh_in

  - while_match: intel.claim_all
    max: 1
    retry:
      attempts: 2
      interval: 500ms
    steps:
      - click: intel.claim_all
      - wait: 1s
      - while_match: button.click_to_continue
        max: 1
        steps:
          - click: button.click_to_continue
          - wait: 500ms
      - while_match: button.tap_anywhere_to_exit
        expected: ["tap anywhere"]
        max: 1
        steps:
          - click: button.tap_anywhere_to_exit
          - wait: 500ms

  - exec: tap_intel_fight
    strategy: best_score
    threshold: 0.72
  - wait_screen:
      any: [intel.fight]
      max: 5
      interval: 500ms

  - click: intel.fight.view
  - wait_screen:
      any: [intel.explore, main_world]
      max: 5
      interval: 500ms

  # The View opens a target panel over the world map; both panel kinds detect as
  # main_world, so branch on the BUTTON COLOUR (survives scrcpy H.264, unlike the
  # title OCR): a blue Explore button ⇒ exploration target, else the orange
  # Attack button ⇒ combat target. (intel.explore.is_blue is a color_check region.)
  - wait: 1s
  - match: intel.explore.is_blue
    steps:
      - click: intel.explore
    else:
      - click: intel.attack
  - wait_screen:
      any: [heroes.deploy, squad_settings]
      max: 10
      interval: 500ms

  - cond: currentNode == heroes.deploy
    steps:
      - click: heroes.deploy.equalize
      - wait: 500ms
      - ocr: heroes.deploy.ttl
        type: string
        store: intel.march_ttl
      - click: heroes.deploy.deploy
      - wait: 1s
      - exec: confirm_intel_march_lease
        ttl_field: intel.march_ttl
        round_trip_multiplier: 2
        extra_seconds: 15

  - cond: currentNode == squad_settings
    steps:
      - click: squad_settings.quick_deploy
      - wait: 200ms
      - click: squad_settings.fight
      - wait: 2s

      - while_match: page.squad_fight.auto
        max: 1
        steps:
          - click: page.squad_fight.auto
          - wait: 1s

      - while_match: page.squad_fight.speed
        max: 1
        steps:
          - click: page.squad_fight.speed

      - wait_screen:
          any: [exploration.victory, exploration.defeat]
          max: 90
          interval: 2s

      - cond: currentNode == exploration.victory
        steps:
          - click: page.exploration.victory.next
          - wait_screen:
              any: [squad_settings, intel, main_city]
              max: 8
              interval: 500ms
          - cond: currentNode == squad_settings
            steps:
              - click: icon.page.back
              - wait: 1s

      - cond: currentNode == exploration.defeat
        steps:
          - click: button.to_main_city
          - wait: 2s
