skills:
- name: Super Snowball
  description: Molly launches a Super Snowball which plops down to deal Attack* 180%/198%/216%/234%/252%
    Area of Effect Damage and freezes them for 1.5s.
- name: Frost Ambush
  description: Molly ambushes the enemy with her great camouflage skills, dealing
    Attack* 150%/165%/180%/195%/210% damage.
- name: Youthful Persistence
  description: Molly loves a challenge, gaining + 20%/30%/40%/50%/60% Attack Speed
    under 50% Health.
- name: Snow's Grace
  description: Molly creates an avalanche that clouds enemy sights, granting a 40%
    chance of reducing all troops' Damage Taken by 10%/20%/30%/40%/50%
- name: Ice Dominion
  description: Molly excels in snowy terrains, granting all troops' attack a 50% chance
    of increasing damage dealt by + 10%/20%/30%/40%/50% .
- name: Youthful Rage
  description: Hell hath no fury like an angry Molly. Increasing damage dealt by +
    5%/10%/15%/20%/25% damage.
- name: Modified Launcher (Lv. 5)
  description: Molly wields a modified version of the launcher, boosting damage dealt
    by 30%.
- name: Snowy Blessing (Lv. 5)
  description: With the blessing of the snow, Defender Troops' Lethality is increased
    by 15%.
