story: 'Most survivors loathe the permanent winter, but Molly''s attitude is quite
  unique. She seems to greatly enjoy the wintry landscape and its new flora and fauna.
  After all, she can do snowball fights, bobsled runs, and build a snowman whenever
  she wants. But most importantly, the snowy world is all Molly has ever known.


  In fact, not much is known about her life before Dawn Alliance.\nBahiti found Molly
  during a peacekeeping operation against a Phaethon stronghold. The incredible part
  of the story is, Bahiti claims Molly''s combat instincts were key to the team''s
  successful escape from the heavily guarded fortress.


  According to Bahiti, Molly was an essential part of Phaethon’s combat program. This
  also explains her peculiar weapon - a snowball launcher. Although Molly seems much
  more interested in using it for snowball fights.


  Bahiti''s successful rescue owed much to his ability to win Molly''s trust. When
  a Phaethon soldier''s arrow injured Bahiti, Molly flew into a rage, took down all
  the guards with ease, and then fled with the members of Dawn Alliance.


  Molly has a strange affinity for the cold. She has no problem enduring freezing
  conditions. Moreover, her excellent combat intuition and unusually strong fighting
  techniques (particularly on snow and ice) have truly piqued the Dawn Alliance''s
  interest. What’s the source of Molly''s preternatural abilities? The investigation
  is still ongoing.


  It was later revealed that Phaethon first discovered Molly in a large underground
  facility, where she was hibernating in a strange ‘pod’. Some believe Molly is connected
  to the planet in a mysterious and unexplained way.


  When she awakened, Molly had no memory of her past, but she exhibited superhuman
  vitality and physical strength. Phaethon wanted to use this and train her into an
  elite assassin for the organization. Fortunately, the Dawn Alliance saved her from
  that fate. Bahiti and the others only wish for Molly to find happiness in this strange
  new world.'
