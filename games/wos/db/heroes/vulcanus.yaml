skills:
- name: Siege Bolts
  description: 'Vulcanus rips a Barricade to shreds with three heavy bolts, dealing
    Attack* 200%/220%/240%/260%/280% damage and inflicting Bleed. Bleed: deals Attack*10%
    damage every 0.5s for 3s.'
- name: Chainlinked
  description: Vulcanus targets an enemy hero with a chained dart, dealing Attack*
    100%/110%/120%/130%/140% damage, immobilizing and stuns the target for 2s.
- name: Fire of Hope
  description: Vulcanus shapes rage into resolve, increasing his Escorts' Attack by
    10%/15%/20%/25%/30% and Defense 10%/15%/20%/25%/30% .
- name: Raging Storm
  description: Vulcanus is skilled in the arts of terror and manipulation, reducing
    all enemy troops' Attack by 4%/8%/12%/16%/20% .
- name: Breaker Steel
  description: There's no steel like the blades in Vulcanus' armory, empowering all
    troops to deal 20%/40%/60%/80%/100% extra damage after every 5 attacks, and increasing
    damage taken for the target by 5%/7.5%/10%/12.5%/15% in the next attack.
- name: True Strike
  description: Vulcanus' modified armor-piercing arrows reduce enemy Infantry and
    Lancer Defense by 12%/24%/36%/48%/60% for 3 turns and increase our Marksmen's
    Attack by 12%/24%/36%/48%/60% for 1 turn.
- name: Laceration (Lv. 5)
  description: Reforged in the Undercity workshops, Vulcanus' arrowheads now inflict
    Bleed on all targets for all damage done. Bleed deals Attack*20% damage every
    0.5s for 3s.
- name: Born King (Lv. 5)
  description: Vulcanus' sense of confidence and unstoppable momentum increases Rally
    Troops' Attack by 15%.
