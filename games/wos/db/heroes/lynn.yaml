skills:
- name: Hymn of Sidrak
  description: Lynn strikes a rousing battle hymn to uplift the troops, clearing all
    debuffs (Freeze, Stun, etc.) for all troops and increasing their Attack by 3%/4%/5%/6%/7%
    for 3/3.5/4/4.5/5s , during which they remain immune to all debuffs.
- name: Lethal Finale
  description: Seizes the opportunity to fire a bullet with strong penetrating power,
    dealing Attack* 220%/240%/260%/280%/300% damage to enemies along the way.
- name: Discordant Tune
  description: Lynn bewilders the enemies with a mysterious and strange tune, reducing
    Attack Speed by 1%/1.5%/2%/2.5%/3% and Healing effects by 40%/45%/50%/55%/60%
    for all enemy troops.
- name: Song of Lion
  description: Lynn uplifts our troops with an enthusiastic rhythm, granting a 40%
    chance of increasing damage dealt by 10%/20%/30%/40%/50% for all troops.
- name: Melancholic Ballad
  description: Lynn demoralizes the enemies with a somber tune, reducing damage dealt
    by 4%/8%/12%/16%/20% for all enemy troops.
- name: Oonai Cadenza
  description: Lynn harnesses the power of music to elevate troops morale, increasing
    her Marksmen's attack by 1%/2%/3%/4%/5% for every 3 attacks. Stackable and lasts
    until the end of the battle.
- name: Aira’s Elegy (Lv. 5)
  description: Lynn increases Attack by 15% until the end of the battle after casting
    "Hymn of Sidrak."
- name: Iranon’s Determination (Lv. 5)
  description: Lynn stirs the defenders with a nostalgic poem, increasing Defender
    Troops' Lethality by 15%.
