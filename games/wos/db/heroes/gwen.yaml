skills:
- name: Salvo
  description: Gwen unleashes a devastating salvo against ennemies at the rear (heroes
    first), dealing Attack 180%/198%/216%/234%/252% Area of Effect damage. Shockwaves
    will also decrease target's Attack Speed by 50% for 2 seconds.
- name: Sky Sniper
  description: Gwen unleashes a devastating air-assisted precision strike against
    the target -heroes first), dealing Attack 100%/110%/120%/130%/140% damage with
    a 50% chance of dealing double damage.
- name: Hellfire
  description: Gwen launches an incendiary grenade to burn all ennemy targets in the
    area, dealing Attack 35%/38.5%/42%/45.5%/49% damage per second, for 3s.
- name: Eagle Vision
  description: Gwen provides unfettered vision of ennemy weakpoint during fligths,
    increasing target's Damage Taken by 5%/10%/15%/20%/25% .
- name: Air Dominance
  description: Gwen dominates the skies, dealing 20%/40%/60%/80%/100% extra damage
    once every five attacks and grants 5%/7.5%/10%/12.5%/15% extra damage to the next
    attack from any source.
- name: Blastmaster
  description: Gwen equips her troops with grenades, dealing 10%/20%/30%/40%/50% extra
    damage to all ennemies once every 4 attacks.
- name: Fire Support Unit (Lv. 5)
  description: Gwen's automated secondary weapon attacks random target on skill cast
    (heroes forst), dealing Attack 70% damage.
- name: Marauder (Lv. 5)
  description: Gwen use her expertise in offensive tactics, boosting Rally Troops
    Lethality by 15%.
