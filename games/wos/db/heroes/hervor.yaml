story: 'The icy peaks of Sathla tower majestically over the frigid far north. The
  cold land harbors a ruthless kingdom and Hervor is its Chieftain.


  There are no Furnaces here, let alone Cities. There is only survival—survival in
  deep winter caverns or strongholds, easier in better days than now. But this is
  a strong people. They have always buried their weaker brethren in mountain tombs,
  long before the Great Chill.


  Chieftainship of Sathla lends credibility to certain legends about Hervor—that her
  arms are as strong as tree trunks, her battle cries can trigger avalanches or her
  skin can survive steel. Of course, proving any would require a living challenger
  to Hervor''s reign.


  Chieftainship over Sathla is earned in every generation by a grueling series of
  arena duels.


  Hervor''s predecessor, Hraesvelgr Kinslayer, ruled for an astounding half a century.
  So resilient was Hraesvelgr that it was assumed that if he were not under the active
  protection of the ancestors or mountain gods, he was partly a demigod himself. People
  began to wonder which eagle flying over the valley might not be Hraesvelgr in disguise.
  His throne room was very well-adorned with challengers'' heads and other body parts.


  Fear was a tool and Hraesvelgr fanned the flame of legend. But even fear could not
  protect Hraesvelgr from the One Who Had Been Foretold and her miraculous return
  from the dead.


  The witch''s prophecy slithered through the tribal council like a curse: twins born
  under eternal night would one day feast upon the blood of a god. Hraesvelgr''s wife
  had delivered during a lunar eclipse. Although painful, Hraesvelgr could not ignore
  any threat to his power. But rather than wield the knife himself, he would allow
  the mountain to do its work.


  Cold and alone but for each other, challenged by the elements and predators, Hervor
  somehow survived. Years passed and their fate became a distant memory.


  The chiefsguard stepped back in astonishment when the adult Hervor arrived one day
  to claim Hraesvelgr''s throne. Surely this must be the will of the gods!


  The battle between the undefeated father and the invincible daughter raged into
  the morning when, in the sight of all, Hraesvelgr''s daughter did "drink of the
  blood of a god". The breaking of his so-called wings echoed alongside a new cry:
  Long live Chief Hervor!


  Hervor had graduated as the most powerful queen in Sathla''s history. Smarter and
  more cunning than her father, Hervor knew that someday she would share her father''s
  fate as even the strongest oak withers—unless, that is, she chose the hard path
  and went abroad in search of a more enduring source of strength.'
