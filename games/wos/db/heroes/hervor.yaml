skills:
- name: Earthmover
  description: Hervor hammer-strikes the ground with thunderous force, inflicting
    Attack* 100%/110%/120%/130%/140% damage to frontal enemies, a 1-second stun, and
    Intimidation that reduces enemy Attack by 25% for 3 seconds.
- name: Mountain Strength
  description: Hervor's miraculous strength is terrifying to behold, granting her
    normal attacks a 5%/10%/15%/20%/25% chance of inflicting "Intimidation" which
    increases enemy damage taken by 3%/6%/9%/12%/15% (max 3 stacks).
- name: Stone Arms
  description: Brutal mountain life has endowed Hervor with superhuman endurance,
    reducing her damage taken by 5%/10%/15%/20%/25% and becoming immune to stun, paralysis
    or freeze and other control effect for the first 9 seconds of battle.
- name: Call For Blood
  description: Hervor's heartfelt war cry ignites fearlessness in her soldiers, increasing
    all troops' Lethality by 5%/10%/15%/20%/25%
- name: Undying
  description: The enemy menace pales beside Hervor's icy homeland, her Infantry's
    Damage Taken from Normal Attacks is reduced by 5%/10%/15%/20%/25% and 6%/12%/18%/24%/30%
    from enemy skills.
- name: Battlethirsty
  description: Hervor and her Infantry are singularly devoted to the idea of battle,
    reducing her Infantry's damage taken by 3%/6%/9%/12%/15% and increasing their
    damage dealt by 2%/4%/6%/8%/10%
- name: Mark of the Chieftain (Lv. 5)
  description: Hervor's hammer is a glorious symbol of Sathla's power, increasing
    Attack Speed by 30% and normal attacks' chance of "Intimidation" by 25%.
- name: Fort of Rock (Lv. 5)
  description: Hervor's reforges defenders in her unyielding image, increasing Defender
    Troops' Defense by 15%.
