story: 'As a child, Estrella often heard stories of the "old world" from the older
  folks in her town. In stark contrast to the endless snow-covered winter she knew,
  the world of the past had verdant forests and golden fields of wheat.


  These tales prompted vivid dreams in which Estrella returned to that vibrant world
  to experience the blossoming of spring, the heat of summer, and the autumn harvest
  season—all sensations foreign to her frigid life in the real world. Estrella could
  never find the right words to express the beauty of her dreams, so she decided to
  paint them, hoping to share her spectacular visions with her entire town.


  Estrella''s home was a mining town tucked away in the mountainside, a place rich
  with mineral deposits. Crystals and stones of every color could be found among the
  hills, along the riverbanks, and inside the caverns there. Some luminous ores even
  glowed under the night sky, like stars fallen to the ground. Estrella used all of
  these minerals as pigments to color her paintings, weaving the vibrant spectrum
  of light into spectacular canvases with her imagination.


  But danger lurked in her hometown as well, as many people coveted their lucrative
  mineral deposits. While painting outside one day, Estrella was approached by a group
  of shady figures—outlaw miners from another town who''d come to scout the terrain
  and gather intel. The unwelcome guests spotted Estrella and attacked her.


  Instinctively, Estrella flung her mineral paints at the attackers. As the paint
  spattered all over them, the unstable chemicals reacted somehow to burn the intruders,
  buying Estrella time to escape. The attacks lessened after the town sought the protection
  of the Dawn Alliance, but the occasional reckless intruder still got in from time
  to time.


  Estrella loved her hometown and vowed to defend it however she could. She continued
  to refine her pigment formulas until she could repel intruders with either scorching
  or freezing paints.


  Estrella loved to dream—not only for the gorgeous scenes, but also for her special
  dream "companion", a girl named Evelyn from the old world, who lived in a beautiful
  rose garden. Within Estrella''s dreams they played together, sharing stories of
  their respective worlds and forming a close friendship.


  Estrella always believed these were simply recurring dreams—until she stumbled upon
  the ancient "Notes From the Rose Garden" at the town library, where the author wrote
  about her recurring childhood dreams in which she often played with a girl from
  the "Land of Winter". Most townsfolk dismissed this as mere coincidence. After all,
  the notes had no signature and never mentioned Estrella''s name. But others believed
  that the mysterious crystals beneath the town''s soil served as some kind of medium
  that connected people across time and space via dreams.'
