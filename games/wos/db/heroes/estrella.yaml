skills:
- name: Scorching Scarlet
  description: Splashes scorching scarlet paint, dealing Attack* 200%/220%/240%/260%/280%
    AoE damage to enemies in range. Splashed targets also have their Attack reduced
    by 5%/10%/15%/20%/25% for 2s.
- name: Molten Gold
  description: Splatters the target with amber-yellow paint, dealing Attack* 100%/110%/120%/130%/140%
    damage and inflicting Corrosion, which causes the target to take Attack* 2%/3%/4%/5%/6%
    damage every 0.5s for 4s.
- name: Midnight Blue
  description: A night-like shade of blue brings bone-chilling cold. Normal Attacks
    paint targets blue, reducing their Attack Speed by 10%/15%/20%/25%/30% for 2s.
- name: Corrosive Color
  description: Splatters paint made from mysterious crystals that corrode enemy armor,
    reducing the Defense of all enemy troops by 5%/10%/15%/20%/25% .
- name: Dawn Canvas
  description: Encourages troops with an inspiring painting, increasing the Attack
    of all allied troops by 3%/6%/9%/12%/15% and their Defense by 2%/4%/6%/8%/10%
    .
- name: Splendid Scene
  description: Boosts morale with a vibrant painting, reducing the damage taken by
    Infantry by 5%/10%/15%/20%/25% and increasing the damage dealt by Lancers by 5%/10%/15%/20%/25%
    .
- name: Color Burst
  description: The collision of colors unleashes incredible power. Enemies stained
    with 2 colors at the same time will take 30% more damage.
- name: Homeland Defense
  description: Estrella's brushstrokes reveal a majestic homeland that inspires troops
    to fight for it, increasing the Attack of Defender Troops by 15%.
