story: '"For the glory of the empire! For old Solaris!" Gregory''s impassioned battle
  cry has never wavered even if today the Solaris Empire is but a distant memory.


  The Empire''s reign ended the day Sunfire Castle fell to an army of bandits. The
  tundra had spoken. Everybody was on their own, including Gregory''s soldiers, who,
  like many other Solaris ex-military, were forced into the mercenary life to make
  ends meet. Yet, in his heart of hearts, Gregory has never stopped pining for a return
  to the Empire''s glory days where the Solaris banner can once again fly high atop
  Sunfire Castle.


  The men under Gregory are less optimistic, but certainly don''t mind the bread and
  creature comforts that come with Gregory''s competent leadership. He remains a popular
  commander, then as now.


  As a swordsman on horseback Gregory is perhaps unequalled; as a tactician and oldworld
  infantry specialist willing to strike hard and fast he may be the best. It was no
  accident Gregory found himself at the head of the old empire''s last Dawnguard squad,
  and it is largely thanks to their sacrificial, loyal efforts that the young Empress
  was saved.


  Their escape from Sunfire Castle brought its own complexities: what was the role
  of the Empress in this new world? And, more importantly, how would they cope without
  a household retinue of servants, squires, and maids?


  Contrary to Gregory''s appearance, he is not a rough man by any means. Those who
  know him well will testify of a soft underside to his stern face and tenderness
  particularly toward the young empress.


  As a matter of principle, Gregory still considers the empress to hold a kind of
  royal authority—to whom he will often act as an uncle, advisor, butler or bodyguard
  when danger calls. Gregory is also keen to preserve the old ways of the Solaris
  Empire by insisting, for example, on courtly decorum and regal outfits for Her Majesty
  and entourage no matter how impossible the Empire''s restoration may seem.


  The day Sunfire Castle fell is forever burned into Gregory''s memory: the day he
  lost everything but a newfound purpose.


  Gregory received his orders from the dying Captain of the Guard: the young empress
  was still alive! But to reach safety his men would have to thread a needle of life
  through absolute chaos, confusion, looting, and bloodshed. It was an almost impossible
  task and yet at the end Gregory led the empress safety out of the city with blood
  pouring from several arrow wounds in his armor. As his men planned to take the empress
  somewhere safe he then, as he gazed upon her terrified eyes, found the strength
  from within to pick himself up and press on. Thereafter his fate would be bound
  to that of the heir-apparent, and he would be her most loyal protector.'
