- name: Sword of the Mountain
  description: Gregory readies himself for a furious strike, dealing Attack* 100%/110%/120%/130%/140%
    Area of Effect damage while knocking back and stunning nearby enemies for 1s.
- name: Parryshield
  description: Gregory weaves his greatsword into a defensive posture, granting 10%/20%/30%/40%/50%
    chance of reducing damage taken by half.
- name: Sacrificial Will
  description: Even if Gregory falls, his example lives on, increasing all friendly
    troops' Attack by 8%/12%/16%/20%/24% for 5 seconds after Gregory's defeat.
- name: Legion of the Sun
  description: Gregory nurtures latent talents his troops did not realize they had,
    increasing Attack by 3%/6%/9%/12%/15% and Defense by 2%/4%/6%/8%/10% for all troops.
- name: Charged Assault
  description: Gregory inspires everyone with his valor and enthusiasm, granting all
    troop's normal attacks a 5%/10%/15%/20%/25% chance of dealing critical damage.
- name: Unbroken
  description: Gregory forms unbroken defensive lines, reducing Infantry’s Damage
    Taken by 4%/8%/12%/16%/20% .
- name: Indomitable Armor (Lv. 5)
  description: Gregory's plate armor protects him, increasing his defense by 50%.
    Meanwhile, his armor of indomitable will shields him from stuns, paralysis, and
    other interrupting effects.
- name: Day of the Guard (Lv. 5)
  description: Courage and the will to victory will always surpass mercenary greed.
    Gregory's leadership increases Defender Troops' Lethality by 15%.
