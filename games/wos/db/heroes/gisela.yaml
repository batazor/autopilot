skills:
- name: Superload
  description: Gisela overloads her mech-arms in Attack Mode for 5s, gaining 50 Energy
    and increasing Attack Speed by 20%/30%/40%/50%/60% and Defense by 50%/75%/100%/125%/150%
    .
- name: Steel Hammer
  description: Gisela smashes the target area with her mech-arms, dealing Attack*
    100%/110%/120%/130%/140% Area of Effect damage and gaining 25 Energy.
- name: Porta-Shield
  description: Gisela primes a mini-shield to activate on reaching 100 Energy with
    Attack* 70%/100%/130%/160%/190% for 3s. Each Normal Attack gains her 3/6/9/12/15
    Energy.
- name: Alloyed Defense
  description: Gisela's advanced tech increases Infantry Defense by 6%/12%/18%/24%/30%
    .
- name: Scavengeworks
  description: Gisela is a master of defensive scavenging. Infantry under Gisela's
    command have a 40% chance of increasing all Troops' Defense by 10%/20%/30%/40%/50%
    for 1 turn.
- name: Trial Shield
  description: Gisela provides an experimental version of her shield to all troops,
    granting a 40% chance of reducing Damage Taken by 10%/20%/30%/40%/50% for all
    troops.
- name: Energy Efficiency (Lv. 5)
  description: Gisela's fine-tuned energy facility grants an additional 15 Energy
    per Normal Attack and increases shield strength by Attack*190% on reaching 100
    Energy.
- name: Auto-Target (Lv. 5)
  description: Gisela's forays into the field of auto-turrets enhances Defender Troops'
    Attack by 15%.
