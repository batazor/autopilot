story: 'The petite girl from Oestermore does not look like one of its foremost mechanical
  geniuses—youngest ever to be honored with the Craftsmaster title. Yet largely by
  the work of her hand has Oestermore been furnished with an array of newfangled weaponry:
  the so-called auto-turret, mech-guard, and pilotless flyer craft.


  Fine as these inventions are, the finest yet may be Gisela''s personal mini-shield—designed
  to do for the individual what great shields do for cities: protect Oestermorians
  from sword and musket fire. Trials are ongoing. The device is "not entirely stable".


  All this is so much more impressive considering Gisela''s small size and "fountain
  of youth" effect projected by her wrinkle- face. Gisela would much rather be taken
  seriously than dismissed for not looking like a typical gray-haired Craftmaster
  from Oestermore. The fastest way to offend Gisela is to talk down to her. And she
  is often offended.


  Necessity is the mother of invention and Gisela''s need for more respect has led
  to the mech-arm. Want a few tons moved at short notice? Steel punched into shape?
  Overcome your fears and ask the scary-looking lady with the big shiny arms. Gisela
  is not a particularly violent person, far from it. Those who get to know her will
  recognize a truly gentle soul.


  Truthfully, there are plenty of reasons for Gisela to be happy about being underestimated:
  to be underestimated by an enemy is an incredible gift.


  Before Gisela rose to Craftsmaster came the Bad Times. Phaethon''s armies came like
  an avalanche. Oestermore''s craftsmen, scientists, and engineers were placed into
  captivity. At the time, Gisela was glad not to be taken seriously by Phaethon''s
  soldiers, was left to her own devices. With much of the city under lock and key,
  Phaethon had chosen not to dispose of the weapons piled near the city gates. Gisela
  immediately set to work under cover of night, building an army of turrets, distractions,
  and surprises to trigger at the right moment. Then with the Horn of Oestermore at
  her lips, Gisela struck, overwhelming camp guards and immediately arming the captives.


  Phaethon came prepared for a pitched battle, not guerrilla warfare in strange streets.
  Phaethon''s force quickly collapsed and was driven out, leaving their precious equipment
  behind.


  Today Oestermore is a peaceful place, haunted not by Phaethon but whatever technical
  wizardry the crafters of tomorrow are cooking up—like the legend of "Jumping Jack"
  who has recently been terrifying and fascinating the City by leapfrogging towers
  in a single bound. Gisela''s refusal to join in the investigation has also set tongues
  wagging.


  She has her reasons. Fellow inventor Lloyd worked for years on a mechanical exo-suit
  to help his ailing father before finally turning to Gisela for help. The duo stitched
  the engineering marvel together with remarkably few issues. The largest was discovered
  by Lloyd as guinea pig: the exo-suit failed to respond to user inputs once it really
  got going, that is, jumping.


  Lloyd miraculously survived uninjured once the suit lost power. News of the flying
  hunk of junk spread fast, sending Oestermore''s rumor mill into overdrive. Gisela
  and Lloyd are very happy their secret is not yet out.'
