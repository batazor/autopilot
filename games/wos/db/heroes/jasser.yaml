- name: Suppressive Fire
  description: Jasser relies on masterful marksmanship and overwhelming firepower
    to suppress the enemy, dealing Attack* 100%/110%/120%/130%/140% damage and reducing
    the target's Attack Speed by 30%/35%/40%/45%/50% for 2s.
- name: Natural Precision
  description: Jasser's impeccable marksmanship has become second nature, increasing
    Attack by 8%/12%/16%/20%/24% .
- name: Tactical Genius
  description: Jasser's combination of courage and wisdom enriches the army, increasing
    damage dealt by 5%/10%/15%/20%/25% for all troops.
- name: Enlightened Warfare
  description: Jasser's profound knowledge increases the city's Research Speed by
    3%/6%/9%/12%/15% .
