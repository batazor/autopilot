skills:
- name: Wild Growth
  description: Aisling flings out a fast-growing enchanted seed that quickly envelops
    nearby enemies for Attack* 200%/220%/240%/260%/280% damage and a 2-second stun.
- name: Fruits of Plenty
  description: Aisling uses the sacred fruit of the deep forest to restore Health
    of the ally hero with the lowest remaining Health equal to Attack* 120%/140%/160%/180%/200%
    .
- name: Bladestones
  description: Aisling's scalpel stones rival the sharpest blades, granting normal
    attacks a 25% chance of dealing Attack* 100%/110%/120%/130%/140% additional damage
    to targets.
- name: Songs of the Ancestors
  description: Aisling's knowledge of the tribal harmonies of nature enthrall her
    troops, increasing their damage dealt by 4%/8%/12%/16%/20% .
- name: Rock Strom
  description: An expert in the use of long-range forest warfare, Aisling's Marksmen
    deal 30%/60%/90%/120%/150% extra damage every 3 turns while exhausted enemies
    are forced to reduce their damage by 6%/12%/18%/24%/30% for 1 turn.
- name: Forest Fury
  description: Aisling embodies the fury of the forest at a distance, granting Marksman
    attacks 8%/16%/24%/32%/40% extra damage against all enemy troops every 3 turns.
- name: Woodland Harmony
  description: Aisling's forest faith imbues Wild Growth vines with a paralyzing effect,
    reducing target Attack Speed by 30% for 3 seconds. Fruits of Plenty also reduces
    target Attack Speed by 30% for 3 seconds.
- name: Forest Guardian
  description: Aisling's experience in defending woodland groves are of much use to
    Cities also, increasing Defender Troops' Defense by 15%.
