story: 'A Forest Guardian of Tair, Aisling comes from a traditional tribe steeped
  in respect for nature and the art of combat. One of the Forest Guardian''s strongest
  ranged defenders, Aisling''s skill with the sling is legendary. A weapon useless
  in most hands can exact deadly blows against distant poachers in hers. Like all
  good Forest Guardians, Aisling knows every nook and cranny of these woodlands, including
  all the best ambush spots.


  Most foreigners who come into contact with Aisling know her more for her extraordinary
  singing and instrumental skills, her songs during common festivals, or forest-fairy
  dances. Even the animals seem enchanted by Aisling''s voice. Many animals will gather
  around Aisling''s performances, entranced as much as any human listener.


  Aisling''s bond with the animal world goes far beyond any typical Forest Guardian,
  forged in a near-tragedy.


  Tair legend tells of mischievous forest spirits who lead children away on lost trails
  from which they will never return. It is said that these children are selected for
  the spirit realm, but Aisling''s parents refused to be comforted by this when it
  happened to them. For seven days and seven nights Aisling''s parents encamped from
  forest nook to woodland corner seeking their lost baby. They finally found little
  Aisling inside a warm cavern surrounded by a cluster of woodland critters, sleeping
  soundly through the night. Since that day Aisling has displayed an extraordinary
  ability to understand forest-kin.


  Aisling sings these stories and more to her audience at many cross-tribal gatherings.
  But Aisling''s listeners must decide the truth of it for themselves. Some say it
  is not beyond reason because, after all, another famous girl on the Tundra keeps
  a polar bear as a companion.


  Aisling''s reputation for song and string rivals even Lynn the "bard of a thousand
  songs". Lynn and Aisling rejected many invitations to perform together in musical
  contest until chance brought them together by accident in a sleepy woodland tavern.
  Witnesses still tell stories of that grand meeting of musical minds.


  Lynn''s skill in the string was shown in force that night, her music a passionate
  fire upon the stage. Aisling''s gentle melody spoke of calm soulfulness. Two competing
  styles so utterly different that popular opinion could not come to a verdict.


  But one meaningful consequence of this music (apart from the joy of listeners) was
  a powerful friendship forged between Aisling and Lynn.


  As a Forest Guardian Aisling''s sacred mission is to protect that which matters
  most: the holy grove. Even if withered today, scholars believe the trees that lie
  within Tair''s sacred grove are the same species as the Tree of Life on Daybreak
  Island. One day perhaps the same vitality and warmth could give life to Tair''s
  surroundings.


  The hope of an oasis of warmth in Tair has drawn many Dawn Alliance researchers.
  It has also enticed invaders and bandits full of greed in equal measure. Forest
  Guardians have had to pick up sling and spear as never before, and seek out new
  friends wherever they may be found. Though victorious for the time being, Aisling
  is well aware that the invaders will not stop. So the Forest Guardians have reluctantly
  partnered with the Dawn Alliance, which also seeks to unravel the true mysteries
  of the sacred grove.'
