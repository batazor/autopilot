story: 'The deadly Tundra flower Elif bloomed in a distant land before coming to this
  remnant of civilization.


  A skilled dancer and martial artist, to her enemies Elif likes to be seen as adaptable
  as water and dangerous as fire. Otherwise she tries to be as charming as possible
  and, as far as it concerns the convoys or Cities she often joins, she is.


  Unlike other members of the wandering kind, Elif seems to mainly use the convoys
  as a way of safely traveling between Cities where she will plant herself for a time.
  Elif''s performance and friend-making skills make her generally welcome, and she
  will use the time profitably to make new contacts and pursue the next of leg whatever
  mystery has caught hold of her.


  Elif received her training in a remote part of the world late to be affected by
  the plague of ice. This is reflected by a certain sadness in her performances, a
  wistful longing for the much-remembered past. She is one of few of her age to remember
  it well.


  Elif has channeled her training into a very deadly routine she performs with twin
  blades resembling the white dancing ribbons of her youth. It turns out that any
  kind of extraordinary dexterity translate well to a battlefield, where Elif''s enemies
  find her rather difficult to defend against. Where convoy cannot protect, Elif is
  perfectly capable.


  Elif is a lady on a mission that can be traced back to a tragedy that began many
  years ago when a strange scientist visited her small hometown. No one knows exactly
  why, but the stranger''s departure coincided with most of the children, including
  Elif''s dear sister Defne, coming down with a terrible illness that left its mark
  on their thoughts and feelings, including awful cravings like for fresh blood. It
  was a terrible curse. Only to find relief from the chaos it brought did Elif and
  her sister flee.


  Having established herself here, Elif enlisted the help of one of Mia''s contacts,
  Philly the physician, to look after Defne. A cure seems impossible, but the disease
  can be stabilized with effort. Elif has turned her attention in recent years to
  uncovering the stranger who brought this curse into her midst and who might hold
  all the answers, including how to cure it.


  Philly has done her own research and uncovered links between the Blood Moon Plague
  and Defne''s curse. Side effects of both include increased strength and resistance
  to cold. Philly speculates the visitor engineered an outbreak of a non-communicable
  form of this disease soon after it was seen in the Abandoned City.


  Elif only remembers bits and pieces: the lady wore a cloak and a white mask as if
  hiding something.


  Philly knows more. Very few alive today would be capable of such a feat, but Kaisha
  is one of them. A fellow researcher in younger days expelled from academia for her
  obsession with genetic modification and "forced evolution" , could Kaisha''s


  misplaced belief in the end justifying the means have led to all this?


  Rumor has it Kaisha has thrown in her lot with Phaethon in exchange for a blank
  check on military experimentation. However Philly fears for Elif''s future if she
  continues down this road, she knows Elif will never give up even in the eye of Phaethon''s
  storm.'
