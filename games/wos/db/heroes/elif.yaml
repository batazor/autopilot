skills:
- name: Spectral Glide Lv.5
  description: Elif confuses enemies with her dazzling moves for 1s, gaining a 10/15/20/25/30%
    chance of dodging enemy attacks for 5s.
- name: Blade Dance Lv.5
  description: Elif strikes unpredictably with her blade, dealing Attack* 100/110/120/130/140%
    damage and confusing the target for 1s.
- name: Ethereal Steps Lv.5
  description: Elif bewilders enemies with her graceful combat moves, increasing her
    chance of dodging enemy attacks by 7/10/13/16/20% . Her normal attacks have a
    7/10/13/16/20% chance of confusing the target for 1s.
- name: Shackling Veil Lv.5
  description: Elif entangles enemy weapons with her veil, reducing all enemy Troops'
    Attack by 5/10/15/20/25% .
- name: Slash Formation Lv.5
  description: Elif applies an exotic formation on the tundra, increasing Troops'
    Attack by 3/6/9/12/15% and Troops' Defense by 2/4/6/8/10% .
- name: Enchanting Tapestry Lv.5
  description: Elif weaves ribbons into a curtain when her Infantry attacks, granting
    them a Shield with protection equal to Attack* 6/12/18/24/30% for 1 turn.
- name: Blazing Edge Lv.10
  description: Elif dances freestyle, increasing her Attack Speed by 7/10/13/16/20%
    and the Exploration confusion chance of Ethereal Steps by 7/10/13/16/20% .
- name: Guardian's Grace Lv.10
  description: Elif inspires the Defender Troops with a graceful dance, increasing
    their Defense by 5/7.5/10/12.5/15% .
