story: 'Ursar''s ancestors made a choice to forge a new life in the underground places
  of the world. Wisely or not, they believed in a source of light and healing untouched
  by wars above ground. There they carved out their own unique Windbreaker civilization.


  As one of the foremost warriors of the modern-day Windbreakers, Ursar has been brought
  up in the ways of battle. His courage, agility, and accuracy are unquestioned. Ursar
  also displays great promise as a future chieftain of the tribe, a natural leader
  with an encouraging word for any situation and tactical skill. Great power, responsibility,
  and the blessings of the ancestors will reside with him soon.


  Being a future chief of the Windbreaker tribe is as much a cultural career as a
  political and military one. This is why it is good that Ursar is very skilled in
  traditional Windbreaker flutes and the hand-drums, well-versed in Windbreaker dances,
  classical and ritual. He must also take on the role of a master storyteller to pass
  on the legends of his people, all the way back to the birth of the Windbreaker tribe
  and the creation of the world in their mythology. Tales, which as far as outsiders
  are able to say, contain an interesting mix of real history and myth interwoven
  together in beautiful poems. Many times Ursar has been asked to recount these rhymes
  for the benefit of Dawn Alliance explorers. And Dawn Alliance researchers have found
  much to like in the Windbreaker concept of the world itself being "a living being".


  Ursar first encountered explorers from above in their hour of need. Dawn Alliance
  adventurers had foolishly wandered into a toxic underground cave system covered
  in hallucinogenic fungal spores. Only Ursar''s antidotes saved the explorers from
  being utterly lost. Bahiti and Ursar struck up a fast friendship that day. Windbreaker
  explorer Xura had already left for the surface world long before, giving Bahiti
  some acquaintance with Ursar''s ancient dialect. Ursar was very pleased to hear
  of Xura glad tidings, and the two exchanged much knowledge of the under- and over-world.


  Ursar also shared a warning with the Dawn Alliance to stay clear of the more recent
  undergrounders: Thaleira and its ruler, Vulcanus. About the only good thing Ursar
  could say about Thaleira is they shared a reverence for the holy artifacts scattered
  throughout the caves. The war between Ursar''s people and Vulcanus would probably
  be going on still were it not for the invasion of an even worse group of surface-dwellers:
  Phaethon. Tramplers of all that is holy, Phaethon has invaded like a swarm of locusts
  followed by countless bandits.


  The arrival of Phaethon has forced an uneasy truce between Windbreakers and the
  newcomers of Thaleira. Traditional warriors met the innovations of Thaleiran craftsmanship
  to great effect as the two sides reluctantly allied. The establishment of a Dawn
  Alliance outpost has also thrown new weight against Phaethon. Their greatest victory
  so far is winning a certain degree of freedom from fear of Phaethon.'
