skills:
- name: Ancestral Totem
  description: Ursar summons a totemic Windbreaker spirit from the elders to encourage
    troops by increasing Attack Speed by 20%/30%/40%/50%/60% , Dodge by 10%/15%/20%/25%/30%
    , and Movement Speed by 25% for 5 seconds.
- name: Wind Tip
  description: Ursar throws a mighty spear with power enough to inflict Attack* 100%/110%/120%/130%/140%
    and stun the target for 2 seconds.
- name: Dance of the Windbreakers
  description: The ancient Windbreaker dancers have trained Ursar well in the agility
    of combat, increasing Attack Speed by 10%/15%/20%/25%/30% .
- name: Forest Spores
  description: Ursar is not above using the hallucinogenic spores of the underground
    to bewilder opponents, reducing enemy troops' Attack by 5%/10%/15%/20%/25% .
- name: Horn of the Ancients
  description: The horn of the elders encourages friends and terrifies foes, increasing
    Lancer and Marksman Lethality by 6%/12%/18%/24%/30% for 2 turns and reducing enemy
    troops' Defense by 6%/12%/18%/24%/30% for 1 turn.
- name: Poison Tips
  description: Ursar's poison-tipped spears ensure Lancers deal 20%/40%/60%/80%/100%
    extra damage every 2 attacks and increase damage received by targets by 5%/10%/15%/20%/25%
    for 1 turn.
- name: Venomous Edge
  description: Adding poison to the edge of Ursar's blade ensures targets of normal
    attacks and Wind Tip are poisoned for Attack*30% damage every 0.5 seconds for
    3 seconds. Max 3 stacks.
- name: Typhoon Drums
  description: The drumbeat of the ancients is a call to arms for every warrior spirit,
    increasing Rally Troops' Attack by 15%.
