skills:
- name: Acid Reflex
  description: Ligeia summons 3 acid-lobbing Mech-spiders against an enemy, dealing
    Attack* 70%/77%/84%/91%/98% area damage and reducing Enemy's Attack by 5%/10%/15%/20%/25%
    for 2 seconds.
- name: Spider Madam
  description: Ligeia deploys steelweb against an enemy with the damage of 50%/55%/60%/65%/70%
    Attack* and a 20%/40%/60%/80%/100% chance to trigger a "Resonance" trap for 5
    seconds. Resonance reapportions damage against Ligeia to the target.
- name: Mechanical Teeth
  description: Ligeia activates Queen Protection Mode to deflect a negative status
    effect at a cost of 1 Guard Spider, but gaining a 10-second 8%/12%/16%/20%/24%
    Attack boost. Ligeia can deploy up to 3 active Guard Spiders at a rate of 1 every
    10 seconds.
- name: Nerf Poison
  description: Ligeia unleashes a swarm of biting Mech-spiders against well-armored
    foes, reducing all enemy Defense by 5%/10%/15%/20%/25% .
- name: Corrosion
  description: Ligeia adds Mech-spiders to Marksmen's fire, dealing 20%/40%/60%/80%/100%
    extra damage every 2 attacks; spider acid dissolves enemy armor, amplifying target
    damage received by 5%/10%/15%/20%/25% for 1 turn.
- name: Toxic Tip
  description: Ligeia dips Marksmen arrowheads in spider toxin, increasing Marksmen's
    damage by 20%/40%/60%/80%/100% against the target every 2 attacks while reducing
    the target's damage dealt by 4%/8%/12%/16%/20% for 1 turn.
- name: Spider Queen (Lv. 5)
  description: Ligeia's mech mastery is a sight to behold, allowing her to deploy
    2 Guard Spider at the start of battle with a 100% chance Spider Madam of striking
    1 extra target.
- name: Trap Nest (Lv. 5)
  description: Ligeia knows traps, particularly when she has time to prepare them
    herself, increasing Defender Troops' Lethality by 15%.
