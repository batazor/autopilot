story: 'No one knows his real name, but every town has hard of his legend-


  As a warrior who wanders the land, Wu Ming has made a name for himself as a martial
  artist. He reached a high level of perfection in his skills, and is not adraid to
  use his strength to help the weak. His chivalry has earned him an excellent reputation,
  and with his Dragonslayer in hand, he is a terror to the opportunistic bandits who
  roam the Tundra.


  Though he has become accustomed to the life of a wanderer, he still stays temporily
  in poorer towns to teach Survivor how to protec themselves. After all, like an old
  saying from his distant hometown, "Teach a man to fish, and you feed him for a lifetime."


  Wu Ming is skilled not just in martial arts, but in music and the arts. However,
  what people praise more about him is his humbleness and amiable personality. He
  would even play the role of a schoolteacher in the town sometimes and teach children
  how to read, write, and count. He also tells them fantastical myths from foreign
  lands. Few know that Wu Ming was once a person who was completely different than
  his current self.


  His past self''s only pursuit in life was to go down in history as the "World''s
  Number One Master." For this purpose, he studied hard, visited many renowned masters,
  and learned from all schools of thought. He was already gifted in martial arts,
  and his obsession with it made him a formidable opponent even in his youth, remaining
  undefeated until he met that older person.


  This older person once traveled the world but now lived in an ordinary town. Hearing
  talk of this person''s unparalleled martial art skills, the fighting spirit was
  rekindled in Wu Ming''s empty heart and he stepped forth to challenge this person.
  His challenge ended not in victory, and he tasted defeat with the sword, spear,
  and halberd against that person''s stick. After his consecutive losses, Wu Ming
  became obsessed with surpassing this mighty opponent.


  For several years after that first challenge, Wu Ming challenged that older person
  annually, and was defeated every time. He could not figure out how victory still
  eluded him though he had surpassed his opponent in strength, agility, and skill.


  During his last challenge, a group of bandits called Reapers invaded the town where
  the older person lived. Wu Ming tried to flee-human flesh is no shield against heavy
  mech after all-but the older person, with his strength, struck the invaders with
  his stick and subdued three Reapers, ensuring the town''s safety. However, he had
  also exhausted his strength in this last battle and death came swiftly upon him.
  Wu Ming, witnessing this event, realized the true meaning of being a warrior: True
  righteous ideals and belief are the key to transcendence. And so, he took on the
  mantle of his late opponent and embarked on his journey of chivalry under the alias
  "Wu Ming", or "The Nameless One".'
