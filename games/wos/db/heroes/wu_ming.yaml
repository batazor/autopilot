- name: Cyclone Barrier
  description: Wu Ming twirls his staff at blinding speed and forms an unyielding
    barrier, dealing Attack 100%/110%/120%/130%/140% Area of Effect damage, gaining
    invulnerability for 2s.
- name: Inner Clarity
  description: Wu Ming finds unparalleled clarity by cilencing the chaos within, increasing
    Attack by 8%/12%/16%/20%/24% and Defense by 16%/24%/32%/40%/48% for 4s.
- name: Remote Impact
  description: Wu Ming hones his martial arts to perfection, dealing Attack 20%/22%/24%/26%/28%
    damage to a random ennemy with every normal attack.
- name: Shadow's Evasion
  description: Wu Ming moves like a shadow, dodging and coutering ennemies, reducing
    his troops' damage taken from normal attacks by 5%/10%/15%/20%/25% and from skills
    by 6%/12%/18%/34%/30% .
- name: Crescent Uplift
  description: Wu Ming spreads his wisdom and techniques, increasing friendly troops'
    damage dealt by 4%/8%/12%/16%/20% .
- name: Elemental Resonance
  description: Wu Ming leads everyone to a heightened affinity with their combat techniques,
    incresaing troops' skill damage dealt by 5%/10%/15%/20%/25% .
- name: Martial Zenith (Lv. 5)
  description: Wu Ming stands transcendent in the realm of martial arts, increasing
    damage dealt by 30%.
- name: Steel Discipline (Lv. 5)
  description: Wu Ming puts defender troops under stern tutelage, incresaing Defender
    Troops' Defense by 15% maximum.
