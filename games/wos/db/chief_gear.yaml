# Chief Gear upgrade ladder — per tier+star step, re-encoded game FACTS.
#
# The 6 Chief Gear pieces (gloves_belt + goggles_boots per troop type) share ONE
# upgrade ladder Green → Blue → Purple → Gold → Pink (Red), 42 ordinal steps; only
# the stat's troop-type differs per piece, never the cost. `level` is the ordinal
# (1 = Green 0, 42 = top); `label` is the in-game tier+star.
#   cost  — materials to take a piece FROM the previous step TO this one:
#           hardened_alloy / polishing_solution / design_plans / lunar_amber
#           (keys match db/items/*.yaml; tier-promotion steps cost only design_plans;
#           lunar_amber enters at the Pink tier). Only non-zero materials are listed.
#   power — the piece's power AT this step.
#
# Source: whiteoutdata.com's static Chief Gear table (numbers only, independently
# transcribed; cross-checked against heaven-guardian's gear chart). Power is present
# for the whole ladder — no gap. Read by games/wos/core/gear/planner/model.py.
unlock_furnace_level: 22       # Chief Gear unlocks at Furnace Lv. 22
max_level: 42

pieces:
  - {id: gloves_belt_infantry,   troop_type: infantry}
  - {id: goggles_boots_infantry, troop_type: infantry}
  - {id: gloves_belt_lancer,     troop_type: lancer}
  - {id: goggles_boots_lancer,   troop_type: lancer}
  - {id: gloves_belt_marksman,   troop_type: marksman}
  - {id: goggles_boots_marksman, troop_type: marksman}

levels:
