# Cheap no-buff prosperity sources (placed in bulk; per-unit prosperity at L1).
# Used by the planner only as a Prosperity fallback when no buff decoration is
# worth it but the Tree of Life is prosperity-blocked.
prosperity_fillers:
  - {id: common_decoration,   name: Common Decoration,   rarity: common,   life_essence: 1000, prosperity: 50}
  - {id: uncommon_decoration, name: Uncommon Decoration, rarity: uncommon, life_essence: 2000, prosperity: 100}
