# Daybreak Island decorations — the island's *buff buildings*. Every decoration
# costs Life Essence to place and contributes **Prosperity** (which gates the Tree
# of Life). The buff-bearing ones (Rare/Epic/Mythic) are the reason to build the
# island at all: they grant permanent main-game bonuses (gathering, research and
# construction speed, troop attack/defense, etc.). Common/Uncommon decorations
# carry no buff — they exist purely as cheap Prosperity toward the next ToL level.
#
# Each decoration: a `kind` (mapped to a role category in the planner's policy),
# the buff `stat`/`amount`, the `life_essence` build cost, `max_level`, and the
# `prosperity` it contributes at max level (Prosperity scales with level in-game;
# v1 stores the max contribution and treats it as the decoration's prosperity
# worth — relative ordering by rarity is what the greedy planner needs).
#
# Source: community guides (ldplayer.net Daybreak Island strategy guide +
# onechilledgamer Daybreak Island guide, fetched 2026-06-20). Exact per-level
# Prosperity/buff curves are not fully published → max-level values used.
source:
  name: ldplayer.net / onechilledgamer.com
  url: https://www.ldplayer.net/blog/whiteout-survival-ultimate-daybreak-island-desigh-and-strategy.html
  fetched_at: '2026-06-20'

