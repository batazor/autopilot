# Sunfire Castle territory map — fixed structure coordinates (game facts).
#
# Source: wostools.net Territory Planner (https://wostools.net/territory-planner),
# facts re-encoded from the page's static data (extracted 2026-06-25). Re-encoding
# game FACTS only — the fixed positions of structures on the kingdom/state world map
# (the global map), which are identical on every server. No fabricated numbers.
#
# COORDINATE SYSTEM: these ARE the main global (state/kingdom) world-map tile
# coordinates — the 1200x1200 grid the radar scans. Each coordinate is [col, row]
# = in-game [X, Y]: origin top-left, col/X increasing right, row/Y increasing down.
# The Sunfire Castle territory sits at the centre of the map; castle is (597,597).
# Usable directly as ground-truth anchors for the radar game<->canvas affine.
#
# Structure groups:
#  - castle:      the central Sunfire Castle (size-4 footprint).
#  - turrets:     4 size-2 turrets hugging the castle centre.
#  - strongholds: 4 inner capture points.
#  - fortresses:  12 outer capture points. (strongholds + fortresses = the 16 forts.)
#  - buff_facilities: 74 capturable buff towers in 8 types. Each grants a city buff
#    (bonus) while held; 'booster' is the buff %, 'level' the facility tier. The
#    'tech' type (Research Speed) is the in-game research/'lab' facility.
#  - zones: axis-aligned bounding boxes (inclusive col/row) describing the planner's
#    territory bands — useful seed regions for a global-screen zone/markup editor.
#
# Consumer: none yet (harvested data). Intended for radar marker overlays + global-map
# ground-truth anchors and a future zone-markup planner.

grid_size: 1200

castle: {col: 597, row: 597, size: 4, label: "Sunfire Castle"}

turrets:
