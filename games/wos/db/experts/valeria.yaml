story: Valeria commands the Dawnbreaker Brigade and is known for "textbook Imperial tactics" and leading
  one of the largest armies in the Tundra. She achieved an "impossible victory" defending cities against
  Phaethon's forces using terrain advantages. Originally from the noble city of Altea, she questioned
  the aristocracy's brutal rule and joined the Dawnbreakers to escape endless bloodshed, now fighting
  against her former countrymen's imperial ambitions.
