story: Baldur serves as a diplomat for the Dawn Alliance. Described as "astute," "conniving," and "inscrutable,"
  he balances allied interests strategically. Though rumored to descend from Solaris Dynasty nobility,
  he claims ordinary survivor status. Beyond diplomacy, Baldur excels in combat—his swordsmanship tested
  against Jeronimo and marksmanship against Bahiti both earned praise. Recently, he mediated a conflict
  between lords Guillaume and Hilmar by uncovering forged wills.
