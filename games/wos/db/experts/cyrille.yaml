story: Cyrille is a legendary hunter whose reputation extends across multiple settlements. She survived
  a bear encounter as a teenager and has spent over two decades eliminating apex predators on the Tundra.
  Beyond her hunting prowess, she's known for protecting survivors and outposts with "a kind heart." She's
  developed innovative bear traps and tactics while warning about distorted super-predators emerging post-collapse.
  She mentors Cloris and investigates mysterious large-scale beast attacks on cities that leave no traceable
  evidence.
