story: Fabian was a gifted young engineer at the Imperial Foundry who joined the Rebels to fight tyranny.
  After the old Solaris Empire fell, he left at the peak of fame to live quietly with his family. A devastating
  storm killed his wife and children, spurring him to invent protective technologies. He was hired by
  a wealthy client—secretly a Phaethon officer—to build the "Typhon Tank." Upon discovering this weapon
  would enable mass destruction, he realized his terrible mistake and now develops weapons to counter
  large-scale threats.
