story: Romulus was a decorated general in the Solaris Empire's Royal Academy who fell from grace due to
  court politics. Falsely accused of sedition, he was disgraced. When rebellion threatened the kingdom,
  the king recalled him to lead loyalist forces. After months of fighting, Romulus lost the final battle
  and was taken prisoner. Treated respectfully by his former student—now the rebel leader—he eventually
  agreed to serve as advisor to the new government. In his twilight years, he seeks to discover the fate
  of the Aeetes, his former elite brigade.
