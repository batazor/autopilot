story: Ronne transitioned from mercenary work to convoy escort duty. She's renowned for her "reckless
  shock-and-awe tactics" that are actually calculated strategies to avoid battles. She modified vehicles
  into armored transports and earned a "flawless track record" protecting valuable cargo across Tundra
  trade routes. She eventually joined the Chief's city to leverage her experience for broader good.
