# Troop combat stats — per troop type, camp tier, and Fire-Crystal level.
# Re-encoded game FACTS from the community WoS data repo
# (github.com/wosnerdwarriors/wos-data — data/troop-stats.json; no license file,
# numbers only, independently transcribed — NOT a copy of their code).
# Dimensions: 3 troop types x tier 1-11 (named Rookie..Helios) x FC level 0-10.
#   tier  — camp troop level (1..11)
#   fc    — Fire-Crystal level (0..10) layering the FC stat bonus on the tier
#   power — per-unit power; attack/defense/lethality/health are per-unit combat
#   load  — gathering carry capacity (essentially tier-based; one source
#           outlier kept verbatim: marksman tier 5 fc 3 = 186 vs 188 elsewhere)
# Per-unit base march speed is 11 for every row (omitted from rows; see `speed`).
# Read by games/wos/core/resources/troop_stats.py.

