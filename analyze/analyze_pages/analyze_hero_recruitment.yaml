overlay:
  # OCR HUD on Hero Recruitment (`screens` gate requires Redis current_screen).
  # Worker snapshots raw text to ``wos:instance:<id>:state``; run ``cmd/sync_hero_recruitment_resources.py``
  # to parse into ``resources.*`` and ``events.recruitment.free_recruitments_today``.
  - name: key.silver.hero_recruitment
    region: key.silver
    action: text
    screens:
      - hero.recrutment
    ttl: 20s

  - name: key.gold.hero_recruitment
    region: key.gold
    action: text
    screens:
      - hero.recrutment
    ttl: 20s

  - name: diamond.hero_recruitment
    region: diamond
    action: text
    screens:
      - hero.recrutment
    ttl: 20s

  - name: free_recruitments_today.hero_recruitment
    region: free_recruitments_today
    action: text
    screens:
      - hero.recrutment
    ttl: 20s

  # When the Advanced recruit's "Free" button is on screen (red-dot-free —
  # template match only, see ``hero.recrutment.advanced.free`` in area.json
  # for the ``_search`` ROI companion) we push the existing claim scenario.
  # ``ttl: 1h`` throttles re-evaluation so we don't spam the queue when the
  # button lingers in view for a few minutes after a refresh; the underlying
  # cron (``free_recrutments_today.yaml``, every 5h) still acts as a
  # safety-net catch-up between overlay ticks.
  - name: hero.recrutment.advanced.free.visible
    region: hero.recrutment.advanced.free
    action: findIcon
    screens:
      - hero.recrutment
    threshold: 0.9
    ttl: 1h
    pushScenario:
      - name: free_recrutments_today
