overlay:
  - name: is_has_new_mail.visible
    region: is_has_new_mail
    action: color_check
    # For color checks, `threshold` is the minimum share (share of dominant pixels).
    threshold: 0.6
    node: main_city
    pushScenario:
      - name: read_mail_gifts
        priority: 80000
        ttl: 1m

  - name: new_chapter.visible
    region: is_new_chapter
    action: findIcon
    threshold: 0.9
    node: main_city
    pushScenario:
      - name: new_chapter
        priority: 80000
        ttl: 15m

  - name: isNewPeople.visible
    region: isNewPeople
    action: findIcon
    threshold: 0.92
    node: main_city
    pushScenario:
      - name: is_new_people
        priority: 80000
        ttl: 15m

  - name: isWorkers.visible
    region: isWorkers
    action: color_check
    threshold: 0.9
    node: main_city
    pushScenario:
      - name: assign_worker
        priority: 80000
        ttl: 1m

  - name: chapter.task.present
    region: chapter.task
    action: text
    # Any non-empty OCR text counts as "present" (overlay engine semantics for action=text).
    node: main_city
    ttl: 30s
    pushScenario:
      - name: chapter_task_router
        priority: 70000
        ttl: 20s
