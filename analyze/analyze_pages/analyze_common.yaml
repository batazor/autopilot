# OCR-based "Tap anywhere to exit" detector. Color-agnostic — the popup
# banner's text is identical across the white/purpur/blue/yellow variants,
# so one fuzzy-text rule replaces the four template-match rules. Tap target
# is the text region itself (any tap dismisses the popup).
- name: tapanywhereyoexit.visible
  region: tapanywhereyoexit
  action: text
  expected: ["tap anywhere"]
  threshold: 0.7
  priority: 83_000
  ttl: 5s
  pushScenario:
    - name: tap_tapanywhereyoexit

