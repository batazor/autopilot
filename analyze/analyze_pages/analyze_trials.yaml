overlay:
# "Trials screen entered" trigger: when current_screen=trials and the title
# OCR yields any text, push the claim_trials walker. The 30s ttl dedupes
# repeated overlay ticks while a claim run is in flight.
- name: event.trials.entered
  region: page_title
  action: text
  screens:
  - event.trials
  ttl: 30s
  pushScenario:
  - name: claim_trials
    priority: 80_000
