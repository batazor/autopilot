overlay:
- name: page.building.furniture.present
  region: page.building.furniture
  action: findIcon
  threshold: 0.9
  screens:
    - building
  set_node: building
  ttl: 30s
  pushScenario:
    - name: building.upgrade
      priority: 80_000

- name: upgrade_building.visible
  region: upgrade_building
  action: findIcon
  priority: 80_000
  threshold: 0.87
  min_match_saturation: 48
  screens:
    - building
  ttl: 20s
  pushScenario:
    - name: building.upgrade
      priority: 80_000

- name: upgrade_big_button.visible
  region: upgrade_big_button
  action: findIcon
  priority: 70_000
  threshold: 0.92
  min_match_saturation: 48
  screens:
    - building
    - main_city
  pushScenario:
    - name: tap_upgrade_big_button
      priority: 70_000

- name: build_button.visible
  region: build_button
  action: findIcon
  priority: 70_000
  threshold: 0.98
  min_match_saturation: 48
  ttl: 5s
  pushScenario:
    - name: tap_build_button
      priority: 70_000
