overlay:
  - name: mail_gift.visible
    region: mail_gift
    action: findIcon
    threshold: 0.9
    min_match_saturation: 48
    node: mail
    priority: 70_000
    pushScenario:
      - name: read_mail_gifts
        priority: 80_000

  - name: big_claim_button.visible
    region: big_claim_button
    action: findIcon
    threshold: 0.9

  - name: page.mail.visible
    region: page_title
    action: readText
    expected: ["Mail"]
    fuzzy_threshold: 0.75
    set_node: mail
