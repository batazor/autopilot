overlay:
  - name: mail_page_back.visible
    region: back_button
    action: findIcon
    threshold: 0.9
    set_node: mail

  - name: mail_gift.visible
    region: mail_gift
    action: findIcon
    threshold: 0.9
    node: mail
    priority: 70_000

  - name: big_claim_button.visible
    region: big_claim_button
    action: findIcon
    threshold: 0.9

  - name: page.mail.visible
    region: page_title
    action: readText
    expected: ["Mail"]
    fuzzy_threshold: 0.75
    set_node: mail
