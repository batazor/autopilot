name: Squad fight
enabled: true

# 12-hour cadence: kicks off the redeploy loop. The scenario re-pushes itself
# after every Victory, so a single cron tick can trigger many fights — the
# chain only ends once the squad finally loses.
cron: "0 */12 * * *"
priority: 12

# Navigator BFS: main_city → exploration → squad_settings (see edge_taps.yaml).
node: squad_settings

# cond: "exploration.state.myPower * 1.2 >= exploration.state.enemyPower"

steps:
  # OCR the squad level + matchup powers. ``state:`` writes each integer into
  # ``db/state.yaml`` (long-lived) so the *next* run's root ``cond`` —
  # ``exploration.state.myPower * 1.2 >= exploration.state.enemyPower`` — sees
  # this fight's readings. The cond runs before any OCR, so it gates on the
  # *previous* matchup; on the very first run all three default to 0 and the
  # cond passes trivially. No Redis write here (no ``store:``) since these
  # values aren't consumed between steps within this same scenario.
  - ocr: exploration.level
    type: integer
    state: exploration.level
  - ocr: exploration.state.myPower
    type: integer
    state: exploration.state.myPower
  - ocr: exploration.state.enemyPower
    type: integer
    state: exploration.state.enemyPower

  # Re-deploy the squad and start a fight.
  - click: squad_settings.quick_deploy
  - wait: 500ms
  - click: squad_settings.fight

  # Initial wait so the fight animation has time to land before we start
  # polling the status banner.
  - wait: 10s

  # Poll OCR'ing the status banner each iteration; exit once the text contains
  # ``victory`` or ``defeat`` (case-insensitive). The OCR step inherits the
  # region's ``threshold: 0.9`` from area.json — mid-animation low-confidence
  # reads are correctly skipped (no garbage written), and the loop keeps
  # polling until a stable banner OCR clears the threshold. ``squad_status``
  # is a ``store:`` field (ephemeral, scenario-scope), so the DSL runner
  # wipes it from Redis at scenario start — no stale ``"Victory!"`` /
  # ``"Defeat!"`` from prior runs can short-circuit the loop's exit cond.
  - loop:
      cond: 'squad_status ~= "victory|defeat"'
      steps:
        - ocr: page.squad_settings.status
          store: squad_status
        - wait: 2s

  # Won → tap `next` to dismiss the banner / start the next fight, then re-push
  # ourselves so the scheduler picks up the next iteration. Lost → fall through
  # and end (no push, no further taps). The ``~=`` operator is a case-insensitive
  # substring match, so "Victory!", "VICTORY", and "victory" all hit.
  - cond: squad_status ~= "victory"
    steps:
      - click: page.squad_settings.next
      - push_scenario: squad_fight

  - cond: squad_status ~= "defeat"
    steps:
      - click: page.squad_settings.status.defeat
      - wait: 2s
