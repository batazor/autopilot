enabled: true
name: "Read mail · claim gifts"
priority: 120

# Navigate to Mail screen via FSM graph, then work only inside mail UI.
node: mail

steps:
  # While there are gift icons in the mail list: open each, claim, go back.
  - while_match: mail_gift
    min_match_saturation: 48
    max: 30
    steps:
      - click: mail_gift
      - wait: 0.8s

      # Inside the mail item: try to find a claim button; if it's not in view,
      # scroll down and try again a few times.
      - repeat:
          max: 4
          steps:
            - while_match: big_claim_button
              max: 1
              steps:
                - click: big_claim_button
                - wait: 0.8s
                - break: repeat
            - while_match: claim_button
              max: 1
              steps:
                - click: claim_button
                - wait: 0.8s
                - break: repeat
            - while_match: go_big_button
              max: 1
              steps:
                - click: go_big_button
                - wait: 0.8s
                - break: repeat
            - swipe_direction:
                direction: up
                delta: 450
                duration_ms: 650
            - wait: 0.35s

      # Back to the mail list.
      - while_match: back_button
        max: 1
        steps:
          - click: back_button
          - wait: 0.8s
