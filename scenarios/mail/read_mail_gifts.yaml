enabled: true
name: "Read mail · claim gifts"
priority: 80_000

# Navigate to Mail screen via FSM graph, then work only inside mail UI.
node: mail

# Single scenario for all 5 mail tabs (wars / alliance / system / reports /
# starred). The mail UI clears a tab's red-dot on entry, so we cannot rely
# on red-dots to decide whether the **active** tab still has gifts —
# instead we always scan ``mail_gift`` directly there. For the other four
# tabs we use red-dot as a cheap pre-filter: no dot → no taps wasted on it.
#
# Overlay rules (``mail.tab.*.has_red_dot`` and ``mail_gift.visible``) all
# push this same scenario. Redis dedup collapses duplicate enqueues.
#
# Guard pattern: ``while_match: <region> / max: 1`` (not bare ``match:``)
# because a failing ``match:`` aborts the whole scenario, while
# ``while_match`` with ``max: 1`` is a "run inner steps once if guard
# passes, else continue to the next step" — which is what we need to keep
# evaluating subsequent tab branches.

# Reusable "claim every gift on the current tab" sequence, inlined via
# YAML alias (``- steps: *claim_block``) under the active tab and inside
# each of the 5 tab branches below. The bare-group form (a step that
# carries only ``steps:`` with no action key) is supported by both the
# runtime grouped-step handler and the Pydantic schema.
#
# Phases:
#   1. ``while_match: mail_gift`` — while a gift icon is still visible
#      in the list: open it, hunt for a claim button (scroll if needed),
#      then ``back_button`` to the list. Repeats up to 30 mails.
#   2. After the list is drained of gift icons, tap the list-level
#      ``Read & Claim All`` and ``Delete All Read Mail`` buttons at the
#      bottom of the screen — they must run on the *list* view, NOT
#      inside a mail item (``_tap_region`` taps the bbox center
#      unconditionally for regions without a ``_search`` companion).
#      Each is guarded with ``while_match: <reg> / max: 1`` so we never
#      tap blindly when the buttons are absent (empty tab) and we drain
#      any confirmation popup with ``button.claim``.
_claim_block: &claim_block
  - while_match: mail_gift
    min_match_saturation: 48
    max: 30
    steps:
      - click: mail_gift
      - wait: 0.8s

      # Inside the mail item: try to find a claim button; if it's not in
      # view, scroll down and try again a few times.
      - loop:
          max: 4
          steps:
            - while_match: big_claim_button
              max: 1
              steps:
                - click: big_claim_button
                - wait: 0.8s
                - break: loop
            - while_match: button.claim
              max: 1
              steps:
                - click: button.claim
                - wait: 0.8s
                - break: loop
            - while_match: go_big_button
              max: 1
              steps:
                - click: go_big_button
                - wait: 0.8s
                - break: loop
            - swipe_direction:
                direction: up
                delta: 450
                duration_ms: 650
            - wait: 0.35s

      # Back to the mail list.
      - while_match: back_button
        max: 1
        steps:
          - click: back_button
          - wait: 0.8s

  # Phase 2 — list-level bulk buttons. Only fire when the button is
  # actually visible on screen (we're now on the list view with no more
  # gift icons).
  - while_match: mail.claim_all
    max: 1
    steps:
      - click: mail.claim_all
      - wait: 1s
      - while_match: button.claim
        steps:
          - click: button.claim
          - wait: 0.5s

  - while_match: mail.delete_all
    max: 1
    steps:
      - click: mail.delete_all
      - wait: 1s
      - while_match: ui.button.confirm_blue
        steps:
          - click: ui.button.confirm_blue
          - wait: 0.5s

steps:
  # ---- Step A. Active tab — red-dot already cleared on entry, so we
  # must rely on the gift icon itself, not on ``isRedDot``.
  - steps: *claim_block

  # ---- Steps B1–B5. Each inactive tab with a red-dot gets clicked and
  # cleared. The outer ``while_match`` is the "skip if this is the active
  # tab" gate; the inner one is the "skip if no red-dot" gate. After
  # tapping a tab it becomes active, so the next branch's outer guard
  # naturally moves on.
  - while_match: mail.tab.wars
    isTabActive: false
    max: 1
    steps:
      - while_match: mail.tab.wars
        isRedDot: true
        max: 1
        steps:
          - click: mail.tab.wars
          - wait: 1s
          - steps: *claim_block

  - while_match: mail.tab.alliance
    isTabActive: false
    max: 1
    steps:
      - while_match: mail.tab.alliance
        isRedDot: true
        max: 1
        steps:
          - click: mail.tab.alliance
          - wait: 1s
          - steps: *claim_block

  - while_match: mail.tab.system
    isTabActive: false
    max: 1
    steps:
      - while_match: mail.tab.system
        isRedDot: true
        max: 1
        steps:
          - click: mail.tab.system
          - wait: 1s
          - steps: *claim_block

  - while_match: mail.tab.reports
    isTabActive: false
    max: 1
    steps:
      - while_match: mail.tab.reports
        isRedDot: true
        max: 1
        steps:
          - click: mail.tab.reports
          - wait: 1s
          - steps: *claim_block

  - while_match: mail.tab.starred
    isTabActive: false
    max: 1
    steps:
      - while_match: mail.tab.starred
        isRedDot: true
        max: 1
        steps:
          - click: mail.tab.starred
          - wait: 1s
          - steps: *claim_block
