enabled: true
name: 🏗️ Building upgrade (chapter task)

# Onboarding-only flow that taps tutorial-driven upgrade buttons.  Safe before
# player identity is known.
device_level: true
node: building

steps:
  # Read the building title (e.g. "Cookhouse Lv. 1") and persist the detected
  # building level for the active player.
  - ocr: building.name
  - exec: sync_building_name

  # Chapter flow may show upgrade taps or a Next button instead — handle both per iteration.
  - loop:
      max: 10
      steps:
        - while_match: upgrade_button
          # Template match for this button is slightly noisy; override `area.json`
          # threshold to avoid false "no-iteration" runs of this scenario.
          threshold: 0.87
          max: 5
          steps:
            - wait: 2s
            - long_click: upgrade_button
              wait: 5s
            - wait: 1s
        - while_match: button.next
          max: 1
          steps:
            - wait: 2s
            - click: button.next
            - wait: 2s
        - while_match: build_building_item
          max: 1
          steps:
            - wait: 2s
            - click: build_building_item
            - wait: 2s
        - while_match: upgrade_big_button
          max: 1
          steps:
            - wait: 2s
            - click: upgrade_big_button
            - wait: 2s

  # If the building is now in "upgrading" state, the in-game timer text
  # gives us the remaining duration. Write a push_ttl marker so the
  # analyzer (and any other push source) stops re-firing this chapter task
  # until the upgrade actually finishes. ``type: time`` parses HH:MM:SS to
  # total seconds; ``throttle_push`` writes the marker key with that TTL.
  # When the timer is not visible (no active upgrade), OCR fails to parse
  # and this step is a no-op — normal flow resumes.
  - ocr: building.upgrading.time
    type: time
    throttle_push: building.upgrade
