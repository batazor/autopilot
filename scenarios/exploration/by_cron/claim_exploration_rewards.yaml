enabled: true
name: 🗺️ Claim Exploration Rewards

node: exploration

cron: "0 */4 * * *"

steps:
  - click: button.claim
  - wait: 2s
  - while_match: big_claim_button
    steps:
      - click: big_claim_button
      - wait: 2s
      - match: tapanywhereyoexit
        expected: ["tap anywhere"]
        threshold: 0.7
        steps:
          - click: tapanywhereyoexit
          - wait: 0.5s
