enabled: true
name: "🛒 Open Shop page"

node: shop

# Pushed by ``main_city.to.shop.has_red_dot`` when the Shop button on
# main_city lights up. Just opens the page — claim/buy flow is handled
# by overlays on `shop`.

steps:
  - exec: put_all_red_dots
  - ocr: box.free
    store: box_free_text
  - cond: box_free_text == "Free"
    steps:
      - click: box.free
      - wait: 1s
  
  - while_match: page.shop.warning
    max: 1
    steps:
      - wait: 1s
      - exec: put_all_red_dots
      - ocr: box.free
        store: box_free_text
      - cond: box_free_text == "Free"
        steps:
          - click: box.free
          - wait: 1s
