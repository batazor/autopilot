enabled: true
name: "Claim trials"

node: event.trials

# Pushed when the player lands on the Trials event screen (overlay rule
# `trials.entered` in analyze_trials.yaml). Walks all 5 days and, for each
# day with a red-dot indicator, opens it and claims every task that has its
# own red-dot indicator. After each task tap we drain `button.claim` popups
# (the game often shows multiple claim panels in sequence).
#
# DSL idiom: `while_match: <region> isRedDot: true max: 1` is a poor man's
# `if has_red_dot then …` — it runs the inner steps at most once and silently
# continues when the guard fails, unlike a hard `match` guard which aborts the
# whole scenario.

steps:
  # Drain any leftover claim popup from a previous scenario before walking
  # the day grid. ``strict: false`` makes the normal "no popup pending"
  # case a silent skip — without it, zero iterations trips the
  # ``while_match_no_iterations`` abort and the whole scenario exits before
  # reaching Day 1. The per-day claim guards below already use ``isRedDot``
  # so they're soft by default; this top-level drain has no state guard so
  # it must opt out explicitly.
  - while_match: button.claim
    strict: false
    steps:
      - click: button.claim
      - wait: 0.5s

  # ---------------- Day 1 ----------------
  - while_match: trial.day.1
    isRedDot: true
    max: 1
    steps:
      - click: trial.day.1
      - wait: 1s
      - while_match: trial.task.1
        isRedDot: true
        steps:
          - click: trial.task.1
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.2
        isRedDot: true
        steps:
          - click: trial.task.2
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.3
        isRedDot: true
        steps:
          - click: trial.task.3
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s

  # ---------------- Day 2 ----------------
  - while_match: trial.day.2
    isRedDot: true
    max: 1
    steps:
      - click: trial.day.2
      - wait: 1s
      - while_match: trial.task.1
        isRedDot: true
        steps:
          - click: trial.task.1
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.2
        isRedDot: true
        steps:
          - click: trial.task.2
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.3
        isRedDot: true
        steps:
          - click: trial.task.3
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s

  # ---------------- Day 3 ----------------
  - while_match: trial.day.3
    isRedDot: true
    max: 1
    steps:
      - click: trial.day.3
      - wait: 1s
      - while_match: trial.task.1
        isRedDot: true
        steps:
          - click: trial.task.1
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.2
        isRedDot: true
        steps:
          - click: trial.task.2
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.3
        isRedDot: true
        steps:
          - click: trial.task.3
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s

  # ---------------- Day 4 ----------------
  - while_match: trial.day.4
    isRedDot: true
    max: 1
    steps:
      - click: trial.day.4
      - wait: 1s
      - while_match: trial.task.1
        isRedDot: true
        steps:
          - click: trial.task.1
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.2
        isRedDot: true
        max: 1
        steps:
          - click: trial.task.2
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.3
        isRedDot: true
        steps:
          - click: trial.task.3
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s

  # ---------------- Day 5 ----------------
  - while_match: trial.day.5
    isRedDot: true
    max: 1
    steps:
      - click: trial.day.5
      - wait: 1s
      - while_match: trial.task.1
        isRedDot: true
        steps:
          - click: trial.task.1
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.2
        isRedDot: true
        steps:
          - click: trial.task.2
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.3
        isRedDot: true
        steps:
          - click: trial.task.3
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s

  # ---------------- Final reward box ----------------
  # Bottom-right ``trial.box`` indicator shows when accumulated day-level
  # rewards are ready to collect. Same red-dot-as-guard pattern as each day.
  #
  # Two claim sweeps in sequence:
  #   1. ``isWhiteBorder`` — clicks the **highlighted** claim button (the
  #      animated white outline). Catches the just-opened popup where the
  #      reward is actively claimable.
  #   2. plain ``while_match: button.claim`` — fallback OCR/exist check that
  #      still fires on non-highlighted claim buttons (chained popups, dimmed
  #      states). Together they handle both "fresh highlighted" and "still
  #      claimable but no longer highlighted" cases.
  - while_match: trial.box
    isRedDot: true
    max: 1
    steps:
      - click: trial.box
      - wait: 2s
      - while_match: button.claim
        steps:
          - click: button.claim
          - wait: 0.5s
      - while_match: button.claim
        isWhiteBorder: true
        steps:
          - click: button.claim
          - wait: 1s
          - click: page.vip.increase.close
