      - wait: 1s
      - while_match: trial.task.1
        isRedDot: true
        steps:
          - click: trial.task.1
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.2
        isRedDot: true
        steps:
          - click: trial.task.2
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s
      - while_match: trial.task.3
        isRedDot: true
        steps:
          - click: trial.task.3
          - wait: 0.8s
          - while_match: button.claim
            steps:
              - click: button.claim
              - wait: 0.5s

  # ---------------- Final reward box ----------------
  # Bottom-right ``trial.box`` indicator shows when accumulated day-level
  # rewards are ready to collect. Same red-dot-as-guard pattern as each day.
  - while_match: trial.box
    isRedDot: true
    max: 1
    steps:
      - click: trial.box
      - wait: 0.8s
      - while_match: button.claim
        steps:
          - click: button.claim
          - wait: 0.5s
