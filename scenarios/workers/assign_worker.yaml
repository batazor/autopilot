enabled: true
name: 👷 Assign worker (open workers)
node: survivor_status

steps:
  # Walk the worker list: assign every visible "Add", then scroll a little
  # and probe again so buttons below the fold are reached too.
  - loop:
      max: 2
      steps:
        - while_match: page.worker.add
          max: 6
          steps:
            - click: page.worker.add
            - wait: 1s
        - swipe_direction:
            direction: up
            delta: 200
            duration_ms: 370
        - wait: 0.5s
