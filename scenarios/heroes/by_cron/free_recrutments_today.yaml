enabled: true
name: "Free recruitments today"

# Daily-ish: ~every 5 hours. The free advanced recruit refreshes once per
# real-time window; missing one or two ticks is harmless, the next run picks
# it up. Cron form ``0 */5 * * *`` fires at 00/05/10/15/20 — the 20:00→00:00
# wrap is 4h, not 5h, but for "free recruit when available" that's fine.
cron: "0 */5 * * *"
priority: 50

# Navigator BFS: main_city → heroes → hero.recrutment (see edge_taps.yaml).
node: hero.recrutment

steps:
  # Guard: only proceed when the free recruit button is currently visible.
  # If the free pull isn't available (already claimed / cooldown), ``match``
  # bails and the click is skipped.
  - while_match: hero.recrutment.advanced.free
    steps:
      - click: hero.recrutment.advanced.free
      - wait: 5s
