enabled: true
name: "📖 ${hero_name} wiki red-dots"

# Resolved by ``scenarios.template_resolver`` for keys like
# ``heroes.ahmose.wiki``. Pushed by ``page.heroes.unit.wiki.red_dot``
# overlay rule with ``${hero_id}`` substituted at enqueue time.
#
# Node path: heroes → page.heroes.${hero_id} (via hero_grid resolver) →
# heroes.${hero_id}.wiki (via tap on page.heroes.unit.wiki). Verification
# of the wiki popup is history-based: the navigator just checked we
# came from page.heroes.${hero_id} (no OCR landmark on the popup yet).

node: heroes.${hero_id}.wiki

steps:
  # Drain every red-dot indicator inside the wiki popup, then back out.
  - exec: put_all_red_dots
  - click: back_button
  - wait: 0.5s
