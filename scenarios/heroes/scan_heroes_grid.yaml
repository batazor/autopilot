enabled: true
name: "🔍 Scan heroes grid"

node: heroes

# Snapshot every visible hero on the roster into state.yaml + publish their
# cell positions to ``wos:instance:<id>:hero_grid_positions`` for the
# ``hero_grid`` dynamic edge resolver. Cheap (~250ms template-match sweep
# + one batched OCR call), throttled to 2min via overlay TTL so each visit
# refreshes the hash without spamming.

steps:
  - exec: scan_heroes_grid
