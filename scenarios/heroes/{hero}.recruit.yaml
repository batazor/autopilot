enabled: true
name: "🦸 Recruit ${hero_name}"

# Template rendered by ``scenarios.template_resolver`` when a queue task
# requests ``dsl_scenario`` equal to ``<hero_id>.recruit``. Pushed by
# ``scan_heroes_grid`` when the hero's card lands in the "Recruit / N/N"
# state — shards collected to the cap but the hero hasn't been claimed.
# Navigator routes through the heroes roster to that hero's card
# (``page.heroes.<hero_id>``); the recruit tap itself will be filled in
# under ``steps`` later.

node: page.heroes.${hero_id}

steps: []
