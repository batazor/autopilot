enabled: true
name: "⬆️ Level up · Freya"

# Generated by ``cmd/generate_upgrade_scenarios.py``. Pushed by the
# upgrade optimizer (``optimizer/dispatcher.py``). Steps for
# unlabeled actions stay commented until their regions are
# added via the annotator UI.

node: page.heroes.freya

steps:
  - while_match: page.heroes.unit.upgrade
    max: 1
    steps:
      - click: page.heroes.unit.upgrade_tap
      - wait: 0.8s
      - ocr: page.heroes.unit.name
        store: page.heroes.unit.name
      - ocr: page.heroes.unit.level
        type: integer
        store: page.heroes.unit.level
      - exec: sync_hero_unit
