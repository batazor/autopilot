enabled: true
name: ❌ Tap anywhere to exit
# Above who_i_am (82_000) so this dismisses first with empty active_player; below skip/hand (85–86k).
priority: 83_000
# Popup dismissal — purely UI, no player identity needed.
device_level: true

steps:
  # ``expected`` activates fuzzy OCR matching + ``{region}_search`` fallback
  # in overlay_engine. Popup variants render the prompt at different y%
  # (Chapter Rewards y=90.76 %, Patrick hero card y≈96 %, Recruit-once
  # rewards y≈97 %); the wider ``tapanywhereyoexit_search`` bbox covers
  # them all and partial-fuzzy plucks "tap anywhere" from surrounding
  # OCR noise (sibling labels, Lv. badges, button captions).
  - while_match: tapanywhereyoexit
    expected: ["tap anywhere"]
    steps:
      - click: tapanywhereyoexit
