enabled: true
name: 🎁 Tap claim button
# Popup dismissal — purely UI, no player identity needed.
device_level: true

steps:
  - while_match: button.claim
    threshold: 0.98
    min_match_saturation: 48
    max: 20
    steps:
      - click: button.claim
      - wait: 3s
  # Close control is not always shown — only tap when the region matches.
  - while_match: claim_button_close
    max: 1
    steps:
      - click: claim_button_close
      - wait: 1s
