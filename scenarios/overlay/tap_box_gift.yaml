enabled: true
name: Tap gift box
# Popup dismissal — purely UI, no player identity needed. Some story / hero
# unlock screens surface a small yellow gift-box icon to claim attached
# rewards; this scenario taps it as long as it is on screen.
device_level: true

steps:
  - while_match: box.gift
    threshold: 0.9
    min_match_saturation: 48
    max: 5
    steps:
      - click: box.gift
      - wait: 1s
