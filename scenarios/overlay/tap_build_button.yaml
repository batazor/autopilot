enabled: true
name: Tap build button
# Tutorial-driven tap on the visible build button — overlay only fires when
# the button is actually present.  Safe before player identity is known.
device_level: true

steps:
  - match: build_button
    threshold: 0.95
    min_match_saturation: 48
  - wait: 300ms
  - match: build_button
    threshold: 0.95
    min_match_saturation: 48
  - click: build_button
  - wait: 800ms
