enabled: true
name: ✅ Tap confirm dialog
# Popup dismissal — purely UI, no player identity needed.
device_level: true

# Triggered by overlay rule `confirm_button.visible` (priority 88_000).
# FSM transitions are picked up by overlay rules afterwards
# (e.g. `main_city.visible` → `set_node_main_city`).

steps:
  - match: confirm_button
    threshold: 0.98
    min_match_saturation: 48
  - click: confirm_button
  - wait: 1500ms
