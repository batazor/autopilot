name: Heal Injured Troops

node: heal_injured

trigger: healInjured.state.isAvailable

priority: 90

steps:
  - if:
      trigger: healInjured.state.isAvailable
      then:
        - click: healInjured.state.isAvailable
        - wait: 500ms
        - action: screenshot
          analyze:
            - name: healInjured.state.healAllButton
              action: findIcon
              threshold: 0.75
              saveAsRegion: true
  - if:
      trigger: healInjured.state.healAllButton
      then:
        - click: healInjured.state.healAllButton
        - wait: 500ms
        - action: reset
          set: healInjured.state.isAvailable
          to: false
