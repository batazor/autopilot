name: Check Arena

cron: "0 */3 * * *"

priority: 15

node: arena

steps:
  - if:
      trigger: arena.state.isTicketsAvailable
      then:
        - pushUsecase:
            - trigger: arena.state.isTicketsAvailable
              list:
                - name: Arena Fight
        - action: reset
          set: arena.state.isChecked
          to: "true"
