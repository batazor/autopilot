enabled: true
name: 👤 Who am I — capture chief profile
priority: 82_000
# Bootstraps `active_player` itself — must be runnable before any player is identified.
device_level: true
# Skip OCR/API when we already know who is on this device (see root `cond` in dsl_scenario).
cond: active_player == ""

# Root `node:` tells the runner to navigate the FSM to `chief_profile`
# (via screen_graph BFS) before executing `steps`. After steps we explicitly
# push ``check_main_city`` at our own priority so the bot bounces back to
# main_city immediately — without that, it'd linger on chief_profile until
# the next 5-min ``check_main_city`` cron tick (priority 10) and all
# main_city-anchored overlays would starve in the meantime.
#
# This scenario is auto-enqueued once per worker boot
# (see `_STARTUP_SEED_TASKS` / `_seed_startup_tasks` in
# `worker/instance_worker.py`) at priority 82_000 — above routine state-aware
# overlays (assign_worker / read_mail_gifts / chapter_task_router at 70k–80k)
# so identity is established before any action is attributed to a player.
# Stays below ``where_i_am`` (83_000) so the current_screen is known before
# we try to navigate to chief_profile. Stays below tutorial overlays
# (skip=85_000, hand=86_000) so tutorials still preempt the identity probe.
node: chief_profile

steps:
  # Read the in-game player_id displayed on the chief_profile screen and persist
  # it under `wos:player:<player_id>:state` (field `player_id`). Type/threshold
  # default to the values declared on the region in `area.json`
  # (integer, threshold 0.9).
  - ocr: player_id
  # Century POST /api/player — nickname, stove_level, kid, etc. (requires OCR player_id).
  - exec: fetch_player
  # Return to main_city right after identity is established. ``priority:
  # 82_000`` (= our own) so the navigation runs before any lower-priority
  # work even drains; the cron-default priority on ``check_main_city.yaml``
  # itself is only 10 (it's a 5-min housekeeping tick).
  - push_scenario:
      name: check_main_city
      priority: 82_000
