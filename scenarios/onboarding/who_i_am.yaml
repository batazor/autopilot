enabled: true
name: Who am I — capture chief profile
# Bootstraps `active_player` itself — must be runnable before any player is identified.
device_level: true
# Skip OCR/API when we already know who is on this device (see root `cond` in dsl_scenario).
cond: active_player == ""

# Root `node:` tells the runner to navigate the FSM to `chief_profile`
# (via screen_graph BFS) before executing `steps`. After steps the bot stays
# on chief_profile — return to main_city is handled by other rules.
#
# This scenario is auto-enqueued once per worker boot
# (see `_STARTUP_SEED_TASKS` / `_seed_startup_tasks` in
# `worker/instance_worker.py`) at priority 82_000 — above routine state-aware
# overlays (assign_worker / read_mail_gifts / chapter_task_router at 70k–80k)
# so identity is established before any action is attributed to a player.
# Stays below tutorial overlays (skip=85_000, hand=86_000) so tutorials still
# preempt the identity probe.
node: chief_profile

steps:
  # Read the in-game player_id displayed on the chief_profile screen and persist
  # it under `wos:player:<player_id>:state` (field `player_id`). Type/threshold
  # default to the values declared on the region in `area.json`
  # (integer, threshold 0.9).
  - ocr: player_id
  # Century POST /api/player — nickname, stove_level, kid, etc. (requires OCR player_id).
  - exec: fetch_player
  # Immediately queue a main_city check (don't wait for cron).
  - push_scenario: check_main_city
