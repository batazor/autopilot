enabled: true
name: Onboarding upgrade (chapter task)
node: building

steps:
  # Chapter flow may show upgrade taps or a Next button instead — handle both per iteration.
  - repeat:
      max: 10
      steps:
        - while_match: upgrade_button
          max: 5
          steps:
            - wait: 2s
            - click: upgrade_button
        - while_match: button.next
          max: 1
          steps:
            - wait: 2s
            - click: button.next
