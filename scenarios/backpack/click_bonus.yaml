enabled: true
name: "Open backpack: Bonus tab"

node: backpack

# Pushed by ``page.backpack.bonus.has_red_dot`` when the Bonus tab on the
# backpack screen lights up. Just opens the tab — claim flow is handled by
# overlays on the backpack.bonus screen.

steps:
  - click: page.backpack.bonus
  - wait: 1s
  # Drain pending red-dot claim popups on the newly-opened tab. Hard-capped
  # at 20 taps in the exec handler to avoid runaway scans.
  - exec: put_all_red_dots
