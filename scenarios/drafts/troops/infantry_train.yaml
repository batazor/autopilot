name: 🪖 Train infantry

# Draft — regions/conds are aspirational. Real area.json bindings + state
# fields (``troops_infantry_status``) still TBD.
#
# Branches on a cached OCR'd status field:
#   * "Completed" → collect troops, re-queue self to start the next batch.
#   * "Idle"      → enter the training UI and start a new batch.

node: troops.infantry

priority: 40_000

steps:
  # Branch A — last batch finished.
  - cond: 'troops_infantry_status ~= "Completed"'
    steps:
      - while_match: troops.collect
        max: 1
        steps:
          - click: troops.collect
          - wait: 500ms
      - push_scenario: infantry_train

  # Branch B — idle queue, start training.
  - cond: 'troops_infantry_status ~= "Idle"'
    steps:
      - while_match: troops.train_entry
        max: 1
        steps:
          - click: troops.train_entry
          - wait: 500ms
      - click: troops.train
      - wait: 500ms
      - click: troops.train_start
      - wait: 500ms
      - click: nav.main_city
      - wait: 500ms
