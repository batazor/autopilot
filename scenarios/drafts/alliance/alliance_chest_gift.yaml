name: 🎁 Alliance chest gifts

# Draft — regions/conds are aspirational. Real area.json bindings still TBD.
# When promoting out of drafts, set ``enabled: true`` and verify each
# referenced region exists via the annotator UI.

node: alliance.chest_gift

priority: 60_000

steps:
  # Bulk path — prefer the single "Claim All" button when shown.
  - while_match: alliance.chest.claim_all
    max: 1
    steps:
      - click: alliance.chest.claim_all
      - wait: 200ms
      - while_match: button.confirm
        max: 1
        steps:
          - click: button.confirm
          - wait: 500ms
      - while_match: tapanywhereyoexit
        max: 1
        steps:
          - click: tapanywhereyoexit
          - wait: 200ms

  # Fallback — drain one-at-a-time claim buttons.
  - while_match: alliance.chest.claim
    max: 20
    steps:
      - click: alliance.chest.claim
      - wait: 400ms
