enabled: true
name: "🎪 Open event block 1"

node: main_city

# Pushed by ``main_city.event.block.1.has_red_dot`` when the first event slot
# on main_city lights up. Just opens it — anything beyond that (claim flow,
# minigame entry) is the next overlay tick's job.

steps:
  - click: main_city.event.block.1
  - wait: 1s
