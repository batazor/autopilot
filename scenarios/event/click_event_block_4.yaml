enabled: true
name: "🎪 Open event block 4"

node: main_city

# Pushed by ``main_city.event.block.4.has_red_dot`` when the fourth event slot
# on main_city lights up. Just opens it — anything beyond that (claim flow,
# minigame entry) is the next overlay tick's job.

steps:
  - click: main_city.event.block.4
  - wait: 1s
