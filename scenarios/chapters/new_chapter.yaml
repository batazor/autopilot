enabled: true
name: "New chapter"

# The ``chapter.new`` button only exists on the main_city screen.
# Without ``node:`` the scenario would run wherever the bot happens to be
# when the task pops — and overlay-push races (rule fires on main_city,
# bot moves to ``survivor_status``, then task pops) used to land the
# scenario on the wrong screen and prompt the operator for a stuck
# ``while_match matched zero times`` approval. ``node: main_city`` makes
# the runner navigate back to main_city via the FSM graph before running
# the guard, mirroring how ``read_mail_gifts`` handles the same race.
node: main_city

steps:
  - while_match: chapter.new
    isRedDot: true
    max: 1
    steps:
      - click: chapter.new
      - wait: 1s
