      event.war_preparation: ["war preparation", "war prep"]

screens:
  # Network "Retry/Reconnect" popup. Listed first so it short-circuits any
  # other landmark match — if the disconnect overlay is on top of the game,
  # we want ``current_screen=reconnect`` no matter what's underneath. Without
  # this entry the rolling detector returns UNKNOWN, ``current_screen`` is
  # cleared, and the approvals UI shows ``node:—`` while the bot is staring
  # at the reconnect dialog.
  reconnect:
    priority: 100
    landmarks:
      - match: reconnect_button
        threshold: 0.9
    rules:
      - match: reconnect_button
        threshold: 0.9

  building:
    priority: 10
    # Current-screen detection landmarks: recognize the building/upgrade screen.
    # Either the furniture banner OR the upgrade CTA at the bottom is enough —
    # the latter survives when the camera scrolls and the furniture row is
    # off-screen.
    landmarks:
      - match: page.building.furniture
        threshold: 0.85
      - match: building.upgrade
        threshold: 0.9
    # Route verification rules: confirm Navigator reached `building`.
    rules:
      - match: page.building.furniture
        threshold: 0.85
      - match: building.upgrade
        threshold: 0.9

  main_city:
    priority: 50
    # Current-screen detection landmarks: "we are on main_city" signals.
    landmarks:
      - match: is_main_city
        threshold: 0.9
      - match: isNewPeople
        threshold: 0.98
      - ocr: is_main_city
        contains: [city, town, base]

  arena:
    # Route verification rules for screens that are usually detected by title OCR.
    rules:
      - ocr: page_title
        contains: [arena, battle, fight]
        threshold: 0.8

  training:
    rules:
      - ocr: page_title
        contains: [training, troop, recruit]
        threshold: 0.8

  gathering:
    rules:
      - ocr: page_title
        contains: [gather, resource, march]
        threshold: 0.8

  alliance:
    rules:
      - ocr: page_title
        contains: [alliance, guild, member]
        threshold: 0.8

  exploration:
    rules:
      - ocr: page_title
        contains: [exploration]
        threshold: 0.8

  squad_settings:
    rules:
      - ocr: page_title
        contains: [squad]
        threshold: 0.8

  chat:
    rules:
      - ocr: page_title
        contains: [chat]
        threshold: 0.8

  mail:
    rules:
      - ocr: page_title
        contains: [mail]
        threshold: 0.8

  # Backpack / VIP / Shop entries are needed so the rolling detector can
  # recognize these screens and persist `current_screen`. Without them the
  # detector returns UNKNOWN, the streak counter clears `current_screen`, and
  # downstream scenarios see node:— even right after a successful navigation.
  backpack:
    rules:
      - ocr: page_title
        contains: [backpack]
        threshold: 0.8

  vip:
    rules:
      - ocr: page_title
        contains: [vip]
        threshold: 0.8

  shop:
    rules:
      - ocr: page_title
        contains: [shop]
        threshold: 0.8

  heroes:
    rules:
      - ocr: page_title
        contains: [heroes power, hero power]
        threshold: 0.8

  event.trials:
    rules:
      - ocr: page_title
        contains: [trials, trial]
        threshold: 0.8

  # Furnace = the central upgrade building. Identified by template-matching
  # the ``building.furnace`` region (the building's nameplate icon). Exit edge
  # piggybacks on the same ``from.building.to.main_city`` tap as ``building``.
  furnace:
    landmarks:
      - match: building.furnace
        threshold: 0.9
    rules:
      - match: building.furnace
        threshold: 0.9

  event.7-day:
    # Detection landmark: template match the "7-day" banner in references/event.7-day.png.
    landmarks:
      - match: event.7-day
        threshold: 0.9
    # Verification: prefer template match on the screen-unique banner, fall back to
    # page_title OCR for cases where the banner is partially scrolled out.
    rules:
      - match: event.7-day
        threshold: 0.9
      - ocr: page_title
        contains: [7-day, 7 day, 7days]
        threshold: 0.8

  event.first_purchase:
    rules:
      - ocr: page_title
        contains: [1st purchase, first purchase, t purchase]
        threshold: 0.8

