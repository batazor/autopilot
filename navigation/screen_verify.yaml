# Screen verification config used by navigation.detector + navigation.navigator.
#
# - text_switch: cheap OCR switch by common page title/text regions.
# - screens.<name>.landmarks: used by ScreenDetector to recognize the current screen.
# - screens.<name>.rules: used by Navigator to verify that a route/tap reached target screen.
# A check can be image-based (`match`) or OCR-based (`ocr` + optional `contains`).
retry:
  attempts: 6
  interval_seconds: 0.8

# Fast OCR-based screen switch for screens that expose a shared title region.
text_switch:
  - ocr: page_title
    threshold: 0.8
    cases:
      arena: [arena, battle, fight]
      training: [training, troop, recruit]
      gathering: [gather, resource, march]
      alliance: [alliance, guild, member]
      exploration: [exploration]
      squad_settings: [squad]
      chat: [chat]
      mail: [mail]
      chief_profile: [chief profile, chief, profile]

screens:
  building:
    priority: 10
    # Current-screen detection landmark: recognize the building/upgrade screen.
    landmarks:
      - match: page.building.furniture
        threshold: 0.85
    # Route verification rule: confirms Navigator reached `building`.
    rules:
      - match: page.building.furniture
        threshold: 0.85

  main_city:
    priority: 50
    # Current-screen detection landmarks: "we are on main_city" signals.
    landmarks:
      - match: is_main_city
        threshold: 0.9
      - match: isNewPeople
        threshold: 0.98
      - ocr: is_main_city
        contains: [city, town, base]

  arena:
    # Route verification rules for screens that are usually detected by title OCR.
    rules:
      - ocr: page_title
        contains: [arena, battle, fight]
        threshold: 0.8

  training:
    rules:
      - ocr: page_title
        contains: [training, troop, recruit]
        threshold: 0.8

  gathering:
    rules:
      - ocr: page_title
        contains: [gather, resource, march]
        threshold: 0.8

  alliance:
    rules:
      - ocr: page_title
        contains: [alliance, guild, member]
        threshold: 0.8

  exploration:
    rules:
      - ocr: page_title
        contains: [exploration]
        threshold: 0.8

  squad_settings:
    rules:
      - ocr: page_title
        contains: [squad]
        threshold: 0.8

  chat:
    rules:
      - ocr: page_title
        contains: [chat]
        threshold: 0.8

  mail:
    rules:
      - ocr: page_title
        contains: [mail]
        threshold: 0.8

  chief_profile:
    retry:
      attempts: 8
      interval_seconds: 1.0
    rules:
    - ocr: page_title
      contains: [chief profile, chief, profile]
      threshold: 0.8

  survivor_status:
    priority: 45
    landmarks:
      - match: page.survivor_status
        threshold: 0.85
    rules:
      - match: page.survivor_status
        threshold: 0.85

  hero.recrutment:
    priority: 44
    landmarks:
      - match: isHeroRecruitment
        threshold: 0.9
    rules:
      - match: isHeroRecruitment
        threshold: 0.9
