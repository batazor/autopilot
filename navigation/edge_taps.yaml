# Navigation tap sequences: src_screen → dst_screen → [region_names_from_area.json]
# Regions must already exist in area.json — do not invent names.
edges:
  main_city:
    # arena: [arena_btn]
    # training: [training_btn]
    # alliance: [alliance_btn]
    # gathering: [world_map_btn]
    chief_profile: [to_chief_profile]
    mail: [mail.new]
    exploration: [main_city.to.exploration]
    heroes: [main_city.to.heroes]
    survivor_status: [isWorkers]
    suggestion_box: [isPostman]
    backpack: [main_city.to.backpack]
    vip: [page.vip]
    shop: [page.shop]
    # Tapping the chapter task banner navigates the camera to the active
    # building and opens its panel. Used by `building.upgrade` (node: building)
    # when chapter_task_router has just clicked chapter.task but the overlay
    # `set_node: building` from `page.building.furniture.present` hasn't yet
    # caught up. If chapter.task is empty, this tap no-ops and the verifier
    # (`page.building.furniture` match) fails — scenario reschedules cleanly.
    building: [chapter.task]
    # Dynamic edges: tap region is resolved at runtime via the `event_blocks`
    # resolver (see navigation/event_blocks_resolver.py), which reads the
    # Redis hash `wos:instance:<id>:event_blocks` populated by the
    # scan_event_blocks DSL exec handler.
    event.trials:         { resolver: event_blocks, target: event.trials }
    event.7-day:          { resolver: event_blocks, target: event.7-day }
    event.first_purchase: { resolver: event_blocks, target: event.first_purchase }
