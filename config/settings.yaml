redis:
  url: "redis://localhost:6379/0"
  key_prefix: "wos"

ocr:
  url: "http://localhost:8000"
  timeout_seconds: 10

scheduler:
  interval_seconds: 30
  ortools_timeout_seconds: 1.0

worker:
  # adb path for worker (screencap rolling preview, taps, shell); align with UI adb override when needed.
  adb_executable: ""
  # ADB foreground check interval for ``worker.game_health_watchdog`` (separate subprocess).
  health_check_interval_seconds: 15
  restart_wait_seconds: 10
  task_timeout_seconds: 300
  bluestacks_launch_timeout_seconds: 120
  overlay_analyze_when_busy: false
  screen_detect_when_busy: false
  device_reference_snapshot_interval_seconds: 1.0
  device_reference_snapshot_busy_interval_seconds: 4.0
