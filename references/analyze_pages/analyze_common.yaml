# Shared/global overlay rules.
#
# tap_offset_from_match: animated tap — delta from primary ``region`` bbox centre → ``tap_region`` centre.
# min_match_saturation (0–255, optional): after NCC passes, require mean HSV saturation on the live
#   patch — rejects grey/disabled buttons that still correlate in grayscale TM. Tune per theme (~45–55).
# screens (optional list of ScreenName string values): when present and non-empty, the rule is only
#   evaluated when the bot's detected current screen matches one of the listed ids.
#   Absent or empty → GLOBAL rule (runs on every screen, e.g. ad/popup dismissers).
#   Example: screens: [arena]        → only when bot is on the arena screen
#            screens: [arena, training] → arena or training
#            screens: []              → same as absent; global
overlay:
  - name: skip_button.visible
    region: skip_button
    action: findIcon
    threshold: 0.85

  - name: page.chief_profile.visible
    region: chief_profile_title
    action: findIcon
    threshold: 0.9
    enqueue_tap: false

  - name: hand_pointer.visible
    region: hand_pointer
    search_region: hand_pointer_search
    action: findIcon
    # Sliding-window peak NCC in a large ROI can hit ~0.8 on unrelated UI; keep above accidental peaks.
    threshold: 0.88
    tap_region: hand_pointer_tap
    tap_offset_from_match: true

  - name: hand_pointer_small_reverse.visible
    region: hand_pointer_small_reverse
    search_region: hand_pointer_small_reverse_search
    action: findIcon
    threshold: 0.88
    tap_region: hand_pointer_small_reverse_tap
    tap_offset_from_match: true

  - name: hand_pointer_small.visible
    region: hand_pointer_small
    search_region: hand_pointer_small_search
    action: findIcon
    threshold: 0.88
    tap_region: hand_pointer_small_tap
    tap_offset_from_match: true

  - name: claim_button.visible
    region: claim_button
    search_region: claim_button_search
    action: findIcon
    # Inactive/grey label still correlates with crop from active — tighten vs wrong-screen peaks.
    threshold: 0.98
    min_match_saturation: 48

  - name: upgrade_building.visible
    region: upgrade_building
    search_region: upgrade_building_search
    action: findIcon
    threshold: 0.98
    min_match_saturation: 48

  - name: upgrade_button.visible
    region: upgrade_button
    search_region: upgrade_button_search
    action: findIcon
    threshold: 0.91
    min_match_saturation: 48

  - name: upgrade_big_button.visible
    region: upgrade_big_button
    search_region: upgrade_big_button_search
    action: findIcon
    threshold: 0.92
    min_match_saturation: 48

  - name: go_button.visible
    region: go_button
    search_region: go_button_search
    action: findIcon
    threshold: 0.98
    min_match_saturation: 48

  - name: build_button.visible
    region: build_button
    search_region: build_button_search
    action: findIcon
    threshold: 0.98
    min_match_saturation: 48

  - name: build_building_item.visible
    region: build_building_item
    search_region: build_building_item_search
    action: findIcon
    threshold: 0.98
    min_match_saturation: 48

  - name: add_worker_button.visible
    region: add_worker_button
    search_region: add_worker_button_search
    action: findIcon
    threshold: 0.98
    min_match_saturation: 48

  - name: confirm_button.visible
    region: confirm_button
    search_region: confirm_button_search
    action: findIcon
    threshold: 0.98
    min_match_saturation: 48

