# Local development: builds bot + ocr from sources on this checkout.
# For pre-built images from GHCR, use ``docker-compose.prod.yml`` instead:
#     docker compose -f docker-compose.prod.yml up -d
#
# Why no unix socket here (unlike prod): the dev workflow runs Redis in
# Docker but ``uv run play`` (bot + api + web) on the host. Bridging a unix
# socket from a Docker volume to the host is fragile on Docker Desktop
# (file-sharing perms / VirtioFS overhead), and loopback TCP on a single
# machine is already fast. Prod runs everything in containers and shares
# the socket via a named volume — see ``docker-compose.prod.yml``.

services:
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    ports:
      # Bind to loopback only — Redis has no auth here and is only used by the
      # local worker/scheduler/UI. Exposing 0.0.0.0:6379 on a shared machine or
      # VPS gives anonymous read/write access to the queue and state.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
