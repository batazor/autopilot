services:
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ocr:
    build:
      context: .
      dockerfile: ocr/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - paddle_model_cache:/root/.paddleocr
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  paddle_model_cache:
