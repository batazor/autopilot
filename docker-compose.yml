# Pre-built images on GitHub Container Registry (built by .github/workflows/docker.yml).
# Override the tag via ``WOS_IMAGE_TAG`` (default ``latest``) or set ``WOS_REGISTRY``
# to point at a fork. To build from local sources instead, uncomment the
# ``build:`` keys (or ``docker compose build``) — Compose ignores ``image:``
# when ``build:`` is present.

services:
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    ports:
      # Bind to loopback only — Redis has no auth here and is only used by the
      # local worker/scheduler/UI. Exposing 0.0.0.0:6379 on a shared machine or
      # VPS gives anonymous read/write access to the queue and state.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ocr:
    image: ${WOS_REGISTRY:-ghcr.io/batazor/whiteout-survival-autopilot}/ocr:${WOS_IMAGE_TAG:-latest}
    # build:
    #   context: .
    #   dockerfile: ocr/Dockerfile
    ports:
      # Bind to loopback only — same rationale as redis above; OCR is not
      # designed to face the open internet.
      - "127.0.0.1:8000:8000"
    environment:
      # PaddleX checks model host connectivity before loading. The models are cached
      # in the volume below, so skipping this avoids slow/flaky cold starts.
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
    volumes:
      - paddle_model_cache:/root/.paddleocr
      - paddlex_model_cache:/root/.paddlex
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  bot:
    image: ${WOS_REGISTRY:-ghcr.io/batazor/whiteout-survival-autopilot}/bot:${WOS_IMAGE_TAG:-latest}
    # build:
    #   context: .
    #   dockerfile: Dockerfile.bot
    depends_on:
      redis:
        condition: service_healthy
      ocr:
        condition: service_started
    ports:
      # Streamlit UI / embedded supervisor. Loopback only — anyone on the
      # host can drive the bot, so don't expose it on a shared network.
      - "127.0.0.1:8501:8501"
    environment:
      # Talk to the in-network Redis / OCR services by their compose names.
      WOS_REDIS_URL: redis://redis:6379/0
      WOS_OCR_URL: http://ocr:8000
      # Host's ADB server reachable from the container — works with Docker
      # Desktop (macOS/Windows) out of the box. On native Linux, prefer
      # ``network_mode: host`` (commented below) and point ADB_SERVER_SOCKET
      # at ``tcp:127.0.0.1:5037``.
      ADB_SERVER_SOCKET: tcp:host.docker.internal:5037
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Native Linux ADB integration:
    # network_mode: host
    restart: unless-stopped

volumes:
  redis_data:
  paddle_model_cache:
  paddlex_model_cache:
