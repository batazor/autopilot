# Local development: builds bot + ocr from sources on this checkout.
# For pre-built images from GHCR, use ``docker-compose.prod.yml`` instead:
#     docker compose -f docker-compose.prod.yml up -d

services:
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    ports:
      # Bind to loopback only — Redis has no auth here and is only used by the
      # local worker/scheduler/UI. Exposing 0.0.0.0:6379 on a shared machine or
      # VPS gives anonymous read/write access to the queue and state.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
